<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भूगोल क्विज़ - भारत : संसाधन एवं उपयोग</title>
    <style>
        /* Base Offline Styles replacing Tailwind */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdf4;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(16, 185, 129, 0.15);
            width: 100%;
            max-width: 896px;
            height: 90vh;
            min-height: 600px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 1.125rem;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #10b981;
            background-color: #f0fdf4;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Layout Utilities */
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        /* Header & Elements */
        .quiz-header { padding: 32px 32px 16px 32px; border-bottom: 1px solid #f1f5f9; background: rgba(255,255,255,0.5); position: relative; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 12px; overflow: hidden; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06); }
        .progress-bar-fill { background: linear-gradient(to right, #34d399, #10b981); height: 12px; border-radius: 9999px; transition: all 0.5s ease-out; }
        .profile-icon { position: absolute; top: 24px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-start { padding: 16px 40px; background: linear-gradient(to right, #10b981, #047857); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 20px 25px -5px rgba(16, 185, 129, 0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 32px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; margin-left: 8px; font-size: 1rem; }
        .btn-next { background-color: #1e293b; color: white; }
        .btn-skip { background-color: #e2e8f0; color: #475569; }
        
        /* Overview Panel */
        .overview-panel { position: absolute; inset: 0; background: white; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 12px; padding: 16px 0; flex-1; overflow-y: auto; }
        .grid-container::-webkit-scrollbar { width: 6px; }
        .grid-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        .q-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.9rem; }
        
        /* Circle States */
        .state-default { background: linear-gradient(135deg, #34d399, #10b981); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
        
        /* Circular Progress Chart */
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #eee; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; }
    </style>
</head>
<body>

    <div id="app" class="glass-panel">
        <!-- Screens will be injected here by JS -->
    </div>

    <script>
        const questions = [
            { q: "भौगोलिक एवं व्यावहारिक संदर्भ में 'संसाधन' (Resources) किसे कहा जाता है?", o: ["पर्यावरण में उपलब्ध वे सभी वस्तुएं जो मानवीय आवश्यकताओं को पूरा करने में सक्षम हों तथा तकनीकी रूप से सुलभ हों", "केवल बहुमूल्य सोने-चांदी की धातुएं", "नदियों का बहता हुआ पानी", "केवल जंगलों की लकड़ियाँ"], a: 0 },
            { q: "किस प्रसिद्ध भूगोलविद् का यह विख्यात कथन है कि - 'संसाधन होते नहीं, बनते हैं'?", o: ["मैटर्निक", "जिम्मरमैन (Zimmermann)", "इरेटोस्थनीज", "चार्ल्स बूथ"], a: 1 },
            { q: "उत्पत्ति के आधार पर संसाधनों को किन दो मुख्य भागों में वर्गीकृत किया गया है?", o: ["नवीकरणीय और अनवीकरणीय", "जैव और अजैव संसाधन (Biotic & Abiotic)", "राष्ट्रीय और अंतर्राष्ट्रीय", "व्यक्तिगत और सामुदायिक"], a: 1 },
            { q: "पर्यावरण में उपस्थित वैसे संसाधन जो सजीवों से प्राप्त होते हैं (जैसे- वन, पशु, मनुष्य), क्या कहलाते हैं?", o: ["अजैव संसाधन", "जैव संसाधन (Biotic Resources)", "खनिज संसाधन", "कृत्रिम संसाधन"], a: 1 },
            { q: "निर्जीव वस्तुओं के समूह से प्राप्त होने वाले संसाधनों (जैसे- चट्टानें, धातुएं, मृदा) को क्या कहा जाता है?", o: ["जैव संसाधन", "अजैव संसाधन (Abiotic Resources)", "मानवीय संसाधन", "संभाव्य संसाधन"], a: 1 },
            { q: "उपयोगिता या पुनः प्राप्ति के आधार पर भौतिक संसाधनों को किन दो वर्गों में विभाजित किया जाता है?", o: ["जैव और अजैव", "नवीकरणीय और अनवीकरणीय संसाधन (Renewable & Non-renewable)", "राष्ट्रीय और अंतर्राष्ट्रीय", "विकसित और भंडार"], a: 1 },
            { q: "वे संसाधन जिन्हें भौतिक, रासायनिक या यांत्रिक प्रक्रम द्वारा पुनः प्राप्त या नवीकृत किया जा सकता है (जैसे- सौर ऊर्जा, जल, वन)?", o: ["अनवीकरणीय संसाधन", "नवीकरणीय संसाधन (Renewable Resources)", "सीमित संसाधन", "खनिज संसाधन"], a: 1 },
            { q: "वैसे संसाधन जिनके निर्माण में लाखों-करोड़ों वर्ष लगते हैं और एक बार समाप्त होने पर पुनः निर्माण असंभव है (जैसे- कोयला, पेट्रोलियम)?", o: ["नवीकरणीय संसाधन", "अनवीकरणीय संसाधन (Non-renewable Resources)", "असीमित संसाधन", "सामुदायिक संसाधन"], a: 1 },
            { q: "स्वामित्व (Ownership) के आधार पर संसाधनों को कितने भागों में बांटा गया है?", o: ["दो भागों में", "चार भागों में (व्यक्तिगत, सामुदायिक, राष्ट्रीय, अंतर्राष्ट्रीय)", "तीन भागों में", "पाँच भागों में"], a: 1 },
            { q: "गाँव का चरागाह, श्मशान भूमि, तालाब और शहरों के सार्वजनिक पार्क स्वामित्व के आधार पर किस प्रकार के संसाधन हैं?", o: ["व्यक्तिगत संसाधन", "सामुदायिक संसाधन (Community Resources)", "राष्ट्रीय संसाधन", "अंतर्राष्ट्रीय संसाधन"], a: 1 },
            { q: "तकनीकी या कानूनी रूप से किसी देश की राजनैतिक सीमा के अंतर्गत आने वाले सभी उपलब्ध संसाधन क्या कहलाते हैं?", o: ["अंतर्राष्ट्रीय संसाधन", "राष्ट्रीय संसाधन (National Resources)", "व्यक्तिगत संसाधन", "संभाव्य संसाधन"], a: 1 },
            { q: "किसी देश के तट रेखा से कितनी दूरी तक का समुद्री क्षेत्र उसका 'अपवर्जक आर्थिक क्षेत्र' (EEZ) कहलाता है?", o: ["100 समुद्री मील (NM)", "200 समुद्री मील (200 Nautical Miles)", "500 समुद्री मील", "12 समुद्री मील"], a: 1 },
            { q: "किसी देश की प्रादेशिक समुद्री सीमा तट रेखा से कितनी दूरी (किमी या मील) तक राष्ट्रीय संपत्ति मानी जाती है?", o: ["200 किमी", "12.2 समुद्री मील (लगभग 22.2 किमी)", "100 मील", "50 किमी"], a: 1 },
            { q: "200 समुद्री मील से दूर खुले महासागरीय क्षेत्र के संसाधनों पर किसका नियंत्रण होता है और इन्हें क्या कहते हैं?", o: ["राष्ट्रीय संसाधन", "अंतर्राष्ट्रीय संसाधन (International Resources / संयुक्त राष्ट्र का नियंत्रण)", "व्यक्तिगत संपत्ति", "सामुदायिक क्षेत्र"], a: 1 },
            { q: "संसाधनों का ऐसा विवेकपूर्ण उपयोग जिससे वर्तमान की आवश्यकताएं भी पूरी हों और भावी पीढ़ी के लिए भी संसाधन बचे रहें?", o: ["अंधाधुंध दोहन", "सतत पोषणीय विकास (Sustainable Development)", "आर्थिक दोहन", "औद्योगिकीकरण"], a: 1 },
            { q: "सतत विकास की अवधारणा को लेकर 'ब्रंटलैंड आयोग' (Brundtland Commission) ने अपनी ऐतिहासिक रिपोर्ट किस वर्ष प्रस्तुत की थी?", o: ["1972 ई.", "1987 ई. में ('Our Common Future' रिपोर्ट)", "1992 ई.", "2002 ई."], a: 1 },
            { q: "पर्यावरण संरक्षण के लिए विश्व स्तर पर पहला 'प्रथम पृथ्वी सम्मेलन' (First Earth Summit) 1992 में कहाँ आयोजित हुआ था?", o: ["जोहान्सबर्ग", "रियो डी जेनेरो / ब्राजील (Rio de Janeiro)", "न्यूयॉर्क", "स्टॉकहोम"], a: 1 },
            { q: "1992 के रियो पृथ्वी सम्मेलन में पर्यावरण विकास के लिए स्वीकृत की गई 800 पृष्ठों की वैश्विक कार्ययोजना क्या कहलाती है?", o: ["नियम 50", "एजेंडा 21 (Agenda 21)", "ग्रीन पैक्ट", "मॉन्ट्रियल प्रोटोकॉल"], a: 1 },
            { q: "किस प्रसिद्ध पर्यावरण चिंतक का यह कथन है कि - 'हमारे पास पेट भरने के लिए बहुत कुछ है, लेकिन पेटी भरने के लिए नहीं'?", o: ["मेधा पाटेकर", "महात्मा गांधी (Mahatma Gandhi)", "सुंदरलाल बहुगुणा", "संदीप पांडे"], a: 1 },
            { q: "1968 में किस वैश्विक संस्था ने सबसे पहले अपनी पुस्तक 'लिमिट्स टू ग्रोथ' के माध्यम से संसाधनों के विवेकपूर्ण उपयोग की वकालत की थी?", o: ["संयुक्त राष्ट्र", "क्लब ऑफ रोम (Club of Rome)", "विश्व बैंक", "यूनेस्को"], a: 1 },
            { q: "स्मॉल इज ब्यूटीफुल (Small is Beautiful) नामक प्रसिद्ध पुस्तक के लेखक कौन हैं जो गांधी जी के विचारों पर आधारित है?", o: ["शूमेशर (Schumacher - 1974)", "जिम्मरमैन", "डार्विन", "एडम्स"], a: 0 },
            { q: "भारत के कुल भौगोलिक क्षेत्रफल (32.8 लाख वर्ग किमी) के कितने प्रतिशत भाग पर मैदानी भाग पाया जाता है जो कृषि के लिए उत्तम है?", o: ["30 प्रतिशत", "43 प्रतिशत (43% Plain Land)", "27 प्रतिशत", "50 प्रतिशत"], a: 1 },
            { q: "भारत के कुल क्षेत्रफल के कितने प्रतिशत हिस्से पर पर्वतीय क्षेत्र (Mountains) हैं जो नदियों और पर्यटन का स्रोत हैं?", o: ["43%", "30 प्रतिशत (30% Mountain Region)", "27%", "10%"], a: 1 },
            { q: "भारत के कुल भौगोलिक क्षेत्र का कितना प्रतिशत भाग पठारी (Plateau) है जहाँ खनिज और जीवाश्म ईंधनों का भंडार है?", o: ["43%", "30%", "27 प्रतिशत (27% Plateau Region)", "5%"], a: 2 },
            { q: "नदियों द्वारा बहाकर लाई गई महीन गाद और काँप से निर्मित भारत की सबसे उपजाऊ और विस्तृत मृदा कौन सी है?", o: ["काली मृदा", "जलोढ़ मृदा (Alluvial Soil)", "लैटराइट मृदा", "मरुस्थलीय मृदा"], a: 1 },
            { q: "जलोढ़ मृदा भारत के कुल कितने प्रतिशत क्षेत्रफल (मुख्यतः उत्तर भारत के मैदान) पर विस्तृत पाई जाती है?", o: ["22%", "44 प्रतिशत से अधिक (लगभग 6.4 करोड़ हेक्टेयर)", "10%", "15%"], a: 1 },
            { q: "आयु या पुरानेपन के आधार पर पुरानी जलोढ़ मिट्टी को क्या कहा जाता है जो कंकड़युक्त और कम उपजाऊ होती है?", o: ["खादर", "बांगर (Bangar Soil)", "रेगुर", "भूड"], a: 1 },
            { q: "नदियों के बाढ़ के मैदान में हर वर्ष जमा होने वाली नई, महीन और अत्यधिक उपजाऊ जलोढ़ मिट्टी को क्या कहते हैं?", o: ["बांगर", "खादर (Khadar Soil)", "लैटराइट", "रेगुर"], a: 1 },
            { q: "काली मिट्टी का दूसरा नाम क्या है जो कपास की खेती के लिए सर्वोत्कृष्ट मानी जाती है?", o: ["जलोढ़ मृदा", "रेगुर मृदा (Regur Soil)", "लैटराइट मृदा", "लाल मृदा"], a: 1 },
            { q: "काली कपास मिट्टी (Black Soil) भारत के किस लावा निर्मित क्षेत्र (दक्कन ट्रैप) में सर्वाधिक पाई जाती है?", o: ["उत्तर भारत का मैदान", "महाराष्ट्र, गुजरात और पश्चिमी मध्य प्रदेश (Deccan Trap)", "असम की पहाड़ियां", "थार मरुस्थल"], a: 1 },
            { q: "उच्च तापमान और अत्यधिक वर्षा वाले क्षेत्रों में तीव्र प्रक्षालन (Leaching) की क्रिया से बनने वाली ईंट जैसी लाल मिट्टी?", o: ["जलोढ़ मृदा", "लैटराइट मृदा (Laterite Soil)", "काली मृदा", "मरुस्थलीय मृदा"], a: 1 },
            { q: "लैटराइट (Laterite) शब्द की उत्पत्ति ग्रीक भाषा के शब्द 'लेटर' (Later) से हुई है, जिसका वास्तविक अर्थ क्या होता है?", o: ["मिट्टी", "ईंट (Brick)", "पत्थर", "पहाड़"], a: 1 },

            { q: "बिहार के मुंगैर और जमुई जिलों में किस मूल्यवान अधात्विक खनिज के बड़े भंडार हाल के सर्वेक्षणों में पाए गए हैं?", o: ["अभ्रक", "सोना अयस्क या चूना पत्थर (Quartz / सोना अंश)", "कोयला", "बॉक्साइट"], a: 1 },
            { q: "बिहार में चूना पत्थर का सबसे बड़ा भंडार किस पहाड़ी क्षेत्र (रोहतास जिला) में पाया जाता है जहाँ सीमेंट फैक्ट्रियां हैं?", o: ["राजगीर की पहाड़ी", "कैमूर या रोहतास की पहाड़ियां (Kaimur / Rohtas Plateaus)", "मंदार पर्वत", "बराबर की पहाड़ी"], a: 1 },
            { q: "भारत की 'राष्ट्रीय वन नीति' (National Forest Policy 1988) के अनुसार देश के कम से कम कितने प्रतिशत भूभाग पर वनों का होना अनिवार्य है?", o: ["22%", "33 प्रतिशत (33% Forest Cover target)", "50%", "10%"], a: 1 },
            { q: "पर्यावरण की दृष्टि से वनों के अंधाधुंध विनाश को रोकने के लिए भारत सरकार ने 'वन संरक्षण अधिनियम' किस वर्ष पास किया था?", o: ["1952 ई.", "1980 ई. में (Forest Conservation Act 1980)", "1988 ई.", "1972 ई."], a: 1 },
            { q: "भौगोलिक रिपोर्ट (ISFR) के अनुसार भारत के कुल क्षेत्रफल के लगभग कितने प्रतिशत भाग पर वर्तमान में वनों का विस्तार है?", o: ["10%", "21.7 प्रतिशत (लगभग 21-24% के बीच का आधिकारिक परास)", "33%", "15%"], a: 1 },
            { q: "भारत के किस राज्य में भौगोलिक क्षेत्रफल के हिसाब से वनों का सबसे बड़ा विस्तृत क्षेत्र (Maximum Forest Area) पाया जाता है?", o: ["बिहार", "मध्य प्रदेश (Madhya Pradesh)", "असम", "अरुणाचल प्रदेश"], a: 1 },
            { q: "बिहार के कुल भौगोलिक क्षेत्रफल के कितने प्रतिशत हिस्से पर वनों का अत्यंत संकीर्ण विस्तार बचा है?", o: ["20%", "7 प्रतिशत के आसपास (लगभग 7.1%)", "15%", "2%"], a: 1     },
            { q: "मैंग्रोव वन या ज्वारीय वन (Mangrove Forests) का सबसे बड़ा और विस्तृत क्षेत्र पश्चिम बंगाल के किस डेल्टा में पाया जाता है?", o: ["मेकांग डेल्टा", "सुंदरवन डेल्टा (Sundarbans)", "कावेरी डेल्टा", "महानदी डेल्टा"], a: 1 },
            { q: "चंदन के बहुमूल्य और सुगंधित वन भारत के किस राज्य की पहाड़ियों (जैसे नीलगिरि) में सर्वाधिक प्राकृतिक रूप से पाए जाते हैं?", o: ["असम", "कर्नाटक (Karnataka)", "बिहार", "कश्मीर"], a: 1 },
            { q: "खनिजों का दोहन रोकने और भविष्य के लिए उन्हें सुरक्षित रखने की प्रक्रिया को क्या कहा जाता है?", o: ["खनिज निष्कर्षण", "खनिज संरक्षण (Mineral Conservation)", "खनिज विसरण", "औद्योगिकीकरण"], a: 1 },
            { q: "भारत का सबसे बड़ा तेल उत्पादक और प्राचीनतम पेट्रोलियम कुआँ 1889 से कहाँ स्थित है जो असम में है?", o: ["बॉम्बे हाई", "डिगबोई (Digboi)", "अंकलेश्वर", "कलत"], a: 1 },
            { q: "मुंबई के समुद्री तट से दूर अरब सागर में स्थित भारत का सबसे बड़ा आधुनिक खनिज तेल उत्पादक क्षेत्र कौन सा है?", o: ["डिगबोई", "बॉम्बे हाई (Bombay High - 1974)", "खंभात की खाड़ी", "सूरत तटीय क्षेत्र"], a: 1 },
            { q: "कोयला किस प्रकार का ऊर्जा संसाधन है जो कार्बन की मात्रा के आधार पर चार भागों में बंटा होता है?", o: ["नवीकरणीय", "अनवीकरणीय व जीवाश्म ईंधन (Non-renewable / Fossil Fuel)", "असीमित", "साम्यूदायिक"], a: 1 },
            { q: "सर्वोत्तम और उच्च कोटि का कोयला कौन सा है जिसमें कार्बन की मात्रा 90% से अधिक होती है और धुआँ नहीं निकलता?", o: ["बिटुमिनस", "एंथ्रासाइट (Anthracite)", "लिग्नाइट", "पीट"], a: 1 },
            { q: "भारत में व्यावसायिक रूप से सर्वाधिक उपयोग किया जाने वाला गोंडवाना काल का कोयला कौन सा है?", o: ["एंथ्रासाइट", "बिटुमिनस (Bituminous)", "लिग्नाइट", "पीट"], a: 1 },
            { q: "भूरा कोयला (Brown Coal) किसे कहा जाता है जो नमीयुक्त और कम ऊष्मा देने वाला होता है जिसके भंडार नवेली में हैं?", o: ["पीट", "लिग्नाइट (Lignite)", "बिटुमिनस", "एंथ्रासाइट"], a: 1 },
            { q: "भारत में कोयले का सबसे पहला और बड़ा खनन क्षेत्र दामोदर घाटी के पास कौन सा माना जाता है जो झारखंड-बंगाल में है?", o: ["झरिया (Jharia) और रानीगंज", "बोकारो", "धनबाद", "सिंगरौली"], a: 0 },
            { q: "यूरेनियम धातु का निष्कर्षण आनुवंशिक रूप से झारखंड के किस प्रसिद्ध स्थान के जादूगोड़ा खदानों से किया जाता है?", o: ["झरिया", "जादूगोड़ा (Jaduguda)", "कोडरमा", "रांची"], a: 1 },
            { q: "भाप इंजन की तरह जलविद्युत संयंत्र चलाने के लिए पानी की कौन सी ऊर्जा टरबाइन को घुमाती है?", o: ["रासायनिक ऊर्जा", "गतिज ऊर्जा (Kinetic Energy of falling water)", "परमाणु ऊर्जा", "उदासीन ऊर्जा"], a: 1 },
            { q: "संसाधनों का अत्यधिक और अनियोजित दोहन पर्यावरण में किस बड़ी विभीषिका को जन्म देता है?", o: ["संसाधन प्रचुरता", "पारिस्थितिक असंतुलन, प्रदूषण और ग्लोबल वार्मिंग (Ecological Crisis)", "जनसंख्या में कमी", "बाढ़ रुकना"], a: 1 },
            { q: "बिहार में 'सोन नदी घाटी परियोजना' के तहत कूटनीतिक रूप से किस स्थान पर बड़ा डेहरी बांध और जलविद्युत केंद्र बनाया गया है?", o: ["वाल्मीकिनगर", "डेहरी-ऑन-सोन (Dehri-on-Sone / इंद्रपुरी बैराज)", "बक्सर", "हाजीपुर"], a: 1 },
            { q: "राजस्थान के शुष्क क्षेत्रों में जल संचयन के लिए मिट्टी के बांध बनाकर पानी रोकने की पारंपरिक तकनीकी संरचना को क्या कहते हैं?", o: ["कुल्ह", "जोहड़ (Johad) या खादिन", "सुरंगम", "बावड़ी"], a: 1 },
            { q: "भारत : संसाधन एवं उपयोग के इस संपूर्ण प्रथम अध्याय का अंतिम प्रामाणिक वैज्ञानिक व तार्किक निष्कर्ष क्या है?", o: ["संसाधन असीमित हैं और इनका दोहन जैसे चाहें किया जा सकता है", "प्रकृति में उपलब्ध संपदा मानवीय श्रम, कूटनीति और तकनीकी विकास के संतुलन से ही वास्तविक 'संसाधन' बनती है, अतः पारिस्थितिक तंत्र की सुरक्षा और सतत विकास के लिए संसाधनों का विवेकपूर्ण प्रबंधन व संरक्षण ही भावी राष्ट्र निर्माण का मूल आधार है", "कोयला और पेट्रोलियम कभी समाप्त नहीं होंगे", "बिहार में खनिजों का कोई आर्थिक महत्व नहीं बचा है"], a: 1 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let questionStates = new Array(questions.length).fill('default');

        const appDiv = document.getElementById('app');

        function renderStartScreen() {
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in h-full">
                    <div style="width: 96px; height: 96px; background: #d1fae5; color: #10b981; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <h1 style="font-size: 2.25rem; font-weight: 800; margin-bottom: 16px;">भारत : संसाधन एवं उपयोग (Grand Quiz)</h1>
                    <p style="color: #475569; margin-bottom: 8px; decline-weight: bold; font-size: 1.25rem;">बिहार बोर्ड (BSEB) कक्षा 10वीं - भूगोल (अध्याय 1 + सभी उपखण्ड)</p>
                    <p style="color: #64748b; margin-bottom: 32px; max-width: 512px; font-size: 1.1rem;">प्राकृतिक, भूमि, मृदा, जल, वन-वन्यजीव तथा खनिज संसाधनों के 100 वैचारिक व प्रामाणिक वस्तुनिष्ठ (MCQ) प्रश्नों का संपूर्ण संकलन। अभ्यास शुरू करें।</p>
                    <button onclick="startQuiz()" class="btn-start">क्विज़ शुरू करें</button>
                </div>
            `;
        }

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            questionStates.fill('default');
            renderQuestion();
        }

        function renderQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            let optionsHtml = '';
            q.o.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index}, this)" class="option-btn">
                        <span>${opt}</span>
                        <span class="icon-container hidden"></span>
                    </button>
                `;
            });

            appDiv.innerHTML = `
                <!-- Header -->
                <div class="quiz-header">
                    <div class="flex justify-between items-center" style="margin-bottom: 12px; padding-right: 50px;">
                        <span style="font-size: 0.875rem; font-weight: bold; color: #10b981; text-transform: uppercase;">प्रश्न ${currentQuestion + 1} / ${questions.length}</span>
                        <span style="font-size: 0.875rem; font-weight: bold; color: #475569; background: #e2e8f0; padding: 4px 12px; border-radius: 9999px;">स्कोर: ${score}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                    <!-- Right Menu Icon for Navigation -->
                    <div class="profile-icon" onclick="openOverview()" title="प्रश्नावली ओवरव्यू">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </div>
                </div>

                <!-- Question Area -->
                <div class="flex-1 overflow-y-auto p-8 fade-in flex flex-col" style="padding: 32px;">
                    <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 32px; line-height: 1.4; color: #0f172a;">${q.q}</h2>
                    <div id="options-container" class="flex-1 flex flex-col justify-center">
                        ${optionsHtml}
                    </div>
                </div>

                <!-- Footer / Actions -->
                <div class="flex justify-between items-center" style="padding: 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; min-height: 90px;">
                    <div>
                        <button id="skip-btn" onclick="skipQuestion()" class="btn-action btn-skip">स्किप करें</button>
                    </div>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden btn-action btn-next">
                        ${currentQuestion === questions.length - 1 ? 'परिणाम देखें' : 'अगला प्रश्न'}
                    </button>
                </div>
            `;
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

            allBtns.forEach((btn, index) => {
                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');
                iconContainer.innerHTML = '';
                iconContainer.classList.remove('hidden');

                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #16a34a; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }
                
                if (index === selectedIndex && selectedIndex !== q.a) {
                    btn.classList.add('wrong');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #dc2626; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                }
            });

            if (selectedIndex === q.a) {
                score++;
                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function skipQuestion() {
            questionStates[currentQuestion] = 'skipped';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                renderResultScreen();
            }
        }

        function openOverview() {
            let gridHtml = '';
            for(let i = 0; i < questions.length; i++) {
                let stateClass = 'state-default';
                if(questionStates[i] === 'correct') stateClass = 'state-correct';
                if(questionStates[i] === 'wrong') stateClass = 'state-wrong';
                if(questionStates[i] === 'skipped') stateClass = 'state-skipped';
                
                gridHtml += `<button onclick="jumpToQuestion(${i})" class="q-circle ${stateClass}">${i + 1}</button>`;
            }

            const overviewDiv = document.createElement('div');
            overviewDiv.id = 'overview-overlay';
            overviewDiv.className = 'overview-panel fade-in';
            overviewDiv.innerHTML = `
                <h3 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 16px; text-align: center; color: #1e293b;">प्रश्नावली ओवरव्यू</h3>
                <div style="display: flex; justify-content: center; gap: 16px; margin-bottom: 12px; font-size: 0.85rem; font-weight: bold;">
                    <span style="color: #34d399;">■ बिना प्रयास</span>
                    <span style="color: #22c55e;">■ सही</span>
                    <span style="color: #ef4444;">■ गलत</span>
                    <span style="color: #eab308;">■ स्किप किया</span>
                </div>
                <div class="grid-container">
                    ${gridHtml}
                </div>
                <div class="flex justify-center" style="padding-top: 16px; border-top: 1px solid #e2e8f0; background: #fff;">
                    <button onclick="closeOverview()" class="btn-action btn-skip" style="margin: 0 8px;">ओवरव्यू बंद करें</button>
                    <button onclick="submitQuizFromOverview()" class="btn-action btn-next" style="margin: 0 8px; background-color: #10b981;">क्विज़ सबमिट करें</button>
                </div>
            `;
            appDiv.appendChild(overviewDiv);
        }

        function closeOverview() {
            const overlay = document.getElementById('overview-overlay');
            if(overlay) overlay.remove();
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            closeOverview();
            renderQuestion();
        }

        function submitQuizFromOverview() {
            closeOverview();
            renderResultScreen();
        }

        function renderResultScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let emoji = "";
            
            if (percentage === 100) { message = "अतुलनीय! इस वृहद् अध्याय पर आपका पूरा नियंत्रण स्थापित है।"; emoji = "🏆"; }
            else if (percentage >= 80) { message = "उत्कृष्ट प्रदर्शन! प्राकृतिक व खनिज संसाधनों पर आपकी समझ बेहद गहरी है।"; emoji = "🌟"; }
            else if (percentage >= 50) { message = "अच्छा प्रयास! भौगोलिक वर्गीकरण को और पुख्ता करने के लिए थोड़ा और रिवीजन करें।"; emoji = "👍"; }
            else { message = "निराश न हों! मृदा और खनिज संपदा के सिद्धांतों को दोबारा समझें और पुनः प्रयास करें।"; emoji = "📚"; }

            const strokeDasharray = `${percentage}, 100`;
            const colorClass = percentage >= 80 ? '#10b981' : percentage >= 50 ? '#f59e0b' : '#ef4444';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in overflow-y-auto" style="padding: 32px;">
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 32px;">क्विज़ परिणाम ${emoji}</h2>
                    
                    <div style="position: relative; width: 192px; height: 192px; margin-bottom: 32px; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="width: 100%; height: 100%;">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="circle" stroke="${colorClass}" stroke-dasharray="${strokeDasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 2.25rem; font-weight: 900;">${score}</span>
                            <span style="font-size: 0.875rem; font-weight: bold; color: #94a3b8;">/ 100</span>
                        </div>
                    </div>

                    <p style="font-size: 1.5rem; font-weight: bold; margin-bottom: 8px;">${percentage}% अंक</p>
                    <p style="font-size: 1.125rem; color: #10b981; margin-bottom: 40px; max-width: 448px;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action" style="background: white; border: 2px solid #e2e8f0; color: #475569; padding: 16px 32px; border-radius: 12px; font-size: 1.125rem;">
                        फिर से प्रयास करें
                    </button>
                </div>
            `;
        }

        // Initialize App
        renderStartScreen();
    </script>
</body>
</html>

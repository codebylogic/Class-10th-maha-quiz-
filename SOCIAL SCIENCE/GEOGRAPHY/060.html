<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSEB कक्षा 10 भूगोल - अध्याय 6: मानचित्र अध्ययन क्विज़</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.125);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 900px;
            height: 90vh;
            min-height: 620px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            font-size: 1.05rem;
            font-weight: 500;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
            border-color: #38bdf8;
        }
        .correct {
            background: rgba(34, 197, 94, 0.25) !important;
            border-color: #22c55e !important;
            color: #4ade80 !important;
        }
        .wrong {
            background: rgba(239, 68, 68, 0.25) !important;
            border-color: #ef4444 !important;
            color: #f87171 !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        .quiz-header { padding: 24px 32px 16px 32px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: rgba(15, 23, 42, 0.4); position: relative; }
        .progress-bar-bg { width: 100%; background-color: rgba(255, 255, 255, 0.1); border-radius: 9999px; height: 10px; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(to right, #06b6d4, #3b82f6); height: 10px; border-radius: 9999px; transition: width 0.4s ease-out; }
        .profile-icon { position: absolute; top: 20px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .profile-icon:hover { background: rgba(255, 255, 255, 0.2); }
        
        .btn-start { padding: 16px 40px; background: linear-gradient(135deg, #0284c7, #2563eb); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 28px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; font-size: 0.95rem; }
        .btn-next { background-color: #38bdf8; color: #0f172a; }
        .btn-skip { background-color: rgba(255, 255, 255, 0.1); color: #cbd5e1; }
        
        .overview-panel { position: absolute; inset: 0; background: #0f172a; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; padding: 16px 0; flex: 1; overflow-y: auto; }
        .q-circle { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.85rem; }
        
        .state-default { background: rgba(255, 255, 255, 0.1); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
        
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 220px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: rgba(255, 255, 255, 0.1); stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; }
    </style>
</head>
<body>

    <div id="app" class="glass-panel"></div>

    <script>
        const rawQuestions = [
            { q: "उच्चावच प्रदर्शन के लिए हैश्यूर (Hachure) विधि का विकास किसने किया था?", o: ["लेहमान", "गुटेनबर्ग", "हम्बोल्ट", "रिटर"], a: 0 },
            { q: "हैश्यूर विधि के प्रतिपादक लेहमान किस देश के ऑस्ट्रियन सैन्य अधिकारी थे?", o: ["ऑस्ट्रिया", "जर्मनी", "फ्रांस", "ब्रिटेन"], a: 0 },
            { q: "हैश्यूर विधि में ढाल की दिशा में खींची गई रेखाएँ कैसी होती हैं?", o: ["छोटी और महीन रेखाएँ", "मोटी और लंबी रेखाएँ", "समानांतर वृत्त", "वर्ग आकार की रेखाएँ"], a: 0 },
            { q: "हैश्यूर विधि में तीव्र ढाल को प्रदर्शित करने के लिए रेखाएँ कैसी बनाई जाती हैं?", o: ["मोटी और पास-पास", "पतली और दूर-दूर", "टूटी हुई रेखाएँ", "सफेद रंग की रेखाएँ"], a: 0 },
            { q: "हैश्यूर विधि में मंद ढाल को प्रदर्शित करने के लिए रेखाएँ कैसी होती हैं?", o: ["पतली और दूर-दूर", "मोटी और पास-पास", "काली और घनी", "चौकोर आकृति"], a: 0 },
            { q: "हैश्यूर विधि में किस क्षेत्र या आकृति को पूरी तरह सफेद छोड़ दिया जाता है?", o: ["समतल या पठारी शीर्ष भाग", "अत्यधिक तीव्र ढाल", "नदी का मुहाना", "समुद्री भाग"], a: 0 },
            { q: "मानचित्र पर समान उच्चता वाले स्थानों को मिलाने वाली काल्पनिक रेखा को क्या कहते हैं?", o: ["समोच्च रेखा (Contour Line)", "समदाब रेखा", "समताप रेखा", "अक्षांश रेखा"], a: 0 },
            { q: "समोच्च रेखाओं को मानचित्र पर सामान्यतः किस रंग से दिखाया जाता है?", o: ["बादामी (भूरा) रंग", "नीला रंग", "हरा रंग", "लाल रंग"], a: 0 },
            { q: "यदि समोच्च रेखाएँ एक-दूसरे के बहुत पास-पास खींची गई हों, तो वह किस ढाल को दर्शाती हैं?", o: ["तीव्र ढाल", "मंद ढाल", "समतल मैदान", "सीढ़ीदार ढाल"], a: 0 },
            { q: "यदि समोच्च रेखाएँ परस्पर काफी दूर-दूर हों, तो वह किस प्रकार के ढाल को प्रदर्शित करती हैं?", o: ["मंद ढाल", "तीव्र ढाल", "खड़ा ढाल", "जलप्रपात"], a: 0 },
            { q: "समोच्च रेखाओं द्वारा किसी शंकुाकार पहाड़ी का प्रदर्शन किस प्रकार के वृत्तों से होता है?", o: ["संकेन्द्री वृत्तों द्वारा", "चौकोर रेखाओं द्वारा", "त्रिभुजाकार रेखाओं द्वारा", "सीधी समानांतर रेखाओं द्वारा"], a: 0 },
            { q: "स्तर रंजन (Layer Tinting) विधि में मानचित्र पर जल/समुद्र को किस रंग से दिखाया जाता है?", o: ["नीला रंग", "हरा रंग", "भूरा रंग", "सफेद रंग"], a: 0 },
            { q: "स्तर रंजन विधि में मैदानी भाग को किस रंग से प्रदर्शित किया जाता है?", o: ["हरा रंग", "पीला रंग", "नीला रंग", "लाल रंग"], a: 0 },
            { q: "स्तर रंजन विधि में पठारी भाग को सामान्यतः किस रंग से दर्शाया जाता है?", o: ["पीला रंग", "हरा रंग", "नीला रंग", "गुलाबी रंग"], a: 0 },
            { q: "स्तर रंजन विधि में पर्वतीय एवं उच्च भू-भागों को किस रंग से दिखाया जाता है?", o: ["भूरा (बादामी) रंग", "हरा रंग", "सफेद रंग", "काला रंग"], a: 0 },
            { q: "स्तर रंजन विधि में बर्फ से ढके बर्फीले शिखरों को किस रंग से दर्शाया जाता है?", o: ["सफेद रंग", "नीला रंग", "हरा रंग", "पीला रंग"], a: 0 },
            { q: "मानचित्र में पर्वतीय छायाकरण (Hill Shading) विधि में प्रकाश की किरणें किस दिशा से आती मानी जाती हैं?", o: ["उत्तर-पश्चिम दिशा", "दक्षिण-पूर्व दिशा", "उत्तर-पूर्व दिशा", "दक्षिण-पश्चिम दिशा"], a: 0 },
            { q: "पर्वतीय छायाकरण विधि में प्रकाश की विपरीत दिशा वाले ढालों को कैसा दिखाया जाता है?", o: ["गहरा या छायादार (काला)", "सफेद", "हरा", "नीला"], a: 0 },
            { q: "किसी निश्चित स्थान की समुद्र तल से मापी गई ऊँचाई को क्या कहते हैं?", o: ["स्थानिक ऊँचाई (Spot Height)", "त्रिकोणमितीय स्टेशन", "तलमार्ग", "समोच्च रेखा"], a: 0 },
            { q: "मानचित्र पर स्थानिक ऊँचाई को प्रदर्शित करने के लिए कौन सा प्रतीक प्रयोग किया जाता है?", o: ["एक बिंदु और संख्या (उदा. .200)", "त्रिभुज", "वर्ग", "वृत्त"], a: 0 },
            { q: "सर्वेक्षण के आधार पर दीवार या खंभे पर अंकित की गई निश्चित ऊँचाई को क्या कहते हैं?", o: ["तलमार्ग (Bench Mark)", "स्थानिक ऊँचाई", "त्रिकोणमितीय स्टेशन", "समोच्च रेखा"], a: 0 },
            { q: "तलमार्ग को मानचित्र या दीवारों पर संक्षेप में किस अक्षर से दर्शाया जाता है?", o: ["BM", "SH", "TS", "CL"], a: 0 },
            { q: "त्रिभुज बनाकर उसके बगल में लिखी गई ऊँचाई को क्या कहा जाता है?", o: ["त्रिकोणमितीय स्टेशन (Trig Station)", "स्थानिक ऊँचाई", "तलमार्ग", "समोच्च मान"], a: 0 },
            { q: "V-आकार की घाटी को प्रदर्शित करने के लिए समोच्च रेखाएँ अंग्रेजी के किस अक्षर जैसी होती हैं?", o: ["V अक्षर (उल्टा)", "U अक्षर", "O अक्षर", "S अक्षर"], a: 0 },
            { q: "जलप्रपात (Waterfall) को दर्शाने के लिए समोच्च रेखाएँ कैसी होती हैं?", o: ["एक ही स्थान पर अत्यंत पास या मिलती हुई", "दूर-दूर फैली हुई", "गोल वृत्त जैसी", "समानांतर सीधी"], a: 0 },
            { q: "समोच्च रेखा विधि में यदि केंद्र में सबसे अधिक मान हो, तो वह आकृति क्या दर्शाती है?", o: ["पहाड़ी या पर्वत", "झील", "गहरी घाटी", "मैदान"], a: 0 },
            { q: "यदि समोच्च रेखाओं में बाहर का मान अधिक और केंद्र का मान कम हो, तो वह क्या दर्शाती है?", o: ["गड्ढा या बेसिन/झील", "पहाड़ी", "पठार", "शिखर"], a: 0 },
            { q: "धरातल पर मापी गई दूरी और मानचित्र पर मापी गई दूरी के अनुपात को क्या कहते हैं?", o: ["मापक (Scale)", "समोच्च रेखा", "अक्षांश", "देशांतर"], a: 0 },
            { q: "निरूपक भिन्न (RF) में अंश (Numerator) का मान सदैव कितना होता है?", o: ["एक (1)", "सौ (100)", "दस (10)", "शून्य (0)"], a: 0 },
            { q: "मानचित्र की दिशा में सदैव ऊपर की ओर कौन सी दिशा दर्शाई जाती है?", o: ["उत्तर दिशा", "दक्षिण दिशा", "पूर्व दिशा", "पश्चिम दिशा"], a: 0 },
            { q: "मानचित्र में उत्तर दिशा का ज्ञान कराने वाले तीर के निशान को क्या कहते हैं?", o: ["उत्तर रेखा (North Line)", "समोच्च रेखा", "अक्षांश रेखा", "मापक रेखा"], a: 0 },
            { q: "समोच्च रेखाओं द्वारा ढाल के कटाव को दिखाने के लिए क्या उपयोग किया जाता है?", o: ["समोच्च रेखाओं की निकटता", "रंगों का प्रयोग", "सफेद स्थान", "छायाकरण"], a: 0 },
            { q: "मानचित्र में तल रूप या उच्चावच को त्रिविमीय (3D) रूप में देखने की विधि कौन सी है?", o: ["पर्वतीय छायाकरण", "स्थानिक ऊँचाई", "तलमार्ग", "अक्षांश रेखा"], a: 0 },
            { q: "मानचित्र बनाने की कला और विज्ञान को क्या कहा जाता है?", o: ["कार्टोग्राफी (Cartography)", "जियोग्राफी", "टोपोग्राफी", "जियोलॉजी"], a: 0 },
            { q: "भारत में मानचित्र बनाने वाला सर्वोच्च राष्ट्रीय संगठन कौन सा है?", o: ["भारतीय सर्वेक्षण विभाग (Survey of India)", "इंसरो", "नीति आयोग", "रेलवे बोर्ड"], a: 0 },
            { q: "भारतीय सर्वेक्षण विभाग का मुख्यालय कहाँ स्थित है?", o: ["देहरादून", "नई दिल्ली", "कोलकाता", "शीलोंग"], a: 0 },
            { q: "धरातल की प्राकृतिक और सांस्कृतिक आकृतियों को दर्शाने वाले मानचित्र को क्या कहते हैं?", o: ["स्थलाकृतिक मानचित्र (Topographical Map)", "राजनीतिक मानचित्र", "मौसम मानचित्र", "भूगर्भिक मानचित्र"], a: 0 },
            { q: "स्थलाकृतिक मानचित्रों पर मानव निर्मित संरचनाओं (जैसे सड़क, घर) को किस रंग से दिखाया जाता है?", o: ["लाल या काला रंग", "हरा रंग", "नीला रंग", "पीला रंग"], a: 0 },
            { q: "स्थलाकृतिक मानचित्र पर वनस्पति और जंगलों को किस रंग से दिखाया जाता है?", o: ["हरा रंग", "भूरा रंग", "नीला रंग", "पीला रंग"], a: 0 },
            { q: "स्थलाकृतिक मानचित्र में कृषि योग्य भूमि को किस रंग से भरा जाता है?", o: ["पीला रंग", "हरा रंग", "लाल रंग", "सफेद रंग"], a: 0 },
            { q: "समोच्च रेखाओं के बीच की लंबवत दूरी को क्या कहते हैं?", o: ["समोच्च अंतरांश (Contour Interval)", "क्षैतिज दूरी", "स्थानिक दूरी", "ढाल कोण"], a: 0 },

            { q: "यदि समोच्च रेखाएँ गोल-गोल चक्करदार हों और केंद्र में मान अधिक हो, तो वह क्या है?", o: ["शंकुाकार पहाड़ी", "झील", "मैदान", "नदी द्रोणी"], a: 0 },
            { q: "भूगोल में मानचित्रों को क्या माना जाता है?", o: ["भूगोलवेत्ता का सबसे महत्त्वपूर्ण उपकरण", "केवल एक चित्र", "अनावश्यक वस्तु", "केवल खेल का साधन"], a: 0 }
        ];

        // Fisher-Yates Shuffle Algorithm for Questions & Options
        function shuffleQuestionsAndOptions(array) {
            const shuffled = JSON.parse(JSON.stringify(array));
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            shuffled.forEach(item => {
                const correctAnswerText = item.o[item.a];
                for (let i = item.o.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [item.o[i], item.o[j]] = [item.o[j], item.o[i]];
                }
                item.a = item.o.indexOf(correctAnswerText);
            });

            return shuffled;
        }

        let questions = [];
        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let questionStates = [];

        const appDiv = document.getElementById('app');

        function renderStartScreen() {
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in h-full">
                    <div style="width: 88px; height: 88px; background: rgba(56, 189, 248, 0.15); color: #38bdf8; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px; border: 1px solid rgba(56, 189, 248, 0.3);">
                        <svg xmlns="http://www.w3.org/2000/svg" width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon><line x1="8" y1="2" x2="8" y2="18"></line><line x1="16" y1="6" x2="16" y2="22"></line></svg>
                    </div>
                    <h1 style="font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; color: #f8fafc;">BSEB कक्षा 10वीं भूगोल</h1>
                    <h2 style="font-size: 1.35rem; color: #38bdf8; font-weight: 600; margin-bottom: 16px;">अध्याय 6: मानचित्रांकन (मानचित्र अध्ययन एवं निरूपण)</h2>
                    <p style="color: #94a3b8; margin-bottom: 32px; max-width: 620px; font-size: 1.05rem; line-height: 1.6;">हैश्यूर विधि, समोच्च रेखाएँ, स्तर रंजन, पर्वतीय छायाकरण, स्थानिक ऊँचाई एवं तलमार्ग पर आधारित 100 ऑटो-रैंडमाइज्ड प्रश्नों का महा-क्विज़।</p>
                    <button onclick="startQuiz()" class="btn-start">क्विज़ प्रारंभ करें</button>
                </div>
            `;
        }

        function startQuiz() {
            questions = shuffleQuestionsAndOptions(rawQuestions);
            currentQuestion = 0;
            score = 0;
            questionStates = new Array(questions.length).fill('default');
            renderQuestion();
        }

        function renderQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            let optionsHtml = '';
            q.o.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index}, this)" class="option-btn">
                        <span>${opt}</span>
                        <span class="icon-container hidden"></span>
                    </button>
                `;
            });

            appDiv.innerHTML = `
                <div class="quiz-header">
                    <div class="flex justify-between items-center" style="margin-bottom: 12px; padding-right: 50px;">
                        <span style="font-size: 0.85rem; font-weight: bold; color: #38bdf8; letter-spacing: 0.5px;">प्रश्न ${currentQuestion + 1} / ${questions.length}</span>
                        <span style="font-size: 0.85rem; font-weight: bold; color: #e2e8f0; background: rgba(255,255,255,0.1); padding: 4px 14px; border-radius: 9999px;">स्कोर: ${score}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                    <div class="profile-icon" onclick="openOverview()" title="प्रश्नावली नेविगेशन">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-8 fade-in flex flex-col" style="padding: 28px 32px;">
                    <h2 style="font-size: 1.35rem; font-weight: 600; margin-bottom: 24px; line-height: 1.5; color: #f1f5f9;">${q.q}</h2>
                    <div id="options-container" class="flex-1 flex flex-col justify-center">
                        ${optionsHtml}
                    </div>
                </div>

                <div class="flex justify-between items-center" style="padding: 20px 32px; background: rgba(15, 23, 42, 0.6); border-top: 1px solid rgba(255, 255, 255, 0.1); min-height: 80px;">
                    <div>
                        <button id="skip-btn" onclick="skipQuestion()" class="btn-action btn-skip">स्किप करें</button>
                    </div>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden btn-action btn-next">
                        ${currentQuestion === questions.length - 1 ? 'परिणाम देखें' : 'अगला प्रश्न'}
                    </button>
                </div>
            `;
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

            allBtns.forEach((btn, index) => {
                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');
                iconContainer.classList.remove('hidden');

                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #4ade80; width: 22px; height: 22px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }
                
                if (index === selectedIndex && selectedIndex !== q.a) {
                    btn.classList.add('wrong');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #f87171; width: 22px; height: 22px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                }
            });

            if (selectedIndex === q.a) {
                score++;
                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function skipQuestion() {
            questionStates[currentQuestion] = 'skipped';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                renderResultScreen();
            }
        }

        function openOverview() {
            let gridHtml = '';
            for(let i = 0; i < questions.length; i++) {
                let stateClass = 'state-default';
                if(questionStates[i] === 'correct') stateClass = 'state-correct';
                if(questionStates[i] === 'wrong') stateClass = 'state-wrong';
                if(questionStates[i] === 'skipped') stateClass = 'state-skipped';
                
                gridHtml += `<button onclick="jumpToQuestion(${i})" class="q-circle ${stateClass}">${i + 1}</button>`;
            }

            const overviewDiv = document.createElement('div');
            overviewDiv.id = 'overview-overlay';
            overviewDiv.className = 'overview-panel fade-in';
            overviewDiv.innerHTML = `
                <h3 style="font-size: 1.35rem; font-weight: bold; margin-bottom: 16px; text-align: center; color: #f8fafc;">प्रश्नावली ओवरव्यू (कुल ${questions.length} प्रश्न)</h3>
                <div class="grid-container">
                    ${gridHtml}
                </div>
                <div class="flex justify-center" style="padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1);">
                    <button onclick="closeOverview()" class="btn-action btn-skip" style="margin: 0 8px;">वापस जाएँ</button>
                    <button onclick="submitQuizFromOverview()" class="btn-action btn-next" style="margin: 0 8px;">सबमिट करें</button>
                </div>
            `;
            appDiv.appendChild(overviewDiv);
        }

        function closeOverview() {
            const overlay = document.getElementById('overview-overlay');
            if(overlay) overlay.remove();
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            closeOverview();
            renderQuestion();
        }

        function submitQuizFromOverview() {
            closeOverview();
            renderResultScreen();
        }

        function renderResultScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let emoji = "";
            
            if (percentage === 100) { message = "उत्कृष्ट! आपने अध्याय 6 (मानचित्र अध्ययन) के सभी प्रश्नों के सही उत्तर दिए हैं!"; emoji = "🏆"; }
            else if (percentage >= 80) { message = "शानदार प्रदर्शन! मानचित्र अध्ययन पर आपकी पकड़ बहुत मजबूत है।"; emoji = "🌟"; }
            else if (percentage >= 50) { message = "अच्छा प्रयास! समोच्च रेखाओं एवं उच्चावच विधियों का पुनः अभ्यास करें।"; emoji = "👍"; }
            else { message = "अभ्यास जारी रखें! पाठ्यपुस्तक को ध्यान से पढ़ें और पुनः प्रयास करें।"; emoji = "📚"; }

            const strokeDasharray = `${percentage}, 100`;
            const colorClass = percentage >= 80 ? '#22c55e' : percentage >= 50 ? '#eab308' : '#ef4444';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in overflow-y-auto" style="padding: 32px;">
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 24px;">क्विज़ परिणाम ${emoji}</h2>
                    
                    <div style="position: relative; width: 180px; height: 180px; margin-bottom: 28px; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="width: 100%; height: 100%;">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="circle" stroke="${colorClass}" stroke-dasharray="${strokeDasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 2.25rem; font-weight: 900; color: #f8fafc;">${score}</span>
                            <span style="font-size: 0.85rem; font-weight: bold; color: #94a3b8;">/ ${questions.length}</span>
                        </div>
                    </div>

                    <p style="font-size: 1.4rem; font-weight: bold; margin-bottom: 8px; color: #f8fafc;">${percentage}% अंक</p>
                    <p style="font-size: 1.05rem; color: #cbd5e1; margin-bottom: 32px; max-width: 450px; line-height: 1.5;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action btn-next" style="padding: 14px 36px; border-radius: 12px; font-size: 1.05rem;">
                        पुनः प्रयास करें
                    </button>
                </div>
            `;
        }

        renderStartScreen();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>इतिहास क्विज़ - हिंद-चीन में राष्ट्रवादी आंदोलन</title>
    <style>
        /* Base Offline Styles replacing Tailwind */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fffbeb;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(217, 119, 6, 0.15);
            width: 100%;
            max-width: 896px;
            height: 90vh;
            min-height: 600px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 1.125rem;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #d97706;
            background-color: #fef3c7;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Layout Utilities */
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        /* Header & Elements */
        .quiz-header { padding: 32px 32px 16px 32px; border-bottom: 1px solid #f1f5f9; background: rgba(255,255,255,0.5); position: relative; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 12px; overflow: hidden; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06); }
        .progress-bar-fill { background: linear-gradient(to right, #fbbf24, #d97706); height: 12px; border-radius: 9999px; transition: all 0.5s ease-out; }
        .profile-icon { position: absolute; top: 24px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-start { padding: 16px 40px; background: linear-gradient(to right, #d97706, #b45309); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 20px 25px -5px rgba(217, 119, 6, 0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 32px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; margin-left: 8px; font-size: 1rem; }
        .btn-next { background-color: #1e293b; color: white; }
        .btn-skip { background-color: #e2e8f0; color: #475569; }
        
        /* Overview Panel */
        .overview-panel { position: absolute; inset: 0; background: white; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 12px; padding: 16px 0; flex-1; overflow-y: auto; }
        .grid-container::-webkit-scrollbar { width: 6px; }
        .grid-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        .q-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.9rem; }
        
        /* Circle States */
        .state-default { background: linear-gradient(135deg, #fbbf24, #d97706); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
    </style>
</head>
<body>

    <div id="app" class="glass-panel">
        <!-- Screens will be injected here by JS -->
    </div>

    <script>
        const questions = [
            { q: "ऐतिहासिक रूप से 'हिंद-चीन' (Indo-China) क्षेत्र के अंतर्गत कौन से तीन आधुनिक देश आते हैं?", o: ["भारत, चीन और म्यांमार", "वियतनाम, लाओस और कंबोडिया", "थाईलैंड, मलेशिया और सिंगापुर", "कंबोडिया, चीन और वियतनाम"], a: 1 },
            { q: "हिंद-चीन क्षेत्र का कुल क्षेत्रफल लगभग कितना वर्ग किलोमीटर है?", o: ["1 लाख वर्ग किमी", "2.8 लाख वर्ग किमी (लगभग 3 लाख)", "5 लाख वर्ग किमी", "10 लाख वर्ग किमी"], a: 1 },
            { q: "हिंद-चीन क्षेत्र के वियतनाम और लाओस के उत्तरी भाग पर ऐतिहासिक रूप से किस देश का सांस्कृतिक व राजनीतिक प्रभाव था?", o: ["भारत का", "चीन का (China)", "इंग्लैंड का", "फ्रांस का"], a: 1 },
            { q: "हिंद-चीन के कंबोडिया और लाओस के दक्षिणी क्षेत्रों पर प्राचीन काल से किस देश की संस्कृति का गहरा प्रभाव था?", o: ["चीन का", "भारत का (India)", "जापान का", "मलेशिया का"], a: 1 },
            { q: "कंबोडिया में स्थित विश्वप्रसिद्ध 'अंकोरवाट का मंदिर' (Angkor Wat Temple) का निर्माण 12वीं शताब्दी में किस राजा ने करवाया था?", o: ["सूर्यवर्मन द्वितीय (Suryavarman II)", "जयवर्मन सप्तम", "रुद्रवर्मन", "महेंद्रवर्मन"], a: 0 },
            { q: "अंकोरवाट के विशाल मंदिर में मुख्य रूप से किस हिंदू देवता की मूर्ति स्थापित है?", o: ["भगवान शिव", "भगवान विष्णु (Lord Vishnu)", "भगवान ब्रह्मा", "भगवान गणेश"], a: 1 },
            { q: "हिंद-चीन क्षेत्र में व्यापार के उद्देश्य से सबसे पहले पहुँचने वाले यूरोपीय व्यापारी कौन थे?", o: ["फ्रांसीसी", "डच", "पुर्तगाली (Portuguese)", "अंग्रेज"], a: 2 },
            { q: "पुर्तगालियों ने हिंद-चीन के किस महत्वपूर्ण बंदरगाह को अपना मुख्य व्यापारिक केंद्र बनाया था?", o: ["टोंकिन", "मलेक्का (Malacca)", "साइगॉन", "हैफोंग"], a: 1 },
            { q: "हिंद-चीन क्षेत्र पर पूरी तरह से अपना औपनिवेशिक नियंत्रण स्थापित करने वाला मुख्य यूरोपीय देश कौन सा था?", o: ["इंग्लैंड", "स्पेन", "फ्रांस (France)", "डच"], a: 2 },
            { q: "फ्रांसीसियों ने वियतनाम के किस हिस्से पर 1862 में सबसे पहले सैन्य अधिकार जमाया और उसे अपना उपनिवेश बनाया?", o: ["कोचिन-चीन (Cochin-China)", "टोंकिन", "अन्नाम", "लाओस"], a: 0 },
            { q: "फ्रांस ने संपूर्ण हिंद-चीन (वियतनाम, लाओस और कंबोडिया) को मिलाकर किस वर्ष 'फ्रेंच इंडो-चाइना' संघ का गठन किया?", o: ["1862 ई.", "1887 ई. (1887)", "1905 ई.", "1914 ई."], a: 1 },
            { q: "हिंद-चीन में बसने वाले फ्रांसीसी नागरिकों या निवासियों को स्थानीय भाषा में क्या कहा जाता था?", o: ["बुर्जुआ", "कोलोन (Colons)", "सर्फ", "कुलाक"], a: 1 },
            { q: "फ्रांसीसी उपनिवेशवादियों ने वियतनाम की अर्थव्यवस्था के विकास के लिए मुख्य रूप से किस क्षेत्र में बुनियादी ढांचा और नहरें बनवाईं?", o: ["लोहा उद्योग", "चावल उत्पादन और मेकांग डेल्टा क्षेत्र (Rice Cultivation)", "कपड़ा उद्योग", "कोयला खनन"], a: 1 },
            { q: "20वीं शताब्दी के प्रारंभ में वियतनाम विश्व का कौन सा बड़ा निर्यातक देश बन गया था?", o: ["पहला कपास निर्यातक", "तीसरा सबसे बड़ा चावल निर्यातक (3rd Rice Exporter)", "दूसरा चाय निर्यातक", "शीर्ष कोयला निर्यातक"], a: 1 },
            { q: "फ्रांसीसियों ने वियतनामी जनता को अपनी संस्कृति में ढालने के लिए 1907 में साइगॉन में किस स्कूल की स्थापना की थी?", o: ["टोंकिन फ्री स्कूल (Tonkin Free School)", "फ्रेंच एकेडमी", "मार्क्सवादी स्कूल", "साइगॉन कॉलेज"], a: 0     },
            { q: "टोंकिन फ्री स्कूल की स्थापना का मुख्य उद्देश्य क्या था जो पश्चिमी शिक्षा पर आधारित था?", o: ["मुफ़्त में विज्ञान पढ़ाना", "वियतनामियों को फ्रांसीसी भाषा, संस्कृति और आधुनिक रूप-रंग अपनाना सिखाना", "कृषि सिखाना", "सेना तैयार करना"], a: 1 },
            { q: "वियतनाम के राष्ट्रवादियों ने फ्रांसीसी शासन के खिलाफ 1903 में 'दुई तान होई' (Revolutionary Society) नामक संगठन बनाया, इसके नेता कौन थे?", o: ["हो ची मिन्ह", "फान बोई चाऊ (Phan Boi Chau)", "फान चू त्रिन्ह", "कुआंग दे"], a: 1 },
            { q: "फान बोई चाऊ ने वियतनामी स्वतंत्रता संघर्ष पर आधारित कौन सी प्रसिद्ध ऐतिहासिक पुस्तक लिखी थी जिसने हलचल मचा दी?", o: ["द ऑरिजिन ऑफ वियतनाम", "द हिस्ट्री ऑफ द लॉस ऑफ वियतनाम (The History of the Loss of Vietnam)", "अप्रैल थीसिस", "हिंद-चीन का इतिहास"], a: 1 },
            { q: "वियतनाम के किस राष्ट्रवादी नेता ने राजशाही का घोर विरोध किया और गणतंत्र की स्थापना के लिए 'फ्रांसीसी क्रांतिकारी विचारों' का समर्थन किया?", o: ["फान बोई चाऊ", "फान चू त्रिन्ह (Phan Chu Trinh)", "बाओ दाई", "नगो दिन्ह दिएम"], a: 1 },
            { q: "20वीं सदी के पहले दशक में वियतनामी छात्रों द्वारा जापान जाकर शिक्षा पाने और स्वतंत्रता के लिए समर्थन जुटाने के आंदोलन को क्या कहते हैं?", o: ["जापान चलो", "पूर्व की ओर चलो आंदोलन (Go East Movement)", "साम्यवादी लहर", "छात्र मोर्चा"], a: 1 },
            { q: "वियतनाम की आजादी के सबसे महान नायक 'नगुयेन आई क्वाक' का इतिहास में प्रसिद्ध नाम क्या है?", o: ["फान बोई चाऊ", "हो ची मिन्ह (Ho Chi Minh)", "बाओ दाई", "नगो दिन्ह दिएम"], a: 1 },
            { q: "हो ची मिन्ह ने पेरिस और मॉस्को में शिक्षा पाकर मार्क्सवादी विचारधारा के तहत 1930 में किस दल की स्थापना की थी?", o: ["वियतनामी कांग्रेस पार्टी", "वियतनाम कम्युनिस्ट पार्टी या हिंद-चीन कम्युनिस्ट पार्टी (Communist Party)", "उदारवादी दल", "रेड कॉर्प्स"], a: 1 },
            { q: "द्वितीय विश्व युद्ध (1939-1945) के दौरान फ्रांस की कमजोरी का फायदा उठाकर हिंद-चीन पर किस देश ने कब्जा कर लिया था?", o: ["जर्मनी", "जापान (Japan)", "इंग्लैंड", "चीन"], a: 1 },
            { q: "हो ची मिन्ह ने जापानी और फ्रांसीसी दोनों सेनाओं से लड़ने के लिए 1941 में किस क्रांतिकारी लीग का गठन किया था?", o: ["वियतनाम मुक्ति लीग या वियतमिन्ह (Vietminh)", "लाल सेना", "गुरिल्ला मोर्चा", "आजाद मोर्चा"], a: 0 },
            { q: "द्वितीय विश्व युद्ध में जापान की हार के बाद वियतमिन्ह ने 2 सितंबर 1945 को वियतनाम को क्या घोषित किया?", o: ["फ्रांसीसी प्रांत", "वियतनाम लोकतांत्रिक गणराज्य (Democratic Republic of Vietnam)", "राजशाही राज्य", "जापानी क्षेत्र"], a: 1 },
            { q: "वियतनाम लोकतांत्रिक गणराज्य (1945) के प्रथम अध्यक्ष या प्रधानमंत्री कौन बने थे?", o: ["फान बोई चाऊ", "हो ची मिन्ह (Ho Chi Minh)", "बाओ दाई", "नगो दिन्ह दिएम"], a: 1 },
            { q: "फ्रांस ने वियतनाम में राष्ट्रीय सरकार को चुनौती देने के लिए अन्नाम के किस पूर्व राजा को साइगॉन में अपनी कठपुतली सरकार का शासक बनाया?", o: ["हो ची मिन्ह", "बाओ दाई (Bao Dai)", "नगो दिन्ह दिएम", "सिहानुक"], a: 1 },
            { q: "फ्रांसीसी सेना और वियतमिन्ह (हो ची मिन्ह की सेना) के बीच 1954 में कौन सा ऐतिहासिक युद्ध हुआ जिसमें फ्रांस की शर्मनाक हार हुई?", o: ["वाटरलू का युद्ध", "दीएन-बीएन-फू का युद्ध (Battle of Dien Bien Phu)", "सेडान का युद्ध", "साइगॉन का युद्ध"], a: 1 },
            { q: "दीएन-बीएन-फू के प्रसिद्ध युद्ध में फ्रांस का कौन सा कमांडर व पूरी सेना घिर गई थी और आत्मसमर्पण करना पड़ा था?", o: ["जनरल नवार", "जनरल डी कास्त्री", "नेपोलियन तृतीय", "जनरल दिएम"], a: 1 },
            { q: "फ्रांस की हार के बाद मई 1954 में हिंद-चीन संकट को सुलझाने के लिए कौन सा अंतरराष्ट्रीय समझौता हुआ था?", o: ["पेरिस समझौता", "जिनेवा समझौता (Geneva Accords)", "लंदन संधि", "बर्लिन समझौता"], a: 1 },
            { q: "1954 के जिनेवा समझौते के तहत वियतनाम को अस्थाई रूप से कितने भागों में विभाजित कर दिया गया?", o: ["तीन भागों में", "दो भागों में (उत्तरी वियतनाम और दक्षिणी वियतनाम)", "चार भागों में", "विभाजन नहीं हुआ"], a: 1     },
            { q: "जिनेवा समझौते के अनुसार उत्तरी वियतनाम और दक्षिणी वियतनाम के बीच की विभाजन रेखा किसे माना गया?", o: ["38वीं समानांतर रेखा", "17वीं समानांतर रेखा (17th Parallel)", "रेडक्लिफ रेखा", "मैकमोहन रेखा"], a: 1 },
            { q: "विभाजन के बाद उत्तरी वियतनाम में किसकी सरकार बनी जो साम्यवादी सिद्धांतों पर आधारित थी?", o: ["बाओ दाई की", "हो ची मिन्ह की साम्यवादी सरकार (Communist Government)", "नगो दिन्ह दिएम की", "अमेरिका की"], a: 1 },

        let currentQuestion = 0;

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            questionStates.fill('default');
            renderQuestion();
        }

        function renderQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            let optionsHtml = '';
            q.o.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index}, this)" class="option-btn">
                        <span>${opt}</span>
                        <span class="icon-container hidden"></span>
                    </button>
                `;
            });

            appDiv.innerHTML = `
                <!-- Header -->
                <div class="quiz-header">
                    <div class="flex justify-between items-center" style="margin-bottom: 12px; padding-right: 50px;">
                        <span style="font-size: 0.875rem; font-weight: bold; color: #d97706; text-transform: uppercase;">प्रश्न ${currentQuestion + 1} / ${questions.length}</span>
                        <span style="font-size: 0.875rem; font-weight: bold; color: #475569; background: #e2e8f0; padding: 4px 12px; border-radius: 9999px;">स्कोर: ${score}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                    <!-- Right Menu Icon for Navigation -->
                    <div class="profile-icon" onclick="openOverview()" title="प्रश्नावली ओवरव्यू">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </div>
                </div>

                <!-- Question Area -->
                <div class="flex-1 overflow-y-auto p-8 fade-in flex flex-col" style="padding: 32px;">
                    <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 32px; line-height: 1.4; color: #0f172a;">${q.q}</h2>
                    <div id="options-container" class="flex-1 flex flex-col justify-center">
                        ${optionsHtml}
                    </div>
                </div>

                <!-- Footer / Actions -->
                <div class="flex justify-between items-center" style="padding: 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; min-height: 90px;">
                    <div>
                        <button id="skip-btn" onclick="skipQuestion()" class="btn-action btn-skip">स्किप करें</button>
                    </div>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden btn-action btn-next">
                        ${currentQuestion === questions.length - 1 ? 'परिणाम देखें' : 'अगला प्रश्न'}
                    </button>
                </div>
            `;
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

            allBtns.forEach((btn, index) => {
                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');
                iconContainer.classList.remove('hidden');

                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #16a34a; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }
                
                if (index === selectedIndex && selectedIndex !== q.a) {
                    btn.classList.add('wrong');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #dc2626; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                }
            });

            if (selectedIndex === q.a) {
                score++;
                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function skipQuestion() {
            questionStates[currentQuestion] = 'skipped';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                renderResultScreen();
            }
        }

        function openOverview() {
            let gridHtml = '';
            for(let i = 0; i < questions.length; i++) {
                let stateClass = 'state-default';
                if(questionStates[i] === 'correct') stateClass = 'state-correct';
                if(questionStates[i] === 'wrong') stateClass = 'state-wrong';
                if(questionStates[i] === 'skipped') stateClass = 'state-skipped';
                
                gridHtml += `<button onclick="jumpToQuestion(${i})" class="q-circle ${stateClass}">${i + 1}</button>`;
            }

            const overviewDiv = document.createElement('div');
            overviewDiv.id = 'overview-overlay';
            overviewDiv.className = 'overview-panel fade-in';
            overviewDiv.innerHTML = `
                <h3 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 16px; text-align: center; color: #1e293b;">प्रश्नावली ओवरव्यू</h3>
                <div style="display: flex; justify-content: center; gap: 16px; margin-bottom: 12px; font-size: 0.85rem; font-weight: bold;">
                    <span style="color: #fbbf24;">■ बिना प्रयास</span>
                    <span style="color: #22c55e;">■ सही</span>
                    <span style="color: #ef4444;">■ गलत</span>
                    <span style="color: #eab308;">■ स्किप किया</span>
                </div>
                <div class="grid-container">
                    ${gridHtml}
                </div>
                <div class="flex justify-center" style="padding-top: 16px; border-top: 1px solid #e2e8f0; background: #fff;">
                    <button onclick="closeOverview()" class="btn-action btn-skip" style="margin: 0 8px;">ओवरव्यू बंद करें</button>
                    <button onclick="submitQuizFromOverview()" class="btn-action btn-next" style="margin: 0 8px; background-color: #d97706;">क्विज़ सबमिट करें</button>
                </div>
            `;
            appDiv.appendChild(overviewDiv);
        }

        function closeOverview() {
            const overlay = document.getElementById('overview-overlay');
            if(overlay) overlay.remove();
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            closeOverview();
            renderQuestion();
        }

        function submitQuizFromOverview() {
            closeOverview();
            renderResultScreen();
        }

        function renderResultScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let emoji = "";
            
            if (percentage === 100) { message = "अतुलनीय! हिंद-चीन में राष्ट्रवादी आंदोलन अध्याय पर आपका पूरा नियंत्रण है।"; emoji = "🏆"; }
            else if (percentage >= 80) { message = "बहुत बढ़िया! हिंद-चीन के इतिहास और वियतनामी संघर्ष पर आपकी गहरी पकड़ है।"; emoji = "🌟"; }
            else if (percentage >= 50) { message = "अच्छा प्रयास! वैचारिक समझ को बेहतर करने के लिए फिर से प्रयास करें।"; emoji = "👍"; }
            else { message = "कोई बात नहीं! एक बार अध्याय को दोहराएं और पुनः प्रयास करें।"; emoji = "📚"; }

            const strokeDasharray = `${percentage}, 100`;
            const colorClass = percentage >= 80 ? '#10b981' : percentage >= 50 ? '#f59e0b' : '#ef4444';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in overflow-y-auto" style="padding: 32px;">
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 32px;">क्विज़ परिणाम ${emoji}</h2>
                    
                    <div style="position: relative; width: 192px; height: 192px; margin-bottom: 32px; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="width: 100%; height: 100%;">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="circle" stroke="${colorClass}" stroke-dasharray="${strokeDasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 2.25rem; font-weight: 900;">${score}</span>
                            <span style="font-size: 0.875rem; font-weight: bold; color: #94a3b8;">/ 100</span>
                        </div>
                    </div>

                    <p style="font-size: 1.5rem; font-weight: bold; margin-bottom: 8px;">${percentage}% अंक</p>
                    <p style="font-size: 1.125rem; color: #d97706; margin-bottom: 40px; max-width: 448px;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action" style="background: white; border: 2px solid #e2e8f0; color: #475569; padding: 16px 32px; border-radius: 12px; font-size: 1.125rem;">
                        फिर से प्रयास करें
                    </button>
                </div>
            `;
        }

        // Initialize App
        renderStartScreen();
    </script>
</body>
</html>

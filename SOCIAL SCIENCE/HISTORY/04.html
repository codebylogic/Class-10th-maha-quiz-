<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>इतिहास क्विज़ - भारत में राष्ट्रवाद</title>
    <style>
        /* Base Offline Styles replacing Tailwind */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff7ed;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(234, 88, 12, 0.15);
            width: 100%;
            max-width: 896px;
            height: 90vh;
            min-height: 600px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 1.125rem;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #ea580c;
            background-color: #fff7ed;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Layout Utilities */
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        /* Header & Elements */
        .quiz-header { padding: 32px 32px 16px 32px; border-bottom: 1px solid #f1f5f9; background: rgba(255,255,255,0.5); position: relative; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 12px; overflow: hidden; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06); }
        .progress-bar-fill { background: linear-gradient(to right, #fca5a5, #ea580c); height: 12px; border-radius: 9999px; transition: all 0.5s ease-out; }
        .profile-icon { position: absolute; top: 24px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-start { padding: 16px 40px; background: linear-gradient(to right, #ea580c, #c2410c); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 20px 25px -5px rgba(234, 88, 12, 0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 32px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; margin-left: 8px; font-size: 1rem; }
        .btn-next { background-color: #1e293b; color: white; }
        .btn-skip { background-color: #e2e8f0; color: #475569; }
        
        /* Overview Panel */
        .overview-panel { position: absolute; inset: 0; background: white; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 12px; padding: 16px 0; flex-1; overflow-y: auto; }
        .grid-container::-webkit-scrollbar { width: 6px; }
        .grid-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        .q-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.9rem; }
        
        /* Circle States */
        .state-default { background: linear-gradient(135deg, #fca5a5, #ea580c); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
    </style>
</head>
<body>

    <div id="app" class="glass-panel">
        <!-- Screens will be injected here by JS -->
    </div>

    <script>
        const questions = [
            { q: "राष्ट्र के प्रति प्रेम, समर्पण और राजनीतिक चेतना की सामूहिक भावना को क्या कहते हैं?", o: ["साम्राज्यवाद", "राष्ट्रवाद (Nationalism)", "उदारवाद", "पूंजीवाद"], a: 1 },
            { q: "महात्मा गांधी दक्षिण अफ्रीका से भारत किस वर्ष स्थायी रूप से वापस लौटे थे?", o: ["1913 ई. में", "1915 ई. में (9 जनवरी)", "1917 ई. में", "1919 ई. में"], a: 1 },
            { q: "महात्मा गांधी ने भारत में अपना पहला सफल 'सत्याग्रह' आंदोलन 1917 में कहाँ शुरू किया था?", o: ["खेड़ा", "अहमदाबाद", "चंपारण (Bihar)", "बारडोली"], a: 2 },
            { q: "बिहार के चंपारण में किसानों को अपनी भूमि के कितने हिस्से पर नील की खेती करना अनिवार्य था जिसे 'तिनकटिया प्रणाली' कहते थे?", o: ["3/20 भाग पर (3 कट्टा प्रति बीघा)", "1/20 भाग पर", "5/20 भाग पर", "10/20 भाग पर"], a: 0 },
            { q: "चंपारण के किस किसान नेता ने लखनऊ कांग्रेस अधिवेशन (1916) में गांधी जी को बिहार आने का निमंत्रण दिया था?", o: ["मजहरुल हक", "राजकुमार शुक्ल (Rajkumar Shukla)", "अनुग्रह नारायण सिंह", "श्रीकृष्ण सिंह"], a: 1 },
            { q: "गांधी जी ने 1918 में गुजरात के किस जिले में फसल नष्ट होने पर भी कर वसूलने के खिलाफ सत्याग्रह चलाया था?", o: ["अहमदाबाद", "खेड़ा (Kheda)", "सूरत", "बारडोली"], a: 1 },
            { q: "1918 में अहमदाबाद के मिल मजदूरों के वेतन वृद्धि के लिए गांधी जी ने पहली बार किस अस्त्र का प्रयोग किया था?", o: ["असहयोग", "भूख हड़ताल या आमरण अनशन (Hunger Strike)", "धरना", "सैनिक विद्रोह"], a: 1 },
            { q: "ब्रिटिश सरकार ने बिना मुकदमा चलाए किसी भी भारतीय को जेल में डालने के लिए मार्च 1919 में कौन सा काला कानून पास किया?", o: ["रौलट एक्ट (Rowlatt Act)", "वर्नाक्यूलर प्रेस एक्ट", "आर्म्स एक्ट", "इल्बर्ट बिल"], a: 0 },
            { q: "भारतीयों द्वारा रौलट एक्ट को क्या नाम दिया गया क्योंकि इसमें अपील, दलील और वकील का कोई अधिकार नहीं था?", o: ["श्वेत कानून", "काला कानून (Black Act)", "उदार कानून", "फौजी कानून"], a: 1 },
            { q: "रौलट एक्ट के विरोध में पंजाब के किन दो लोकप्रिय नेताओं को अमृतसर से गिरफ्तार कर लिया गया था?", o: ["भगत सिंह और सुखदेव", "डॉ. सत्यपाल और डॉ. सैफुद्दीन किचलू", "लाला लाजपत राय", "अजीत सिंह"], a: 1 },
            { q: "अमृतसर के जलियांवाला बाग में शांतिपूर्ण जनसभा पर जनरल डायर ने किस तिथि को अंधाधुंध गोलियां चलवाईं?", o: ["6 अप्रैल 1919", "13 अप्रैल 1919 ई. को (वैशाखी का दिन)", "1 मई 1919", "15 अगस्त 1919"], a: 1 },
            { q: "जलियांवाला बाग हत्याकांड के विरोध में किस भारतीय मनीषी ने ब्रिटिश सरकार द्वारा दी गई 'नाइट' (Sir) की उपाधि त्याग दी थी?", o: ["महात्मा गांधी", "रवींद्रनाथ टैगोर (Rabindranath Tagore)", "गोपाल कृष्ण गोखले", "चित्तरंजन दास"], a: 1 },
            { q: "जलियांवाला बाग हत्याकांड की जांच के लिए ब्रिटिश सरकार ने किस समिति का गठन किया था?", o: ["साइमन कमीशन", "हंटर समिति (Hunter Committee)", "वेलबी आयोग", "इल्बर्ट समिति"], a: 1 },
            { q: "तुर्की के सुल्तान (खलीफा) के अधिकार और गरिमा की रक्षा के लिए भारत में 1919-20 में कौन सा आंदोलन शुरू हुआ?", o: ["असहयोग आंदोलन", "خिलाफत आंदोलन (Khilafat Movement)", "सविनय अवज्ञा", "वहाबी आंदोलन"], a: 1 },
            { q: "भारत में खिलाफत आंदोलन का नेतृत्व मुख्य रूप से किन दो भाइयों (अली बंधुओं) ने किया था?", o: ["शौकत अली और मोहम्मद अली (Ali Brothers)", "खान अब्दुल गफ्फार खान", "सैयद अहमद", "मौलाना आजाद"], a: 0 },
            { q: "गांधी जी के नेतृत्व में देश का पहला राष्ट्रव्यापी जन आंदोलन 'असहयोग आंदोलन' किस वर्ष प्रारंभ हुआ?", o: ["1917 ई.", "1919 ई.", "1920 ई. (1 अगस्त)", "1922 ई."], a: 2 },
            { q: "असहयोग आंदोलन का मुख्य प्रस्ताव कांग्रेस के किस विशेष अधिवेशन (सितंबर 1920) में पारित किया गया था?", o: ["कलकत्ता अधिवेशन (Calcutta Session)", "नागपुर अधिवेशन", "मद्रास अधिवेशन", "गया अधिवेशन"], a: 0 },
            { q: "असहयोग आंदोलन के दौरान गांधी जी ने अंग्रेजों द्वारा दी गई किस शीर्ष उपाधि को वापस लौटा दिया था?", o: ["नाइटहुड", "कैसर-ए-हिंद (Kaisar-i-Hind)", "राय बहादुर", "सर"], a: 1 },
            { q: "उत्तर प्रदेश के गोरखपुर जिले में चौरी-चौरा नामक स्थान पर उग्र भीड़ द्वारा पुलिस थाने में आग लगाने की घटना कब हुई?", o: ["1 अगस्त 1920", "5 फरवरी 1922 ई. को", "12 फरवरी 1922", "9 अगस्त 1925"], a: 1 },
            { q: "चौरी-चौरा की हिंसक घटना से आहत होकर गांधी जी ने किस आंदोलन को तुरंत स्थगित (वापस ले लिया) कर दिया था?", o: ["खिलाफत आंदोलन", "असहयोग आंदोलन (Non-Cooperation Movement)", "सविनय अवज्ञा", "भारत छोड़ो"], a: 1 },
            { q: "कांग्रेस के भीतर विधान परिषदों के चुनावों में भाग लेने के लिए चित्तरंजन दास और मोतीलाल नेहरू ने 1923 में किस दल का गठन किया?", o: ["गदर पार्टी", "स्वराज दल या स्वराज पार्टी (Swaraj Party)", "फॉरवर्ड ब्लॉक", "कम्युनिस्ट पार्टी"], a: 1 },
            { q: "स्वराज पार्टी का पहला अधिवेशन मार्च 1923 में बिहार के पड़ोसी प्रांत के किस शहर में हुआ था?", o: ["पटना", "इलाहाबाद (Allahabad)", "लखनऊ", "गया"], a: 1 },
            { q: "1919 के संवैधानिक सुधारों की समीक्षा के लिए ब्रिटिश सरकार ने 1927 में सर जॉन साइमन के नेतृत्व में क्या बनाया?", o: ["हंटर आयोग", "साइमन कमीशन (Simon Commission)", "क्रिप्स मिशन", "कैबिनेट मिशन"], a: 1 },
            { q: "1928 में जब साइमन कमीशन भारत (बंबई) पहुँचा, तो इसका तीव्र विरोध और 'साइमन गो बैक' के नारे क्यों लगे?", o: ["वह बहुत देर से आया था", "क्योंकि इस सात सदस्यीय आयोग में एक भी भारतीय शामिल नहीं था (All-White Commission)", "वह टैक्स बढ़ाना चाहता था", "उसका कोई उद्देश्य नहीं था"], a: 1 },
            { q: "लाहौर में साइमन कमीशन के खिलाफ शांतिपूर्ण जुलूस का नेतृत्व करते समय लाठीचार्ज से किस महान नेता की मृत्यु हो गई थी?", o: ["भगत सिंह", "लाला लाजपत राय (Lala Lajpat Rai)", "बाल गंगाधर तिलक", "बिपिन चंद्र पाल"], a: 1 },
            { q: "कांग्रेस के किस ऐतिहासिक वार्षिक अधिवेशन (दिसंबर 1929) में जवाहरलाल नेहरू की अध्यक्षता में 'पूर्ण स्वराज्य' का प्रस्ताव पास हुआ?", o: ["कलकत्ता अधिवेशन", "लाहौर अधिवेशन (Lahore Session)", "कराची अधिवेशन", "हरिपुरा अधिवेशन"], a: 1 },
            { q: "लाहौर अधिवेशन के प्रस्ताव के अनुसार देश में पहली बार किस तिथि को संपूर्ण स्वतंत्रता दिवस मनाया गया था?", o: ["15 अगस्त 1930", "26 जनवरी 1930 ई. को (इसी याद में 26 जनवरी को गणतंत्र दिवस चुना गया)", "2 अक्टूबर 1930", "26 नवंबर 1949"], a: 1 },
            { q: "गांधी जी ने ससविनय अवज्ञा आंदोलन की शुरुआत अपने 78 सहयोगियों के साथ साबरमती से कहाँ तक की यात्रा करके की थी?", o: ["चंपारण", "दांडी यात्रा (Dandi March)", "खेड़ा", "अहमदाबाद मिल"], a: 1 },
            { q: "गांधी जी ने दांडी के समुद्र तट पर पहुँचकर किस तिथि को नमक कानून तोड़ा और सविनय अवज्ञा आंदोलन प्रारंभ किया?", o: ["12 मार्च 1930", "6 अप्रैल 1930 ई. को", "12 अप्रैल 1930", "5 मई 1930"], a: 1 },
            { q: "सविनय अवज्ञा आंदोलन के दौरान बिहार में समुद्र तट न होने के कारण जनता ने नमक कानून की जगह किस कर को देने से इनकार किया?", o: ["चौकीदारी कर (Chaukidari Tax विरोध आंदोलन)", "जमींदारी कर", "आयकर", "रोड टैक्स"], a: 0 },
            { q: "उत्तर-पश्चिम सीमांत प्रांत (पेशावर) में सविनय अवज्ञा आंदोलन का नेतृत्व करने वाले 'सीमांत गांधी' कौन थे?", o: ["मोहम्मद अली", "खान अब्दुल गफ्फार खान (Frontier Gandhi / लाल कुर्ती दल)", "मौलाना आजाद", "शौकत अली"], a: 1 },
            { q: "सविनय अवज्ञा आंदोलन को रोकने और गोलमेज सम्मेलन में कांग्रेस को शामिल करने के लिए 5 मार्च 1931 को कौन सा समझौता हुआ?", o: ["पुनः पैक्ट", "गांधी-इरविन समझौता (Gandhi-Irwin Pact)", "लखनऊ समझौता", "शिमला समझौता"], a: 1 },
            { q: "महात्मा गांधी ने कांग्रेस के एकमात्र प्रतिनिधि के रूप में किस गोलमेज सम्मेलन (लंदन) में भाग लिया था जो असफल रहा?", o: ["प्रथम गोलमेज सम्मेलन", "द्वितीय गोलमेज सम्मेलन (Second Round Table Conference)", "तृतीय गोलमेज सम्मेलन", "तीनों में"], a: 1 },

        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let questionStates = new Array(questions.length).fill('default');

        const appDiv = document.getElementById('app');

        function renderStartScreen() {

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            questionStates.fill('default');
            renderQuestion();
        }

        function renderQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            let optionsHtml = '';
            q.o.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index}, this)" class="option-btn">
                        <span>${opt}</span>
                        <span class="icon-container hidden"></span>
                    </button>
                `;
            });

            appDiv.innerHTML = `
                <!-- Header -->
                <div class="quiz-header">
                    <div class="flex justify-between items-center" style="margin-bottom: 12px; padding-right: 50px;">
                        <span style="font-size: 0.875rem; font-weight: bold; color: #ea580c; text-transform: uppercase;">प्रश्न ${currentQuestion + 1} / ${questions.length}</span>
                        <span style="font-size: 0.875rem; font-weight: bold; color: #475569; background: #e2e8f0; padding: 4px 12px; border-radius: 9999px;">स्कोर: ${score}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                    <!-- Right Menu Icon for Navigation -->
                    <div class="profile-icon" onclick="openOverview()" title="प्रश्नावली ओवरव्यू">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </div>
                </div>

                <!-- Question Area -->
                <div class="flex-1 overflow-y-auto p-8 fade-in flex flex-col" style="padding: 32px;">
                    <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 32px; line-height: 1.4; color: #0f172a;">${q.q}</h2>
                    <div id="options-container" class="flex-1 flex flex-col justify-center">
                        ${optionsHtml}
                    </div>
                </div>

                <!-- Footer / Actions -->
                <div class="flex justify-between items-center" style="padding: 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; min-height: 90px;">
                    <div>
                        <button id="skip-btn" onclick="skipQuestion()" class="btn-action btn-skip">स्किप करें</button>
                    </div>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden btn-action btn-next">
                        ${currentQuestion === questions.length - 1 ? 'परिणाम देखें' : 'अगला प्रश्न'}
                    </button>
                </div>
            `;
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

            allBtns.forEach((btn, index) => {
                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');
                iconContainer.classList.remove('hidden');

                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #16a34a; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }
                
                if (index === selectedIndex && selectedIndex !== q.a) {
                    btn.classList.add('wrong');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #dc2626; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                }
            });

            if (selectedIndex === q.a) {
                score++;
                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function skipQuestion() {
            questionStates[currentQuestion] = 'skipped';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                renderResultScreen();
            }
        }

        function openOverview() {
            let gridHtml = '';
            for(let i = 0; i < questions.length; i++) {
                let stateClass = 'state-default';
                if(questionStates[i] === 'correct') stateClass = 'state-correct';
                if(questionStates[i] === 'wrong') stateClass = 'state-wrong';
                if(questionStates[i] === 'skipped') stateClass = 'state-skipped';
                
                gridHtml += `<button onclick="jumpToQuestion(${i})" class="q-circle ${stateClass}">${i + 1}</button>`;
            }

            const overviewDiv = document.createElement('div');
            overviewDiv.id = 'overview-overlay';
            overviewDiv.className = 'overview-panel fade-in';
            overviewDiv.innerHTML = `
                <h3 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 16px; text-align: center; color: #1e293b;">प्रश्नावली ओवरव्यू</h3>
                <div style="display: flex; justify-content: center; gap: 16px; margin-bottom: 12px; font-size: 0.85rem; font-weight: bold;">
                    <span style="color: #fca5a5;">■ बिना प्रयास</span>
                    <span style="color: #22c55e;">■ सही</span>
                    <span style="color: #ef4444;">■ गलत</span>
                    <span style="color: #eab308;">■ स्किप किया</span>
                </div>
                <div class="grid-container">
                    ${gridHtml}
                </div>
                <div class="flex justify-center" style="padding-top: 16px; border-top: 1px solid #e2e8f0; background: #fff;">
                    <button onclick="closeOverview()" class="btn-action btn-skip" style="margin: 0 8px;">ओवरव्यू बंद करें</button>
                    <button onclick="submitQuizFromOverview()" class="btn-action btn-next" style="margin: 0 8px; background-color: #ea580c;">क्विज़ सबमिट करें</button>
                </div>
            `;
            appDiv.appendChild(overviewDiv);
        }

        function closeOverview() {
            const overlay = document.getElementById('overview-overlay');
            if(overlay) overlay.remove();
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            closeOverview();
            renderQuestion();
        }

        function submitQuizFromOverview() {
            closeOverview();
            renderResultScreen();
        }

        function renderResultScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let emoji = "";
            
            if (percentage === 100) { message = "अतुलनीय! भारत में राष्ट्रवाद अध्याय पर आपका पूरा नियंत्रण है।"; emoji = "🏆"; }
            else if (percentage >= 80) { message = "बहुत बढ़िया! स्वाधीनता संग्राम और हमारे गौरवशाली इतिहास पर आपकी गहरी पकड़ है।"; emoji = "🌟"; }
            else if (percentage >= 50) { message = "अच्छा प्रयास! वैचारिक समझ को बेहतर करने के लिए फिर से प्रयास करें।"; emoji = "👍"; }
            else { message = "कोई बात नहीं! एक बार अध्याय को दोहराएं और पुनः प्रयास करें।"; emoji = "📚"; }

            const strokeDasharray = `${percentage}, 100`;
            const colorClass = percentage >= 80 ? '#10b981' : percentage >= 50 ? '#f59e0b' : '#ef4444';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in overflow-y-auto" style="padding: 32px;">
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 32px;">क्विज़ परिणाम ${emoji}</h2>
                    
                    <div style="position: relative; width: 192px; height: 192px; margin-bottom: 32px; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="width: 100%; height: 100%;">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="circle" stroke="${colorClass}" stroke-dasharray="${strokeDasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 2.25rem; font-weight: 900;">${score}</span>
                            <span style="font-size: 0.875rem; font-weight: bold; color: #94a3b8;">/ 100</span>
                        </div>
                    </div>

                    <p style="font-size: 1.5rem; font-weight: bold; margin-bottom: 8px;">${percentage}% अंक</p>
                    <p style="font-size: 1.125rem; color: #ea580c; margin-bottom: 40px; max-width: 448px;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action" style="background: white; border: 2px solid #e2e8f0; color: #475569; padding: 16px 32px; border-radius: 12px; font-size: 1.125rem;">
                        फिर से प्रयास करें
                    </button>
                </div>
            `;
        }

        // Initialize App
        renderStartScreen();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>इतिहास क्विज़ - व्यापार और भूमंडलीकरण</title>
    <style>
        /* Base Offline Styles replacing Tailwind */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f3ff;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(139, 92, 246, 0.15);
            width: 100%;
            max-width: 896px;
            height: 90vh;
            min-height: 600px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 1.125rem;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #8b5cf6;
            background-color: #f5f3ff;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Layout Utilities */
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        /* Header & Elements */
        .quiz-header { padding: 32px 32px 16px 32px; border-bottom: 1px solid #f1f5f9; background: rgba(255,255,255,0.5); position: relative; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 12px; overflow: hidden; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06); }
        .progress-bar-fill { background: linear-gradient(to right, #c084fc, #8b5cf6); height: 12px; border-radius: 9999px; transition: all 0.5s ease-out; }
        .profile-icon { position: absolute; top: 24px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-start { padding: 16px 40px; background: linear-gradient(to right, #8b5cf6, #6d28d9); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 32px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; margin-left: 8px; font-size: 1rem; }
        .btn-next { background-color: #1e293b; color: white; }
        .btn-skip { background-color: #e2e8f0; color: #475569; }
        
        /* Overview Panel */
        .overview-panel { position: absolute; inset: 0; background: white; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 12px; padding: 16px 0; flex-1; overflow-y: auto; }
        .grid-container::-webkit-scrollbar { width: 6px; }
        .grid-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        .q-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.9rem; }
        
        /* Circle States */
        .state-default { background: linear-gradient(135deg, #c084fc, #8b5cf6); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
    </style>
</head>
<body>

    <div id="app" class="glass-panel">
        <!-- Screens will be injected here by JS -->
    </div>

    <script>
        const questions = [
            { q: "विश्व के सभी देशों के बाजारों, संस्कृतियों और आर्थिक प्रणालियों का आपस में जुड़ना क्या कहलाता है?", o: ["सामंतवाद", "भूमेंडलीकरण या वैश्वीकरण (Globalization)", "उपनिवेशवाद", "समाजवाद"], a: 1 },
            { q: "प्राचीन काल में एशिया, यूरोप और उत्तरी अफ्रीका को जोड़ने वाला सबसे प्रसिद्ध व्यापारिक मार्ग कौन सा था?", o: ["उत्तरी मार्ग", "रेशम मार्ग (Silk Route)", "मसाला मार्ग", "ग्रैंड ट्रंक रोड"], a: 1 },
            { q: "प्राचीन रेशम मार्ग (Silk Route) का नाम मुख्य रूप से किस कीमती चीनी वस्तु के वैश्विक व्यापार के कारण पड़ा था?", o: ["चाय", "रेशम (Silk)", "मिट्टी के बर्तन", "लोहा"], a: 1 },
            { q: "सिकंदर महान द्वारा स्थापित वह प्रसिद्ध प्राचीन बंदरगाह और व्यापारिक केंद्र कौन सा था जो तीन महाद्वीपों के मिलन स्थल पर था?", o: ["टायर", "अलेक्जेंड्रिया (Alexandria)", "रोम", "कांस्टेंटिनोपल"], a: 1 },
            { q: "आधुनिक विश्व बाजार (Modern World Market) का विस्तार मुख्य रूप से किस सदी में शुरू हुआ?", o: ["15वीं सदी में", "18वीं सदी के अंत से औद्योगिकीकरण के बाद", "16वीं सदी में", "14वीं सदी में"], a: 1 },
            { q: "विश्वव्यापी व्यापार को गति देने के लिए 19वीं शताब्दी में किस देश ने 'मुक्त व्यापार' (Free Trade) की नीति का कड़ा समर्थन किया?", o: ["फ्रांस", "ब्रिटेन (Britain)", "अमेरिका", "रूस"], a: 1 },
            { q: "19वीं शताब्दी में ब्रिटिश सरकार ने अपने जमींदारों के दबाव में किस अनाज के आयात पर प्रतिबंध लगाने के लिए 'कॉर्न लॉ' (Corn Law) पास किया था?", o: ["गेहूँ", "मक्का (Corn)", "चावल", "जौ"], a: 1 },
            { q: "ब्रिटेन में 'कॉर्न लॉ' (Corn Law) को निरस्त (खत्म) करने का सबसे बड़ा आर्थिक परिणाम क्या हुआ?", o: ["अनाज महँगा हो गया", "खाद्यान्न बहुत सस्ता आयात होने लगा जिससे औद्योगिक विकास और उपभोग बढ़ा", "खेती बढ़ गई", "भुखमरी आ गई"], a: 1 },
            { q: "19वीं सदी में औपनिवेशिक शासकों द्वारा भारत और अन्य एशियाई देशों से अनुबंध के तहत विदेशों में काम कराने के लिए ले जाए जाने वाले मजदूरों को क्या कहा जाता था?", o: ["कृषि दास", "गिरमिटिया मजदूर (Indentured Labours)", "सर्फ", "कुलाक"], a: 1 },
            { q: "बिहार के किस क्षेत्र (भाग) से सबसे अधिक 'गिरमिटिया मजदूर' ब्रिटिश काल में मॉरीशस, फिजी और कैरिबियाई द्वीपों में ले जाए जाते थे?", o: ["पूर्वी क्षेत्र से", "पश्चिमी क्षेत्र से (जैसे भोजपुर, शाहाबाद, सारण आदि)", "उत्तरी क्षेत्र से", "दक्षिणी क्षेत्र से"], a: 1 },
            { q: "गिरमिटिया मजदूरों को विदेशी द्वीपों पर ले जाने के अनुबंध पत्र को मजदूर बोलचाल में क्या कहते थे जिससे 'गिरमिटिया' नाम पड़ा?", o: ["एग्रीमेंट (Agreement)", "गिरमिट (Girmit)", "विलेख", "पट्टा"], a: 1 },
            { q: "1890 के दशक में अफ्रीका में मवेशियों (जंतुओं) में फैलने वाली किस भयानक बीमारी ने वहाँ की आर्थिक आत्मनिर्भरता को नष्ट कर दिया और यूरोपीय उपनिवेशवाद आसान बनाया?", o: ["प्लेग", "रिंडरपेस्ट (Rinderpest / Cattle Plague)", "चेचक", "मैड काऊ रोग"], a: 1 },
            { q: "19वीं सदी के वैश्विक व्यापार में मांस के निर्यात को आसान और सस्ता बनाने के लिए किस तकनीकी आविष्कार का सबसे बड़ा योगदान रहा?", o: ["रेलवे", "पानी के जहाजों में रेफ्रिजरेशन तकनीक (Refrigerated Ships)", "स्टीम इंजन", "टेलीग्राफ"], a: 1 },
            { q: "प्रथम विश्व युद्ध (1914-1918) के बाद विश्व की औद्योगिक और वित्तीय शक्ति का नया केंद्र यूरोप से हटकर कौन सा देश बना?", o: ["ब्रिटेन", "संयुक्त राज्य अमेरिका (USA)", "जापान", "रूस"], a: 1 },
            { q: "अमेरिका में कारों का बड़े पैमाने पर बड़े स्तर पर उत्पादन (Mass Production) शुरू करने के लिए 'असेंबली लाइन' व्यवस्था की शुरुआत किसने की थी?", o: ["जे.पी. मॉर्गन", "हेनरी फोर्ड (Henry Ford)", "रॉकफेलर", "एंड्रयू कार्नेगी"], a: 1 },
            { q: "हेनरी फोर्ड की 'असेंबली लाइन' पद्धति पर बनने वाली दुनिया की पहली सस्ती और प्रसिद्ध कार कौन सी थी?", o: ["टी-मॉडल कार (T-Model Ford)", "ए-मॉडल कार", "मस्टैंग", "फोर्ड फ्यूजन"], a: 0 },
            { q: "विश्व इतिहास की सबसे भयानक और विनाशकारी 'वैश्विक आर्थिक महामंदी' (Great Depression) की शुरुआत किस वर्ष हुई थी?", o: ["1914 ई.", "1929 ई. में (अक्टूबर)", "1939 ई.", "1945 ई."], a: 1 },
            { q: "1929 की आर्थिक महामंदी का तात्कालिक ट्रिगर 24 अक्टूबर 1929 को अमेरिका के किस स्टॉक एक्सचेंज के क्रैश होने से माना जाता है जिसे 'ब्लैक थर्सडे' कहते हैं?", o: ["लंदन स्टॉक एक्सचेंज", "वॉल स्ट्रीट एक्सचेंज (Wall Street Exchange / न्यूयॉर्क)", "टोक्यो एक्सचेंज", "बॉम्बे स्टॉक एक्सचेंज"], a: 1 },
            { q: "1929 की आर्थिक महामंदी का मुख्य कारण क्या था?", o: ["अनाज की भारी कमी", "कृषि उत्पादों का अत्यधिक अधिशेष उत्पादन (Overproduction) और कीमतों का गिरना तथा बैंकों का डूबना", "युद्ध होना", "टैक्स कम होना"], a: 1 },
            { q: "1929 की मंदी के समय अमेरिकी राष्ट्रपति फ्रैंकलिन डी. रूजवेल्ट ने देश को मंदी से निकालने के लिए किस प्रसिद्ध नीति की घोषणा की थी?", o: ["खुले द्वार की नीति", "न्यू डील नीति (New Deal Policy)", "हौसमान नीति", "असहयोग नीति"], a: 1 },
            { q: "रूजवेल्ट की 'न्यू डील' (New Deal) नीति का मुख्य लक्ष्य क्या था?", o: ["टैक्स बढ़ाना", "राज्य के नियंत्रण में निर्माण कार्यों द्वारा रोजगार बढ़ाना, सामाजिक सुरक्षा देना और बैंकिंग व्यवस्था को सुधारना", "विदेशों से युद्ध करना", "खेती बंद करना"], a: 1 },
            { q: "द्वितीय विश्व युद्ध (1939-1945) के बाद वैश्विक अर्थव्यवस्था के पुनर्निर्माण और मौद्रिक स्थिरता के लिए जुलाई 1944 में अमेरिका के न्यू हैम्पशायर में कौन सा ऐतिहासिक सम्मेलन हुआ?", o: ["वियना सम्मेलन", "ब्रेटन वुड्स सम्मेलन (Bretton Woods Conference)", "पेरिस सम्मेलन", "जेनेवा समझौता"], a: 1 },
            { q: "ब्रेटन वुड्स जुड़वाँ (Bretton Woods Twins) के नाम से किन दो वैश्विक वित्तीय संस्थानों को जाना जाता है जिनका गठन 1944 के सम्मेलन से हुआ?", o: ["संयुक्त राष्ट्र और लीग ऑफ नेशंस", "अंतर्राष्ट्रीय मुद्रा कोष (IMF) और विश्व बैंक (World Bank)", "विश्व व्यापार संगठन और यूनेस्को", "सार्क और आसियान"], a: 1 },
            { q: "अंतर्राष्ट्रीय मुद्रा कोष (IMF) और विश्व बैंक ने वैश्विक स्तर पर औपचारिक रूप से अपना कार्य किस वर्ष प्रारंभ किया था?", o: ["1944 ई.", "1947 ई. में (1947)", "1950 ई.", "1960 ई."], a: 1 },
            { q: "ब्रेटन वुड्स व्यवस्था के तहत द्वितीय विश्व युद्ध के बाद विश्व व्यापार और मुद्रा की विनिमय दर को किस देश की मुद्रा के साथ स्थायी रूप से जोड़ दिया गया था?", o: ["ब्रिटिश पाउंड", "अमेरिकी डॉलर (US Dollar)", "फ्रांसीसी फ्रैंक", "रूसी रूबल"], a: 1 },
            { q: "द्वितीय विश्व युद्ध के बाद दुनिया में शांति और सुरक्षा बनाए रखने के लिए 24 अक्टूबर 1945 को किस महान वैश्विक संस्था की स्थापना की गई थी?", o: ["लीग ऑफ नेशंस", "संयुक्त राष्ट्र संघ (United Nations Organization - UNO)", "विश्व बैंक", "रेड क्रॉस"], a: 1 },
            { q: "विकासशील देशों ने विकसित देशों के ब्रेटन वुड्स संस्थानों (IMF, विश्व बैंक) के आर्थिक प्रभुत्व का मुकाबला करने के लिए किस नए अंतरराष्ट्रीय समूह (G-77) का गठन किया?", o: ["जी-8", "समूह-77 या जी-77 (Group of 77)", "जी-20", "ओपेक"], a: 1 },
            { q: "वैश्वीकरण के वर्तमान दौर की शुरुआत तीव्र तकनीकी प्रगति और सूचना क्रांति के कारण मुख्य रूप से किस दशक से मानी जाती है?", o: ["1950 के दशक से", "1990 के दशक से (Post-Cold War / LPG सुधार)", "1970 के दशक से", "1930 के दशक से"], a: 1 },
            { q: "ऐसी बड़ी कंपनियाँ जो एक ही समय में अपने देश के अलावा कई अन्य देशों में उत्पादन, निवेश और विपणन का नियंत्रण करती हैं, क्या कहलाती हैं?", o: ["स्थानीय कंपनियाँ", "बहुराष्ट्रीय कंपनियाँ या एमएनसी (Multinational Corporations - MNCs)", "सरकारी विभाग", "कुटीर उद्योग"], a: 1 },
            { q: "भारत सरकार ने देश की अर्थव्यवस्था को वैश्विक अर्थव्यवस्था से जोड़ने के लिए किस वर्ष 'उदारीकरण, निजीकरण और वैश्वीकरण' (LPG) की नीति लागू की थी?", o: ["1985 ई.", "1991 ई. में (तत्कालीन प्रधानमंत्री पी.वी. नरसिम्हा राव और वित्त मंत्री डॉ. मनमोहन सिंह द्वारा)", "1995 ई.", "2000 ई."], a: 1 },

            { q: "संयुक्त राष्ट्र संघ (UNO) के चार्टर पर जून 1945 में किस शहर के सम्मेलन में संस्थापकों ने हस्ताक्षर किए थे?", o: ["वियना", "सैन फ्रांसिस्को (San Francisco Conference)", "न्यूयॉर्क", "लंदन"], a: 1 },
            { q: "विश्व व्यापार संगठन (WTO) के 'गैट' (GATT) का पूरा नाम क्या है जो 1947 में बना था?", o: ["ग्लोबल ट्रेड ट्रीटी", "जनरल एग्रीमेंट ऑन टैरिफ्स एंड ट्रेड (General Agreement on Tariffs and Trade)", "गवर्नमेंट टैक्स एसोसिएशन", "ग्रैंड एलायंस"], a: 1 },
            { q: "बहुराष्ट्रीय कंपनियों (MNCs) के आगमन से विकासशील देशों में स्वदेशी और स्थानीय उद्योगों पर क्या प्रभाव पड़ा है?", o: ["वे अमर हो गए हैं", "तीव्र गलाकाट प्रतिस्पर्धा के कारण कई छोटे और कमजोर स्थानीय उद्योग बंद हो गए हैं या पिछड़ गए हैं", "उन्हें मुफ़्त पैसा मिला", "कोई प्रभाव नहीं पड़ा"], a: 1 },
            { q: "भूमंडलीकरण के कारण आज पूरी दुनिया एक छोटे से गाँव की तरह व्यवहार करती है, इस अनूठी वैचारिक अवधारणा को क्या कहा जाता है?", o: ["वैश्विक शहर", "वैश्विक गाँव या ग्लोबल विलेज (Global Village)", "साम्यावादी ब्लॉक", "सामंती कस्बा"], a: 1 },
            { q: "व्यापार और भूमंडलीकरण (Trade and Globalization) के इस संपूर्ण अध्याय का अंतिम ऐतिहासिक व वैज्ञानिक निष्कर्ष क्या है?", o: ["वैश्वीकरण पूरी तरह असफल रहा और देश दोबारा अलग-थलग हो गए हैं", "भूमंडलीकरण प्राचीन व्यापारिक मार्गों से विकसित होकर आधुनिक युग की एक ऐसी अनिवार्य आर्थिक व तकनीकी ताकत बनकर उभरा है जिसने पूरी दुनिया के बाजारों और समाजों को एकीकृत कर दिया, वहीं इसके कारण उत्पन्न आर्थिक विषमताओं, मंदी और प्रभुत्व की चुनौतियों को दूर करने के लिए न्यायसंगत व समावेशी वैश्वीकरण का होना जीवन का मूल आधार है", "विश्व बैंक का वैश्विक अर्थव्यवस्था में कोई महत्व नहीं है", "गिरमिटिया मजदूर कभी भारत वापस नहीं आ पाए थे"], a: 1 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let questionStates = new Array(questions.length).fill('default');

        const appDiv = document.getElementById('app');

        function renderStartScreen() {
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in h-full">
                    <div style="width: 96px; height: 96px; background: #ede9fe; color: #8b5cf6; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
                    </div>
                    <h1 style="font-size: 2.25rem; font-weight: 800; margin-bottom: 16px;">व्यापार और भूमंडलीकरण</h1>
                    <p style="color: #475569; margin-bottom: 8px; font-size: 1.25rem; font-weight: bold;">बिहार बोर्ड (BSEB) कक्षा 10वीं - इतिहास (अध्याय 7)</p>
                    <p style="color: #64748b; margin-bottom: 32px; max-width: 512px; font-size: 1.1rem;">प्राचीन रेशम मार्ग, गिरमिटिया मजदूर व्यवस्था, 1929 की वैश्विक आर्थिक महामंदी, न्यू डील, ब्रेटन वुड्स सम्मेलन (IMF व विश्व बैंक), संयुक्त राष्ट्र और आधुनिक वैश्वीकरण (WTO) पर आधारित 100 वस्तुनिष्ठ प्रश्नों का महा-क्विज़।</p>
                    <button onclick="startQuiz()" class="btn-start">क्विज़ शुरू करें</button>
                </div>
            `;
        }

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            questionStates.fill('default');
            renderQuestion();
        }

        function renderQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            let optionsHtml = '';
            q.o.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index}, this)" class="option-btn">
                        <span>${opt}</span>
                        <span class="icon-container hidden"></span>
                    </button>
                `;
            });

            appDiv.innerHTML = `
                <!-- Header -->
                <div class="quiz-header">
                    <div class="flex justify-between items-center" style="margin-bottom: 12px; padding-right: 50px;">
                        <span style="font-size: 0.875rem; font-weight: bold; color: #8b5cf6; text-transform: uppercase;">प्रश्न ${currentQuestion + 1} / ${questions.length}</span>
                        <span style="font-size: 0.875rem; font-weight: bold; color: #475569; background: #e2e8f0; padding: 4px 12px; border-radius: 9999px;">स्कोर: ${score}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                    <!-- Right Menu Icon for Navigation -->
                    <div class="profile-icon" onclick="openOverview()" title="प्रश्नावली ओवरव्यू">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </div>
                </div>

                <!-- Question Area -->
                <div class="flex-1 overflow-y-auto p-8 fade-in flex flex-col" style="padding: 32px;">
                    <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 32px; line-height: 1.4; color: #0f172a;">${q.q}</h2>
                    <div id="options-container" class="flex-1 flex flex-col justify-center">
                        ${optionsHtml}
                    </div>
                </div>

                <!-- Footer / Actions -->
                <div class="flex justify-between items-center" style="padding: 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; min-height: 90px;">
                    <div>
                        <button id="skip-btn" onclick="skipQuestion()" class="btn-action btn-skip">स्किप करें</button>
                    </div>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden btn-action btn-next">
                        ${currentQuestion === questions.length - 1 ? 'परिणाम देखें' : 'अगला प्रश्न'}
                    </button>
                </div>
            `;
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

            allBtns.forEach((btn, index) => {
                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');
                iconContainer.innerHTML = '';
                iconContainer.classList.remove('hidden');

                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #16a34a; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }
                
                if (index === selectedIndex && selectedIndex !== q.a) {
                    btn.classList.add('wrong');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #dc2626; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                }
            });

            if (selectedIndex === q.a) {
                score++;
                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function skipQuestion() {
            questionStates[currentQuestion] = 'skipped';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                renderResultScreen();
            }
        }

        function openOverview() {
            let gridHtml = '';
            for(let i = 0; i < questions.length; i++) {
                let stateClass = 'state-default';
                if(questionStates[i] === 'correct') stateClass = 'state-correct';
                if(questionStates[i] === 'wrong') stateClass = 'state-wrong';
                if(questionStates[i] === 'skipped') stateClass = 'state-skipped';
                
                gridHtml += `<button onclick="jumpToQuestion(${i})" class="q-circle ${stateClass}">${i + 1}</button>`;
            }

            const overviewDiv = document.createElement('div');
            overviewDiv.id = 'overview-overlay';
            overviewDiv.className = 'overview-panel fade-in';
            overviewDiv.innerHTML = `
                <h3 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 16px; text-align: center; color: #1e293b;">प्रश्नावली ओवरव्यू</h3>
                <div style="display: flex; justify-content: center; gap: 16px; margin-bottom: 12px; font-size: 0.85rem; font-weight: bold;">
                    <span style="color: #c084fc;">■ बिना प्रयास</span>
                    <span style="color: #22c55e;">■ सही</span>
                    <span style="color: #ef4444;">■ गलत</span>
                    <span style="color: #eab308;">■ स्किप किया</span>
                </div>
                <div class="grid-container">
                    ${gridHtml}
                </div>
                <div class="flex justify-center" style="padding-top: 16px; border-top: 1px solid #e2e8f0; background: #fff;">
                    <button onclick="closeOverview()" class="btn-action btn-skip" style="margin: 0 8px;">ओवरव्यू बंद करें</button>
                    <button onclick="submitQuizFromOverview()" class="btn-action btn-next" style="margin: 0 8px; background-color: #8b5cf6;">क्विज़ सबमिट करें</button>
                </div>
            `;
            appDiv.appendChild(overviewDiv);
        }

        function closeOverview() {
            const overlay = document.getElementById('overview-overlay');
            if(overlay) overlay.remove();
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            closeOverview();
            renderQuestion();
        }

        function submitQuizFromOverview() {
            closeOverview();
            renderResultScreen();
        }

        function renderResultScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let emoji = "";
            
            if (percentage === 100) { message = "अतुलनीय! व्यापार और भूमंडलीकरण अध्याय पर आपका पूरा नियंत्रण है।"; emoji = "🏆"; }
            else if (percentage >= 80) { message = "बहुत बढ़िया! आर्थिक इतिहास और वैश्वीकरण की प्रणालियों पर आपकी गहरी पकड़ है।"; emoji = "🌟"; }
            else if (percentage >= 50) { message = "अच्छा प्रयास! वैचारिक समझ को बेहतर करने के लिए फिर से प्रयास करें।"; emoji = "👍"; }
            else { message = "कोई बात नहीं! एक बार अध्याय को दोहराएं और पुनः प्रयास करें।"; emoji = "📚"; }

            const strokeDasharray = `${percentage}, 100`;
            const colorClass = percentage >= 80 ? '#10b981' : percentage >= 50 ? '#f59e0b' : '#ef4444';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in overflow-y-auto" style="padding: 32px;">
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 32px;">क्विज़ परिणाम ${emoji}</h2>
                    
                    <div style="position: relative; width: 192px; height: 192px; margin-bottom: 32px; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="width: 100%; height: 100%;">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="circle" stroke="${colorClass}" stroke-dasharray="${strokeDasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 2.25rem; font-weight: 900;">${score}</span>
                            <span style="font-size: 0.875rem; font-weight: bold; color: #94a3b8;">/ 100</span>
                        </div>
                    </div>

                    <p style="font-size: 1.5rem; font-weight: bold; margin-bottom: 8px;">${percentage}% अंक</p>
                    <p style="font-size: 1.125rem; color: #8b5cf6; margin-bottom: 40px; max-width: 448px;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action" style="background: white; border: 2px solid #e2e8f0; color: #475569; padding: 16px 32px; border-radius: 12px; font-size: 1.125rem;">
                        फिर से प्रयास करें
                    </button>
                </div>
            `;
        }

        // Initialize App
        renderStartScreen();
    </script>
</body>
</html>

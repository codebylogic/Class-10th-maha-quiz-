<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>इतिहास क्विज़ - शहरीकरण एवं शहरी जीवन</title>
    <style>
        /* Base Offline Styles replacing Tailwind */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdf4;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(22, 163, 74, 0.15);
            width: 100%;
            max-width: 896px;
            height: 90vh;
            min-height: 600px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 1.125rem;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #16a34a;
            background-color: #f0fdf4;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Layout Utilities */
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        /* Header & Elements */
        .quiz-header { padding: 32px 32px 16px 32px; border-bottom: 1px solid #f1f5f9; background: rgba(255,255,255,0.5); position: relative; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 12px; overflow: hidden; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06); }
        .progress-bar-fill { background: linear-gradient(to right, #4ade80, #16a34a); height: 12px; border-radius: 9999px; transition: all 0.5s ease-out; }
        .profile-icon { position: absolute; top: 24px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-start { padding: 16px 40px; background: linear-gradient(to right, #16a34a, #15803d); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 20px 25px -5px rgba(22, 163, 74, 0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 32px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; margin-left: 8px; font-size: 1rem; }
        .btn-next { background-color: #1e293b; color: white; }
        .btn-skip { background-color: #e2e8f0; color: #475569; }
        
        /* Overview Panel */
        .overview-panel { position: absolute; inset: 0; background: white; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 12px; padding: 16px 0; flex-1; overflow-y: auto; }
        .grid-container::-webkit-scrollbar { width: 6px; }
        .grid-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        .q-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.9rem; }
        
        /* Circle States */
        .state-default { background: linear-gradient(135deg, #4ade80, #16a34a); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
        
        /* Circular Progress Chart */
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #eee; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; }
    </style>
</head>
<body>

    <div id="app" class="glass-panel">
        <!-- Screens will be injected here by JS -->
    </div>

    <script>
        const questions = [
            { q: "किसी ग्रामीण क्षेत्र का कस्बा या बड़े शहर के रूप में विकसित होने की पूरी प्रक्रिया को क्या कहते हैं?", o: ["औद्योगीकरण", "शहरीकरण (Urbanization)", "सामंतवाद", "कृषि विकास"], a: 1 },
            { q: "शहरों के उदय का मुख्य कारण निम्नलिखित में से क्या माना जाता है?", o: ["कृषि का विनाश", "व्यापार, उद्योगों का विकास और रोजगार के नए अवसरों का सृजन (Trade & Commerce)", "केवल मनोरंजन", "बाढ़ आना"], a: 1 },
            { q: "प्राचीन काल में नगरों (शहरों) का विकास मुख्य रूप से किन क्षेत्रों के निकट होता था?", o: ["रेगिस्तानों के पास", "नदियों की घाटियों या व्यापारिक मार्गों के किनारे (River Valleys)", "घने जंगलों में", "पहाड़ियों की चोटियों पर"], a: 1 },
            { q: "शहरी जीवन ने किस नई सामाजिक और वैचारिक भावना को सबसे अधिक बढ़ावा दिया?", o: ["सामुदायिक भावना", "व्यक्तिवाद की भावना (Individualism)", "जातिवाद", "रूढ़िवादिता"], a: 1 },
            { q: "आधुनिक काल में विश्व का पहला सबसे बड़ा महानगर (Metropolis) कौन सा बना जहाँ आबादी तेजी से बढ़ी?", o: ["पेरिस", "लंदन (London)", "बंबई", "न्यूयार्क"], a: 1 },
            { q: "18वीं शताब्दी के अंत तक लंदन मुख्य रूप से किस बड़ी ऐतिहासिक घटना के कारण ग्रामीण प्रवासियों का मुख्य केंद्र बन गया?", o: ["कृषि क्रांति", "औद्योगिक क्रांति (Industrial Revolution)", "फ्रांसीसी क्रांति", "रूसी क्रांति"], a: 1 },
            { q: "1810 से 1880 के बीच लंदन की आबादी 10 लाख से बढ़कर लगभग कितनी हो गई थी?", o: ["20 लाख", "40 लाख (4 Million)", "50 लाख", "80 लाख"], a: 1 },
            { q: "लंदन की फैक्ट्रियों और गोदियों में काम की तलाश में आने वाले गरीब प्रवासियों के रहने के लिए बनाए गए तंग और असुरक्षित बहुमंजिला मकान क्या कहलाते थे?", o: ["बंगले", "टेनमेंट्स या किराये के मकान (Tenements)", "महाल", "विला"], a: 1 },
            { q: "टेनमेंट्स (किराये के मकानों) में रहने वाले गरीब श्रमिकों की सबसे बड़ी समस्या क्या थी?", o: ["पैसा अधिक होना", "अत्यधिक भीड़भाड़, सीलन, प्रकाश और हवा की कमी तथा अस्वच्छता", "कमरे बड़े होना", "कोई समस्या नहीं थी"], a: 1 },
            { q: "लंदन के धनी वर्गों ने गरीब बस्तियों से फैलने वाली बीमारियों और दंगों के डर से शहरों को स्वच्छ बनाने के लिए कौन सा आंदोलन चलाया था?", o: ["शहरीकरण", "हरित पट्टी या 'लंदन ग्रीन बेल्ट' और पार्क निर्माण योजना (Green Lung Movements)", "स्लम विस्तार", "बाड़ाबंदी"], a: 1 },
            { q: "लंदन के अधिकारियों ने श्रमिकों को स्वच्छ और कम भीड़भाड़ वाले मकान देने के लिए शहर के बाहर किस नई अवधारणा को जन्म दिया?", o: ["काले शहर", "उद्यान नगर या गार्डन सिटी (Garden City)", "स्लम सिटी", "औद्योगिक नगर"], a: 1 },
            { q: "गार्डन सिटी (उद्यान नगर) की प्रसिद्ध वैचारिक योजना सबसे पहले किसने प्रस्तुत की थी?", o: ["बैरन हॉसमान", "एबेनेज़र हॉवर्ड (Ebenezer Howard)", "चार्ल्स बूथ", "हेनरी कोर्ट"], a: 1 },
            { q: "लंदन में कामगारों की सामाजिक और आर्थिक स्थिति को समझने के लिए 1887 में किसने एक बड़ा वैज्ञानिक सर्वेक्षण किया था?", o: ["कार्ल मार्क्स", "चार्ल्स बूथ (Charles Booth)", "लॉर्ड रिपन", "जेम्स वाट"], a: 1 },
            { q: "चार्ल्स बूथ के सर्वेक्षण के अनुसार लंदन की कुल आबादी का लगभग कितना प्रतिशत हिस्सा अत्यंत गरीबी और भुखमरी रेखा के नीचे जी रहा था?", o: ["5 प्रतिशत", "25 प्रतिशत", "30 प्रतिशत (30%)", "50 प्रतिशत"], a: 2 },
            { q: "लंदन में प्रवासियों की भीड़ को नियंत्रित करने और परिवहन को सुगम बनाने के लिए विश्व की पहली 'भूमिगत रेलवे' (Underground Subway/Metro) कब शुरू हुई?", o: ["1853 ई.", "1863 ई. में (10 जनवरी)", "1881 ई.", "1900 ई."], a: 1 },
            { q: "विश्व की पहली भूमिगत रेलवे (Underground Railway) लंदन में किन दो स्टेशनों के बीच चलाई गई थी?", o: ["लंदन से मैनचेस्टर", "पैडिंगटन से फरिंगडन स्ट्रीट के बीच (Paddington to Farringdon Street)", "लीवरपूल से लंदन", "बर्मिंघम से लंदन"], a: 1 },
            { q: "शुरुआती दौर में लंदन की भूमिगत रेलवे की यात्रा को लोग नापसंद क्यों करते थे क्योंकि:", o: ["किराया बहुत महँगा था", "इंजनों से निकलने वाले कोयले के धुएँ और दमघोंटू गंध से डिब्बे भर जाते थे", "ट्रेन बहुत धीमी थी", "डिब्बे लकड़ी के थे"], a: 1 },
            { q: "फ्रांस के सम्राट नेपोलियन तृतीय ने 1852 में पेरिस शहर को सुंदर, आधुनिक और सुरक्षित बनाने के लिए किसे पेरिस का पुनर्गठन (Rebuilding of Paris) का कार्य सौंपा था?", o: ["एबेनेज़र हॉवर्ड", "बैरन जॉर्ज यूजीन हॉसमान (Baron Haussmann)", "चार्ल्स बूथ", "लुई ब्लां"], a: 1 },
            { q: "बैरन हॉसमान द्वारा पेरिस की तंग गलियों को तोड़कर बनाए गए चौड़े रास्तों, पार्कों और नए बुनियादी ढांचे की योजना को इतिहास में क्या कहते हैं?", o: ["हॉसमानकरण (Haussmannization of Paris)", "स्लम हटाओ योजना", "गार्डन सिटी", "पेरिस कोड"], a: 0 },
            { q: "बैरन हॉसमान ने पेरिस में चौड़े रास्ते (Boulevards) क्यों बनवाए थे ताकि:", o: ["गाड़ियाँ तेज चल सकें", "विद्रोह के समय प्रदर्शनकारी सड़कों पर बैरिकेड न लगा सकें और सेना आसानी से आ-जा सके (Socio-political control)", "लोग टहल सकें", "घर सुंदर दिखें"], a: 1 },
            { q: "ब्रिटिश भारत में औपनिवेशिक सत्ता और व्यापार का सबसे बड़ा और प्रमुख केंद्र (टाउन) पश्चिमी तट पर कौन सा विकसित हुआ?", o: ["कलकत्ता", "बंबई (Bombay)", "मद्रास", "सूरत"], a: 1 },
            { q: "1661 ई. में इंग्लैंड के राजा चार्ल्स द्वितीय को पुर्तगाली राजकुमारी कैथरीन से विवाह के दहेज के रूप में कौन सा भारतीय द्वीप मिला था?", o: ["कलकत्ता", "बंबई (Bombay द्वीप समूह)", "मद्रास", "गोवा"], a: 1 },
            { q: "राजा चार्ल्स द्वितीय ने बंबई द्वीप को केवल 10 पाउंड के वार्षिक किराये पर किस कंपनी को सौंप दिया था?", o: ["फ्रांसीसी कंपनी", "ईस्ट इंडिया कंपनी (East India Company)", "डच कंपनी", "पुर्तगाली कंपनी"], a: 1 },
            { q: "शुरुआती दौर में बंबई कितने अलग-अलग छोटे द्वीपों का समूह था जिन्हें बाद में जोड़कर एक बड़ा शहर बनाया गया?", o: ["तीन", "पाँच", "सात द्वीप (Seven Islands of Bombay)", "दस"], a: 2 },
            { q: "बंबई को एक बड़ा और एकीकृत शहर बनाने के लिए समुद्र को पाटकर (जमीन सुधारने) की जो विशाल योजनाएँ चलीं, उन्हें क्या कहते हैं?", o: ["बाड़ाबंदी योजना", "भूमि सुधार या रिक्लेमेशन योजनाएँ (Land Reclamation)", "हॉसमान योजना", "स्लम क्लियरेंस"], a: 1 },
            { q: "बंबई में समुद्र को पाटकर बैक-बे (Back Bay) क्षेत्र विकसित करने के लिए 1864 में किस प्रसिद्ध कंपनी का गठन हुआ था?", o: ["टाटा कंपनी", "बॉम्बे रिक्लेमेशन कंपनी (Bombay Reclamation Company)", "ईस्ट इंडिया कॉर्पोरेशन", "मरीन ड्राइव सोसाइटी"], a: 1 },
            { q: "बंबई के समुद्री तट के किनारे बनी वह प्रसिद्ध सड़क कौन सी है जो रिक्लेमेशन (समुद्र पाटने) की योजना के फलस्वरूप बनी और रात में हीरों के हार जैसी दिखती है?", o: ["कोलाबा कॉजवे", "मरीन ड्राइव (Marine Drive / Queen's Necklace)", "साइगॉन हाईवे", "नेपियर रोड"], a: 1 },
            { q: "बंबई में कपड़ा मिलों के बढ़ने से मजदूरों के रहने के लिए बनाई गई बेहद घनी और बहुमंजिला इमारतों को क्या कहा जाता है?", o: ["टेनमेंट्स", "चाल (Chawls)", "महाल", "झोपड़ी"], a: 1 },
            { q: "बंबई की 'चालों' (Chawls) की मुख्य विशेषता क्या थी जो आज भी गिरगाँव और धारावी जैसे क्षेत्रों में दिखती है?", o: ["प्रत्येक परिवार के पास बहुत बड़े कमरे थे", "एक मंजिला पर लंबी गैलरी होती थी और छोटे-छोटे कमरों के बीच साझा (Common) शौचालय होते थे", "वे लोहे की बनी थीं", "वे बहुत महँगी थीं"], a: 1 },
            { q: "बंबई की चालों में रहने वाले मजदूर मनोरंजन और सामाजिक चेतना के लिए नाटक और गीतों का आयोजन कहाँ करते थे?", o: ["कमरों के अंदर", "चाल के बीच के खुले आहातों या आँगनों (Central Courtyards) में", "थिएटर में जाकर", "सड़कों पर"], a: 1 },
            { q: "बंबई को औपनिवेशिक भारत की 'वाणिज्यिक राजधानी' या 'प्रवेश द्वार' (Gateway of India) बनाने में किस बड़े उद्योग का सबसे बड़ा योगदान था?", o: ["लोहा उद्योग", "सूती कपड़ा मिल उद्योग (Cotton Textile Mills)", "जूट उद्योग", "कोयला खनन"], a: 1 },

        let currentQuestion = 0;

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            questionStates.fill('default');
            renderQuestion();
        }

        function renderQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            let optionsHtml = '';
            q.o.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index}, this)" class="option-btn">
                        <span>${opt}</span>
                        <span class="icon-container hidden"></span>
                    </button>
                `;

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

            allBtns.forEach((btn, index) => {
                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');
                iconContainer.innerHTML = '';
                iconContainer.classList.remove('hidden');

                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #16a34a; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }
                
                if (index === selectedIndex && selectedIndex !== q.a) {
                    btn.classList.add('wrong');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #dc2626; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                }
            });

            if (selectedIndex === q.a) {
                score++;
                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function skipQuestion() {
            questionStates[currentQuestion] = 'skipped';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                renderResultScreen();
            }
        }

        function openOverview() {
            let gridHtml = '';
            for(let i = 0; i < questions.length; i++) {
                let stateClass = 'state-default';
                if(questionStates[i] === 'correct') stateClass = 'state-correct';
                if(questionStates[i] === 'wrong') stateClass = 'state-wrong';
                if(questionStates[i] === 'skipped') stateClass = 'state-skipped';
                
                gridHtml += `<button onclick="jumpToQuestion(${i})" class="q-circle ${stateClass}">${i + 1}</button>`;
            }

            const overviewDiv = document.createElement('div');
            overviewDiv.id = 'overview-overlay';
            overviewDiv.className = 'overview-panel fade-in';
            overviewDiv.innerHTML = `
                <h3 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 16px; text-align: center; color: #1e293b;">प्रश्नावली ओवरव्यू</h3>
                <div style="display: flex; justify-content: center; gap: 16px; margin-bottom: 12px; font-size: 0.85rem; font-weight: bold;">
                    <span style="color: #4ade80;">■ बिना प्रयास</span>
                    <span style="color: #22c55e;">■ सही</span>
                    <span style="color: #ef4444;">■ गलत</span>
                    <span style="color: #eab308;">■ स्किप किया</span>
                </div>
                <div class="grid-container">
                    ${gridHtml}
                </div>
                <div class="flex justify-center" style="padding-top: 16px; border-top: 1px solid #e2e8f0; background: #fff;">
                    <button onclick="closeOverview()" class="btn-action btn-skip" style="margin: 0 8px;">ओवरव्यू बंद करें</button>
                    <button onclick="submitQuizFromOverview()" class="btn-action btn-next" style="margin: 0 8px; background-color: #16a34a;">क्विज़ सबमिट करें</button>
                </div>
            `;
            appDiv.appendChild(overviewDiv);
        }

        function closeOverview() {
            const overlay = document.getElementById('overview-overlay');
            if(overlay) overlay.remove();
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            closeOverview();
            renderQuestion();
        }

        function submitQuizFromOverview() {
            closeOverview();
            renderResultScreen();
        }

        function renderResultScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let emoji = "";
            
            if (percentage === 100) { message = "अतुलनीय! शहरीकरण एवं शहरी जीवन अध्याय पर आपका पूरा नियंत्रण है।"; emoji = "🏆"; }
            else if (percentage >= 80) { message = "बहुत बढ़िया! शहरों के इतिहास और सामाजिक बदलावों पर आपकी गहरी पकड़ है।"; emoji = "🌟"; }
            else if (percentage >= 50) { message = "अच्छा प्रयास! वैचारिक समझ को बेहतर करने के लिए फिर से प्रयास करें।"; emoji = "👍"; }
            else { message = "कोई बात नहीं! एक बार अध्याय को दोहराएं और पुनः प्रयास करें।"; emoji = "📚"; }

            const strokeDasharray = `${percentage}, 100`;
            const colorClass = percentage >= 80 ? '#10b981' : percentage >= 50 ? '#f59e0b' : '#ef4444';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in overflow-y-auto" style="padding: 32px;">
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 32px;">क्विज़ परिणाम ${emoji}</h2>
                    
                    <div style="position: relative; width: 192px; height: 192px; margin-bottom: 32px; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="width: 100%; height: 100%;">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="circle" stroke="${colorClass}" stroke-dasharray="${strokeDasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 2.25rem; font-weight: 900;">${score}</span>
                            <span style="font-size: 0.875rem; font-weight: bold; color: #94a3b8;">/ 100</span>
                        </div>
                    </div>

                    <p style="font-size: 1.5rem; font-weight: bold; margin-bottom: 8px;">${percentage}% अंक</p>
                    <p style="font-size: 1.125rem; color: #16a34a; margin-bottom: 40px; max-width: 448px;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action" style="background: white; border: 2px solid #e2e8f0; color: #475569; padding: 16px 32px; border-radius: 12px; font-size: 1.125rem;">
                        फिर से प्रयास करें
                    </button>
                </div>
            `;
        }

        // Initialize App
        renderStartScreen();
    </script>
</body>
</html>

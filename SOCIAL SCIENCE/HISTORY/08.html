<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>इतिहास क्विज़ - प्रेस, संस्कृति एवं राष्ट्रवाद</title>
    <style>
        /* Base Offline Styles replacing Tailwind */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf4ff;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(168, 85, 247, 0.15);
            width: 100%;
            max-width: 896px;
            height: 90vh;
            min-height: 600px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 1.125rem;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #a855f7;
            background-color: #fdf4ff;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Layout Utilities */
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        /* Header & Elements */
        .quiz-header { padding: 32px 32px 16px 32px; border-bottom: 1px solid #f1f5f9; background: rgba(255,255,255,0.5); position: relative; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 12px; overflow: hidden; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06); }
        .progress-bar-fill { background: linear-gradient(to right, #c084fc, #a855f7); height: 12px; border-radius: 9999px; transition: all 0.5s ease-out; }
        .profile-icon { position: absolute; top: 24px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-start { padding: 16px 40px; background: linear-gradient(to right, #a855f7, #7e22ce); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 20px 25px -5px rgba(168, 85, 247, 0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 32px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; margin-left: 8px; font-size: 1rem; }
        .btn-next { background-color: #1e293b; color: white; }
        .btn-skip { background-color: #e2e8f0; color: #475569; }
        
        /* Overview Panel */
        .overview-panel { position: absolute; inset: 0; background: white; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 12px; padding: 16px 0; flex-1; overflow-y: auto; }
        .grid-container::-webkit-scrollbar { width: 6px; }
        .grid-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        .q-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.9rem; }
        
        /* Circle States */
        .state-default { background: linear-gradient(135deg, #c084fc, #a855f7); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
        
        /* Circular Progress Chart */
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #eee; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; }
    </style>
</head>
<body>

    <div id="app" class="glass-panel">
        <!-- Screens will be injected here by JS -->
    </div>

    <script>
        const questions = [
            { q: "विश्व में सबसे पहले छपाई (मुद्रण/Printing) की तकनीक किस देश में विकसित हुई थी?", o: ["भारत", "जर्मनी", "चीन (China)", "इंग्लैंड"], a: 2 },
            { q: "चीन में पारंपरिक रूप से काठ की तख्तियों पर स्याही लगाकर कागज को रगड़कर छापने की तकनीक को क्या कहा जाता है?", o: ["ब्लॉक प्रिंटिंग या वुडब्लॉक प्रिंटिंग (Block Printing)", "मेटल टाइप", "लिथोग्राफी", "ऑफसेट"], a: 0 },
            { q: "चीन में छठी शताब्दी से सिल्क मार्ग द्वारा कागज बनाने और छपाई की कला सबसे पहले किस देश में फैली?", o: ["जापान (Japan)", "भारत", "इंग्लैंड", "फ्रांस"], a: 0 },
            { q: "768-770 ई. के आसपास जापान में बौद्ध प्रचारकों द्वारा छापी गई सबसे प्राचीन पुस्तक का नाम क्या है?", o: ["बाइबल", "डायमंड सूत्र (Diamond Sutra)", "कुरान", "त्रिपिटक"], a: 1 },
            { q: "1295 ई. में चीन से वुडब्लॉक प्रिंटिंग (काठ की छपाई) की तकनीक को यूरोप (इटली) लेकर आने वाले प्रसिद्ध यात्री कौन थे?", o: ["वास्कोडिगामा", "मार्को पोलो (Marco Polo)", "कोलंबस", "मेगास्थनीज"], a: 1 },
            { q: "यूरोप में आधुनिक प्रिंटिंग प्रेस (गतिशील धातु टाइप) का आविष्कार करने का श्रेय किसे दिया जाता है?", o: ["मार्को पोलो", "योहान गुटेनबर्ग (Johann Gutenberg)", "विलियम कैक्सटन", "मार्टिन लूथर"], a: 1 },
            { q: "योहान गुटेनबर्ग किस देश के निवासी थे जिन्होंने 1430-1440 के दशक में प्रिंटिंग मशीन बनाई थी?", o: ["फ्रांस", "जर्मनी (Germany)", "इटली", "इंग्लैंड"], a: 1 },
            { q: "गुटेनबर्ग प्रेस द्वारा छापी गई विश्व की पहली मुद्रित पुस्तक (किताब) कौन सी थी?", o: ["डायमंड सूत्र", "बाइबल (Bible)", "यूटोपिया", "सोशलिज्म"], a: 1     },
            { q: "गुटेनबर्ग के पिता पेशे से क्या थे जिसके कारण उन्हें धातु की ढलाई और जैतून पेरने वाली मशीन का अनुभव बचपन से था?", o: ["बुनकर", "व्यापारी या जमींदार (Merchant / स्वर्णकार-कांस्यकार पृष्ठभूमि)", "नाविक", "कृषि दास"], a: 1 },
            { q: "यूरोप में धर्म सुधार आंदोलन के प्रणेता मार्टिन लूथर ने कैथोलिक चर्च की कुरीतियों के खिलाफ कितनी प्रस्थापनाएँ (Theses) लिखकर चर्च के दरवाजे पर टांग दी थीं?", o: ["10 प्रस्थापनाएँ", "95 प्रस्थापनाएँ (95 Theses)", "50 प्रस्थापनाएँ", "100 प्रस्थापनाएँ"], a: 1 },
            { q: "मार्टिन लूथर ने छपाई के महत्व को रेखांकित करते हुए इसे क्या कहा था?", o: ["यह विनाश का कारण है", "ईश्वर की दी हुई महानतम देन और सबसे बड़ा तोहफा (God's greatest gift)", "यह राजा की शक्ति है", "यह निरर्थक है"], a: 1 },
            { q: "कागज का आविष्कार चीनी नागरिक 'साईलुन' (Cai Lun) द्वारा किस वर्ष के आसपास किया गया था?", o: ["105 ई. के आसपास", "500 ई.", "1000 ई.", "1440 ई."], a: 0 },
            { q: "यूरोप में राष्ट्रवाद और लोकतांत्रिक चेतना को जन-जन तक पहुँचाने में सबसे शक्तिशाली माध्यम कौन सा साबित हुआ?", o: ["घोड़े की गति", "सस्ती मुद्रित पुस्तकें, अखबार और पैम्फलेट (The Printing Press)", "राजा के आदेश", "चर्च का उपदेश"], a: 1 },
            { q: "इंग्लैंड में आम जनता, महिलाओं और बच्चों के लिए सड़कों पर फेरीवालों द्वारा बेची जाने वाली एक पैसे की छोटी किताबें क्या कहलाती थीं?", o: ["पॉकेट बुक्स", "चेपबुक्स या पाकेट बुक्स (Chapbooks)", "उपन्यास", "अल्मानक"], a: 1 },
            { q: "भारत में प्रिंटिंग प्रेस की तकनीक सबसे पहले 16वीं शताब्दी (1556 ई.) में किसके द्वारा गोवा लाई गई थी?", o: ["अंग्रेजों द्वारा", "पुर्तगाली जेसुइट मिशनरियों द्वारा (Portuguese Missionaries)", "डच व्यापारियों द्वारा", "फ्रांसीसियों द्वारा"], a: 1 },
            { q: "जेम्स ऑगस्टस हिकी द्वारा 1780 ई. में कोलकाता से प्रकाशित भारत का पहला साप्ताहिक समाचार पत्र कौन सा था?", o: ["उदंत मार्तंड", "बंगाल गजट (Bengal Gazette)", "यंग इंडिया", "बॉम्बे क्रॉनिकल"], a: 1 },
            { q: "किसी भारतीय द्वारा (गंगाधर भट्टाचार्य) भारतीय भाषा में प्रकाशित पहला समाचार पत्र 'बंगाल गजट' किस वर्ष निकला था?", o: ["1780 ई.", "1816 ई. में", "1857 ई.", "1821 ई."], a: 1 },
            { q: "भारतीय प्रेस का जनक और सामाजिक-धार्मिक सुधार आंदोलनों का अग्रदूत किसे कहा जाता है?", o: ["बाल गंगाधर तिलक", "राजा राममोहन राय (Raja Rammohun Roy)", "महात्मा गांधी", "ईश्वरचंद्र विद्यासागर"], a: 1 },
            { q: "राजा राममोहन राय ने रूढ़िवादिता और सती प्रथा के खिलाफ 1821 में बंगाली भाषा में कौन सा प्रसिद्ध पत्र निकाला था?", o: ["मिरात-उल-अखबार", "संवाद कौमुदी (Sambad Kaumudi)", "बंगदूत", "केसरी"], a: 1 },
            { q: "राजा राममोहन राय द्वारा 1822 ई. में फारसी भाषा में प्रकाशित पहले ऐतिहासिक साप्ताहिक पत्र का नाम क्या था?", o: ["संवाद कौमुदी", "मिरात-उल-अखबार (Mirat-ul-Akbar)", "शम्सुल अखबार", "बॉम्बे समाचार"], a: 1 },
            { q: "रूढ़िवादी हिंदुओं ने राजा राममोहन राय के विचारों का खंडन करने के लिए किस पत्र का प्रकाशन शुरू किया था?", o: ["जहाँ-ए-जहाँ नुमा", "समाचार चंद्रिका (Samachar Chandrika)", "बंगाल गजट", "दिग्दर्शन"], a: 1 },
            { q: "1822 ई. में बंबई से गुजराती भाषा में प्रकाशित होने वाला भारत का सबसे पहला दैनिक व्यावसायिक अखबार कौन सा था जो आज भी जीवित है?", o: ["मिरात-उल-अखबार", "बॉम्बे समाचार या मुंबई समाचार (Bombay Samachar)", "रास्त गोफ्तार", "जाम-ए-जहाँ नुमा"], a: 1 },
            { q: "दादाभाई नौरोजी के संपादन में 1851 में गुजराती भाषा में निकला सत्यवादी पत्र कौन सा था?", o: ["बॉम्बे समाचार", "रास्त गोफ्तार (Rast Goftar / सत्यवादी)", "केसरी", "हरिजन"], a: 1 },
            { q: "1867 में देवबंद के उलेमाओं ने मुसलमानों को रोजमर्रा के जीवन के आचरण और इस्लामी कानूनों को समझाने के लिए लाखों की संख्या में क्या छपवाए?", o: ["उपन्यास", "फतवे और लघु पुस्तिकाएं (Fatwas)", "अखबार", "ईसाई कैलेंडर"], a: 1 },
            { q: "1857 के प्रथम स्वतंत्रता संग्राम के विद्रोहियों के संदेशों, गानों और घोषणाओं को जन-जन तक पहुँचाने में किसने बड़ी भूमिका निभाई?", o: ["विदेशी केबल", "स्थानीय लिथोग्राफी और गुप्त रूप से छपे पर्चे (Handbills)", "चर्च रेडियो", "सब गलत"], a: 1 },
            { q: "1868 ई. में शिशिर कुमार घोष और मोतीलाल घोष द्वारा बंगाली भाषा में शुरू किया गया वह प्रसिद्ध पत्र कौन सा था जो रातों-रात अंग्रेजी में बदल गया?", o: ["सोमप्रकाश", "अमृत बाजार पत्रिका (Amrita Bazar Patrika)", "हिन्दू", "स्टेट्समैन"], a: 1     },
            { q: "अमृत बाजार पत्रिका रातों-रात बंगाली से अंग्रेजी भाषा में क्यों बदल गई थी क्योंकि वह बचना चाहती थी:", o: ["टैक्स देने से", "लॉर्ड लिटन के दमनकारी 'वर्नाक्यूलर प्रेस एक्ट' की जब्ती की कानूनी कार्रवाई से (To escape Vernacular Press Act)", "पाठकों की कमी से", "कागज की कमी से"], a: 1 },
            { q: "लॉर्ड लिटन ने भारतीय भाषाओं के समाचार पत्रों को पूरी तरह कुचलने और सेंसर करने के लिए 'वर्नाक्यूलर प्रेस एक्ट' किस वर्ष पास किया था?", o: ["1857 ई.", "1878 ई. में (Vernacular Press Act 1878)", "1882 ई.", "1905 ई."], a: 1 },
            { q: "1878 के वर्नाक्यूलर प्रेस एक्ट को मुख्य रूप से किस भारतीय भाषा के जुझारू पत्र 'सोमप्रकाश' को निशाना बनाने के लिए डिजाइन किया गया था जिसके संपादक ईश्वरचंद्र विद्यासागर थे?", o: ["मराठी", "बंगाली (Bengali / सोमप्रकाश अखबार)", "गुजराती", "हिंदी"], a: 1 },
            { q: "भारतीय प्रेस का गला घोंटने वाले 'वर्नाक्यूलर प्रेस एक्ट' (1878) को किस उदारवादी ब्रिटिश वायसराय ने 1882 में पूरी तरह निरस्त (रद्द) कर दिया था?", o: ["लॉर्ड कर्जन", "लॉर्ड रिपन (Lord Ripon जिसने प्रेस को राहत दी)", "लॉर्ड लिटन", "लॉर्ड डलहौजी"], a: 1 },
            { q: "बाल गंगाधर तिलक के संपादन में बंबई से मराठी भाषा में निकलने वाला घोर राष्ट्रवादी और उग्र पत्र कौन सा था?", o: ["मराठा", "केसरी (Kesari)", "यंग इंडिया", "हरिजन"], a: 1 },
            { q: "बाल गंगाधर तिलक द्वारा अंग्रेजी भाषा में संपादित किए जाने वाले राष्ट्रवादी पत्र का नाम क्या था?", o: ["केसरी", "मराठा (The Mahratta - अंग्रेजी में)", "यंग इंडिया", "न्यू इंडिया"], a: 1 },

            { q: "1942 के भारत छोड़ो आंदोलन के समय जब ब्रिटिश सरकार ने देश के सभी अखबारों पर प्री-सेंसराशिप (छपने से पहले जांच) लगा दी, तो अधिकांश भारतीय अखबारों ने क्या किया?", o: ["सरकार की बात मान ली", "अपने अखबारों के कॉलमों को खाली (Blank Spaces) छोड़कर या प्रकाशन बंद करके कड़ा विरोध दर्ज कराया", "ब्रिटेन चले गए", "कोई बदलाव नहीं किया"], a: 1 },
            { q: "भारत में प्रिंटिंग प्रेस और आधुनिक शिक्षा के प्रसार ने अप्रत्यक्ष रूप से किस राष्ट्रीय भावना को पूरे देश में कश्मीर से कन्याकुमारी तक भौगोलिक रूप से एकजुट किया?", o: ["साम्राज्यवाद", "अखंड भारत, भाषाई एकता और साझी औपनिवेशिक गुलामी के खिलाफ भारतीय राष्ट्रवाद (Indian Nationalism)", "सामंतवाद", "पूंजीवाद"], a: 1 },
            { q: "प्रेस की स्वतंत्रता का दमन करने वाले ब्रिटिश कानूनों ने स्वतंत्रता आंदोलन में किस अधिकार को मौलिक अधिकार बनाने की मांग को सबसे अधिक तीव्र किया?", o: ["हथियार रखने का अधिकार", "अभिव्यक्ति की स्वतंत्रता और प्रेस की पूर्ण आजादी (Freedom of Speech and Expression)", "राजा बनने का अधिकार", "टैक्स न देने का अधिकार"], a: 1 },
            { q: "गुटेनबर्ग के प्रिंटिंग प्रेस के अक्षरों के अविष्कार से लेकर भारत के स्वतंत्रता संग्राम तक मुद्रण कला का सबसे बड़ा और क्रांतिकारी वैश्विक योगदान क्या रहा?", o: ["राजाओं को मजबूत करना", "ज्ञान, सूचना और विचारों को महलों से निकालकर आम जनता, मजदूरों और शोषितों तक पहुँचाना तथा लोकतंत्र व राष्ट्रवाद को वैश्विक आधार देना (Democratization of thoughts)", "पुस्तकों को महँगा करना", "सब गलत"], a: 1 },
            { q: "प्रेस, संस्कृति एवं राष्ट्रवाद (Press, Culture and Nationalism) के इस संपूर्ण अंतिम अध्याय का मूल ऐतिहासिक व वैज्ञानिक निष्कर्ष क्या है?", o: ["प्रेस का राष्ट्रवाद के विकास में कोई योगदान नहीं था और लोग अनपढ़ बने रहे", "मुद्रण क्रांति और प्रेस का विकास केवल सूचना का माध्यम नहीं था, बल्कि यह औपनिवेशिक भारत में ब्रिटिश दमन के खिलाफ राष्ट्रीय चेतना जगाने, सामाजिक-धार्मिक कुरीतियों को सुधारने तथा भारतीय स्वतंत्रता संग्राम को जन-जन का आंदोलन बनाकर भारत को एक संप्रभु राष्ट्र के रूप में गढ़ने का सबसे शक्तिशाली व अजेय वैज्ञानिक अस्त्र साबित हुआ", "वर्नाक्यूलर प्रेस एक्ट पूरी तरह सफल रहा था", "लंदन प्रेस भारत से हमेशा पिछड़ गया था"], a: 1 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let questionStates = new Array(questions.length).fill('default');

        const appDiv = document.getElementById('app');

        function renderStartScreen() {
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in h-full">
                    <div style="width: 96px; height: 96px; background: #f3e8ff; color: #a855f7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                    </div>
                    <h1 style="font-size: 2.25rem; font-weight: 800; margin-bottom: 16px;">प्रेस, संस्कृति एवं राष्ट्रवाद</h1>
                    <p style="color: #475569; margin-bottom: 8px; font-size: 1.25rem; font-weight: bold;">बिहार बोर्ड (BSEB) कक्षा 10वीं - इतिहास (अध्याय 8)</p>
                    <p style="color: #64748b; margin-bottom: 32px; max-width: 512px; font-size: 1.1rem;">मुद्रण क्रांति, गुटेनबर्ग का प्रेस, राजा राममोहन राय, वर्नाक्यूलर प्रेस एक्ट (1878), केसरी, यंग इंडिया, अल-हिलाल तथा प्रेस और राष्ट्रीय आंदोलन के ऐतिहासिक अंतर्संबंधों पर आधारित 100 वस्तुनिष्ठ प्रश्नों का महा-क्विज़।</p>
                    <button onclick="startQuiz()" class="btn-start">क्विज़ शुरू करें</button>
                </div>
            `;
        }

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            questionStates.fill('default');
            renderQuestion();
        }

        function renderQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            let optionsHtml = '';
            q.o.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index}, this)" class="option-btn">
                        <span>${opt}</span>
                        <span class="icon-container hidden"></span>
                    </button>
                `;
            });

            appDiv.innerHTML = `
                <!-- Header -->
                <div class="quiz-header">
                    <div class="flex justify-between items-center" style="margin-bottom: 12px; padding-right: 50px;">
                        <span style="font-size: 0.875rem; font-weight: bold; color: #a855f7; text-transform: uppercase;">प्रश्न ${currentQuestion + 1} / ${questions.length}</span>
                        <span style="font-size: 0.875rem; font-weight: bold; color: #475569; background: #e2e8f0; padding: 4px 12px; border-radius: 9999px;">स्कोर: ${score}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                    <!-- Right Menu Icon for Navigation -->
                    <div class="profile-icon" onclick="openOverview()" title="प्रश्नावली ओवरव्यू">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </div>
                </div>

                <!-- Question Area -->
                <div class="flex-1 overflow-y-auto p-8 fade-in flex flex-col" style="padding: 32px;">
                    <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 32px; line-height: 1.4; color: #1e293b;">${q.q}</h2>
                    <div id="options-container" class="flex-1 flex flex-col justify-center">
                        ${optionsHtml}
                    </div>
                </div>

                <!-- Footer / Actions -->
                <div class="flex justify-between items-center" style="padding: 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; min-height: 90px;">
                    <div>
                        <button id="skip-btn" onclick="skipQuestion()" class="btn-action btn-skip">स्किप करें</button>
                    </div>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden btn-action btn-next">
                        ${currentQuestion === questions.length - 1 ? 'परिणाम देखें' : 'अगला प्रश्न'}
                    </button>
                </div>
            `;
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

            allBtns.forEach((btn, index) => {
                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');
                iconContainer.innerHTML = '';
                iconContainer.classList.remove('hidden');

                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #16a34a; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }
                
                if (index === selectedIndex && selectedIndex !== q.a) {
                    btn.classList.add('wrong');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #dc2626; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                }
            });

            if (selectedIndex === q.a) {
                score++;
                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function skipQuestion() {
            questionStates[currentQuestion] = 'skipped';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                renderResultScreen();
            }
        }

        function openOverview() {
            let gridHtml = '';
            for(let i = 0; i < questions.length; i++) {
                let stateClass = 'state-default';
                if(questionStates[i] === 'correct') stateClass = 'state-correct';
                if(questionStates[i] === 'wrong') stateClass = 'state-wrong';
                if(questionStates[i] === 'skipped') stateClass = 'state-skipped';
                
                gridHtml += `<button onclick="jumpToQuestion(${i})" class="q-circle ${stateClass}">${i + 1}</button>`;
            }

            const overviewDiv = document.createElement('div');
            overviewDiv.id = 'overview-overlay';
            overviewDiv.className = 'overview-panel fade-in';
            overviewDiv.innerHTML = `
                <h3 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 16px; text-align: center; color: #1e293b;">प्रश्नावली ओवरव्यू</h3>
                <div style="display: flex; justify-content: center; gap: 16px; margin-bottom: 12px; font-size: 0.85rem; font-weight: bold;">
                    <span style="color: #c084fc;">■ बिना प्रयास</span>
                    <span style="color: #22c55e;">■ सही</span>
                    <span style="color: #ef4444;">■ गलत</span>
                    <span style="color: #eab308;">■ स्किप किया</span>
                </div>
                <div class="grid-container">
                    ${gridHtml}
                </div>
                <div class="flex justify-center" style="padding-top: 16px; border-top: 1px solid #e2e8f0; background: #fff;">
                    <button onclick="closeOverview()" class="btn-action btn-skip" style="margin: 0 8px;">ओवरव्यू बंद करें</button>
                    <button onclick="submitQuizFromOverview()" class="btn-action btn-next" style="margin: 0 8px; background-color: #a855f7;">क्विज़ सबमिट करें</button>
                </div>
            `;
            appDiv.appendChild(overviewDiv);
        }

        function closeOverview() {
            const overlay = document.getElementById('overview-overlay');
            if(overlay) overlay.remove();
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            closeOverview();
            renderQuestion();
        }

        function submitQuizFromOverview() {
            closeOverview();
            renderResultScreen();
        }

        function renderResultScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let emoji = "";
            
            if (percentage === 100) { message = "अतुलनीय! प्रेस, संस्कृति एवं राष्ट्रवाद अध्याय पर आपका पूरा नियंत्रण है।"; emoji = "🏆"; }
            else if (percentage >= 80) { message = "बहुत बढ़िया! प्रेस के इतिहास और राष्ट्रीय चेतना के विकास पर आपकी गहरी पकड़ है।"; emoji = "🌟"; }
            else if (percentage >= 50) { message = "अच्छा प्रयास! वैचारिक समझ को बेहतर करने के लिए फिर से प्रयास करें।"; emoji = "👍"; }
            else { message = "कोई बात नहीं! एक बार अध्याय को दोहराएं और पुनः प्रयास करें।"; emoji = "📚"; }

            const strokeDasharray = `${percentage}, 100`;
            const colorClass = percentage >= 80 ? '#10b981' : percentage >= 50 ? '#f59e0b' : '#ef4444';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in overflow-y-auto" style="padding: 32px;">
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 32px;">क्विज़ परिणाम ${emoji}</h2>
                    
                    <div style="position: relative; width: 192px; height: 192px; margin-bottom: 32px; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="width: 100%; height: 100%;">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="circle" stroke="${colorClass}" stroke-dasharray="${strokeDasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 2.25rem; font-weight: 900;">${score}</span>
                            <span style="font-size: 0.875rem; font-weight: bold; color: #94a3b8;">/ 100</span>
                        </div>
                    </div>

                    <p style="font-size: 1.5rem; font-weight: bold; margin-bottom: 8px;">${percentage}% अंक</p>
                    <p style="font-size: 1.125rem; color: #a855f7; margin-bottom: 40px; max-width: 448px;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action" style="background: white; border: 2px solid #e2e8f0; color: #475569; padding: 16px 32px; border-radius: 12px; font-size: 1.125rem;">
                        फिर से प्रयास करें
                    </button>
                </div>
            `;
        }

        // Initialize App
        renderStartScreen();
    </script>
</body>
</html>

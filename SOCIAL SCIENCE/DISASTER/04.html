<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSEB कक्षा 10 आपदा प्रबंधन - अध्याय 4 क्विज़</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.125);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 900px;
            height: 90vh;
            min-height: 620px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            font-size: 1.05rem;
            font-weight: 500;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.15);
            border-color: #38bdf8;
        }
        .correct {
            background: rgba(34, 197, 94, 0.25) !important;
            border-color: #22c55e !important;
            color: #4ade80 !important;
        }
        .wrong {
            background: rgba(239, 68, 68, 0.25) !important;
            border-color: #ef4444 !important;
            color: #f87171 !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        .quiz-header { padding: 24px 32px 16px 32px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); background: rgba(15, 23, 42, 0.4); position: relative; }
        .progress-bar-bg { width: 100%; background-color: rgba(255, 255, 255, 0.1); border-radius: 9999px; height: 10px; overflow: hidden; }
        .progress-bar-fill { background: linear-gradient(to right, #06b6d4, #3b82f6); height: 10px; border-radius: 9999px; transition: width 0.4s ease-out; }
        .profile-icon { position: absolute; top: 20px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .profile-icon:hover { background: rgba(255, 255, 255, 0.2); }
        
        .btn-start { padding: 16px 40px; background: linear-gradient(135deg, #0284c7, #2563eb); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 28px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; font-size: 0.95rem; }
        .btn-next { background-color: #38bdf8; color: #0f172a; }
        .btn-skip { background-color: rgba(255, 255, 255, 0.1); color: #cbd5e1; }
        
        .overview-panel { position: absolute; inset: 0; background: #0f172a; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 10px; padding: 16px 0; flex: 1; overflow-y: auto; }
        .q-circle { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.85rem; }
        
        .state-default { background: rgba(255, 255, 255, 0.1); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
        
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 220px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: rgba(255, 255, 255, 0.1); stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; }
        .stats-box { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 16px; margin-bottom: 24px; width: 100%; max-width: 480px; }
    </style>
</head>
<body>

    <div id="app" class="glass-panel"></div>

    <script>
        const rawQuestions = [
            { q: "आकास्मिक प्रबंधन का प्रमुख घटक कौन सा है?", o: ["स्थानीय प्रशासन", "स्वयंसेवी संगठन", "गांव या मोहल्ले के लोग", "उपर्युक्त सभी"], a: 3 },
            { q: "मलबे के नीचे दबे हुए लोगों का पता लगाने के लिए किस कैमरे का उपयोग किया जाता है?", o: ["इन्फ्रारेड कैमरा", "साधारण कैमरा", "दूरबीन", "सोनार"], a: 0 },
            { q: "मानव शरीर के आग से जलने की स्थिति में प्राथमिक उपचार क्या करना चाहिए?", o: ["ठंडा पानी डालना", "बर्नोल लगाना", "अस्पताल पहुँचाना", "गर्म पानी डालना"], a: 0 },
            { q: "बाढ़ के समय निम्नलिखित में से किस स्थान पर जाना चाहिए?", o: ["उच्च भूमि वाले स्थान पर", "गांव के बाहर", "खेतों में", "घर की छत पर"], a: 0 },
            { q: "आपदा काल में प्राथमिक सहायता किट (First Aid Kit) में क्या होना आवश्यक है?", o: ["पट्टी, रोगाणुरोधक और दवा", "केवल भोजन", "केवल कपड़े", "केवल टॉर्च"], a: 0 },
            { q: "भूकंप प्रभावित क्षेत्रों में इमारतों की आकृति कैसी होनी चाहिए?", o: ["आयताकार और साधारण", "वृत्ताकार", "त्रिभुजाकार", "विषमकोणीय"], a: 0 },
            { q: "आग लगने की स्थिति में सबसे पहला प्राथमिक कार्य क्या होना चाहिए?", o: ["अग्नि शमन दल को बुलाना", "पानी छिड़कना", "भाग जाना", "सामान बाहर निकालना"], a: 0 },
            { q: "आपदा के समय राहत शिविरों में मुख्य प्राथमिक आवश्यकता क्या होती है?", o: ["स्वच्छ पेयजल एवं भोजन", "केबल टीवी", "खिलौने", "सड़क निर्माण"], a: 0 },
            { q: "बाढ़ प्रभावित क्षेत्रों में पानी को पीने योग्य बनाने के लिए क्या करना चाहिए?", o: ["उबालकर या क्लोरीन मिलाकर पीना", "सीधा नदी का पानी पीना", "तालाब का पानी पीना", "कुएं का अनधुला पानी"], a: 0 },
            { q: "दबे हुए व्यक्ति को मलबे से बाहर निकालने के लिए किस उपकरण का उपयोग किया जाता है?", o: ["जैक और कटर", "क्रेन", "ट्रैक्टर", "कुल्हाड़ी"], a: 0 },
            { q: "मलबे में फंसे व्यक्तियों की धड़कन या सांस सुनने के लिए किस यंत्र का प्रयोग होता है?", o: ["अकॉस्टिक लाइफ डिटेक्टर", "थर्मामीटर", "सिस्मोग्राफ", "बैरोमीटर"], a: 0 },
            { q: "आकास्मिक स्थिति में खोज और बचाव कार्य के लिए कौन सी राष्ट्रीय एजेंसी तैनात होती है?", o: ["राष्ट्रीय आपदा प्रतिक्रिया बल", "रेलवे सुरक्षा बल", "गृह रक्षक", "सैनिक पुलिस"], a: 0 },
            { q: "आग से जले हुए स्थान पर तुरंत क्या लगाना चाहिए?", o: ["ठंडा पानी या बर्फ", "गरम तेल", "नमक", "हल्दी पेस्ट"], a: 0 },
            { q: "बाढ़ के दौरान जीवन रक्षा के लिए किस तैरने वाले साधन का उपयोग किया जा सकता है?", o: ["लाइफ जैकेट या हवा से भरी ट्यूब", "लोहे की छड़", "भारी पत्थर", "कांच का डिब्बा"], a: 0 },
            { q: "दम घुटने की स्थिति में पीड़ित व्यक्ति को सबसे पहले क्या देना चाहिए?", o: ["ताजी हवा और ऑक्सीजन", "ठंडा पानी", "गरम दूध", "भोजन"], a: 0 },
            { q: "आकास्मिक प्रबंधन में स्थानीय युवाओं की क्या भूमिका होती है?", o: ["राहत और बचाव में मदद करना", "केवल देखना", "अफवाहें फैलाना", "घर में रहना"], a: 0 },
            { q: "गंभीर रूप से घायल व्यक्ति को तुरंत कहाँ ले जाना चाहिए?", o: ["निकटतम प्राथमिक स्वास्थ्य केंद्र", "घर पर", "पंचायत भवन", "बाजार"], a: 0 },
            { q: "आपदा के दौरान फैलने वाली महामारी से बचने के लिए क्या छिड़कना चाहिए?", o: ["ब्लीचिंग पाउडर और चूना", "नमक का पानी", "केवल जल", "खाद"], a: 0 },
            { q: "आग बुझाने के लिए गैस सिलेंडरों पर किसका प्रयोग सबसे प्रभावी होता है?", o: ["भीगा हुआ भारी कंबल या बोरा", "सूखा कपड़ा", "कागज", "प्लास्टिक"], a: 0 },
            { q: "भूकंप के झटके महसूस होते ही सुरक्षित रहने के लिए क्या करना चाहिए?", o: ["खुले मैदान की ओर जाना", "कमरे का दरवाजा बंद करना", "छत पर चढ़ना", "अलमारी में छिपना"], a: 0 },
            { q: "सुनामी की पूर्व चेतावनी मिलते ही तटीय लोगों को कहाँ पलायन करना चाहिए?", o: ["ऊँचे भू-भाग की ओर", "समुद्र तट पर", "नाव में बैठकर समुद्र में", "निचले मैदान में"], a: 0 },
            { q: "आपदा के समय घायलों को ले जाने के लिए किस प्राथमिक वाहन का प्रयोग होता है?", o: ["एम्बुलेंस", "ट्रैक्टर", "बस", "ट्रक"], a: 0 },
            { q: "आकास्मिक स्थिति में भोजन के लिए किस प्रकार के राशन का वितरण सही रहता है?", o: ["सूखा एवं पकाने योग्य राशन", "केवल फल", "केवल मिठाई", "जूस डिब्बे"], a: 0 },
            { q: "बिजली के शॉर्ट सर्किट से लगी आग पर क्या नहीं डालना चाहिए?", o: ["पानी", "बालू या रेत", "सूखी मिट्टी", "अग्निशामक गैस"], a: 0 },
            { q: "बिजली के शॉर्ट सर्किट से लगी आग को बुझाने के लिए किस प्रकार का यंत्र चाहिए?", o: ["कार्बन डाइऑक्साइड अग्निशामक", "पानी का पंप", "गीला कपड़ा", "नमक का घोल"], a: 0 },
            { q: "आपदा के दौरान बच्चों एवं शिशुओं के लिए सबसे मुख्य आहार क्या है?", o: ["दूध एवं बेबी फूड", "कड़ा राशन", "मसालेदार भोजन", "केवल जल"], a: 0 },
            { q: "आकास्मिक स्थिति में संचार व्यवस्था टूटने पर किस विकल्प का प्रयोग होता है?", o: ["वायरलेस और सैटेलाइट फोन", "डाक पत्र", "तार", "लैंडलाइन"], a: 0 },
            { q: "बाढ़ में पानी से घिरे लोगों को सुरक्षित निकालने के लिए किसका प्रयोग होता है?", o: ["मोटरबोट और हैलीकॉप्टर", "बस", "मोटर साइकिल", "ट्रेन"], a: 0 },
            { q: "आपदा प्रबंधन में 'हेल्पलाइन नंबर' का मुख्य कार्य क्या है?", o: ["आकास्मिक सूचना और सहायता देना", "मनोरंजन करना", "समय बताना", "विज्ञापन देना"], a: 0 },
            { q: "यदि व्यक्ति पानी में डूब रहा हो तो प्राथमिक बचाव क्या होना चाहिए?", o: ["रस्सी या तैरने वाली वस्तु फेंकना", "स्वयं बिना जाने कूदना", "देखते रहना", "शोर न मचाना"], a: 0 },
            { q: "हड्डियों के टूटने पर प्राथमिक उपचार में क्या प्रयोग करना चाहिए?", o: ["खपच्ची (पट्टी) बांधना", "हड्डी को खींचना", "गरम पानी डालना", "मालिश करना"], a: 0 },
            { q: "सांप के काटने पर प्राथमिक उपचार में कटे स्थान के ऊपर क्या करना चाहिए?", o: ["कपड़े से कसकर बांधना", "ठंडा पानी डालना", "चीरा लगाना", "तेल लगाना"], a: 0 },
            { q: "आकास्मिक प्रबंधन का मुख्य उद्देश्य क्या होता है?", o: ["जीवन और माल की हानि को कम करना", "केवल मुआवजा देना", "चित्र खींचना", "सड़कें साफ करना"], a: 0 },
            { q: "राहत शिविरों में महिलाओं की सुरक्षा के लिए कौन तैनात रहता है?", o: ["महिला पुलिस और स्वयंसेविकाएं", "केवल स्थानीय लोग", "सैनिक", "केवल डॉक्टर"], a: 0 },
            { q: "भूकंप के बाद क्षतिग्रस्त भवनों में जाने से पहले क्या जांचना चाहिए?", o: ["संरचनात्मक मजबूती", "दीवार का रंग", "दरवाजे की चाबी", "खिड़की का कांच"], a: 0 },
            { q: "प्राथमिक चिकित्सा बॉक्स (First Aid Box) पर कौन सा चिह्न होता है?", o: ["लाल क्रॉस का चिह्न", "हरा गोला", "पीला त्रिभुज", "नीला वर्ग"], a: 0 },
            { q: "आपदा मित्र योजना के तहत किसको प्रशिक्षित किया जाता है?", o: ["स्थानीय स्वयंसेवक युवाओं को", "केवल डॉक्टरों को", "शिक्षकों को", "व्यापारियों को"], a: 0 },
            { q: "भूकंप के दौरान मेज के नीचे छिपने की क्रिया को क्या कहते हैं?", o: ["ड्रॉप, कवर एंड होल्ड", "रन एंड हाइड", "स्टॉप एंड लुक", "जंप एंड गो"], a: 0 },
            { q: "आकास्मिक समय में स्वच्छता न रहने पर किस बीमारी का प्रसार तेजी से होता है?", o: ["हैजा और डायरिया", "मलेरिया", "चेचक", "पोलियो"], a: 0 },
            { q: "भूकंप के झटके रुकने के तुरंत बाद क्या करना चाहिए?", o: ["सावधानीपूर्वक बाहर निकलना", "सो जाना", "पंख चला लेना", "खाना पकाना"], a: 0 },
            { q: "आग बुझाने के लिए रेत या मिट्टी का उपयोग क्यों किया जाता है?", o: ["ऑक्सीजन का संपर्क काटने के लिए", "तापमान बढ़ाने के लिए", "धुआं फैलाने के लिए", "रंग बदलने के लिए"], a: 0 },

        ];

        // Fisher-Yates Shuffle Algorithm for Questions and Options
        function shuffleQuestionsAndOptions(array) {
            const shuffled = JSON.parse(JSON.stringify(array));
            
            // Shuffle question order
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            // Shuffle options and update correct answer index
            shuffled.forEach(item => {
                const correctAnswerText = item.o[item.a];
                for (let i = item.o.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [item.o[i], item.o[j]] = [item.o[j], item.o[i]];
                }
                item.a = item.o.indexOf(correctAnswerText);
            });

            return shuffled;
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');

                if (index === q.a) {

                    btn.classList.remove('disabled-option');

                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');

                            <div>
                                <p style="font-size: 0.8rem; color: #94a3b8; font-weight: bold; margin-bottom: 4px;">कुल प्रश्न</p>
                                <p style="font-size: 1.4rem; font-weight: 800; color: #f8fafc;">${questions.length}</p>
                            </div>
                            <div>
                                <p style="font-size: 0.8rem; color: #94a3b8; font-weight: bold; margin-bottom: 4px;">सही उत्तर</p>
                                <p style="font-size: 1.4rem; font-weight: 800; color: #4ade80;">${correctCount}</p>
                            </div>
                            <div>
                                <p style="font-size: 0.8rem; color: #94a3b8; font-weight: bold; margin-bottom: 4px;">गलत उत्तर</p>
                                <p style="font-size: 1.4rem; font-weight: 800; color: #f87171;">${wrongCount}</p>
                            </div>
                            <div>
                                <p style="font-size: 0.8rem; color: #94a3b8; font-weight: bold; margin-bottom: 4px;">छोड़े गए</p>
                                <p style="font-size: 1.4rem; font-weight: 800; color: #facc15;">${skippedCount}</p>
                            </div>
                        </div>
                    </div>

                    <p style="font-size: 1.05rem; color: #cbd5e1; margin-bottom: 28px; max-width: 450px; line-height: 1.5;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action" style="padding: 14px 40px; border-radius: 12px; font-size: 1.05rem; background: #22c55e; color: white;">
                        पुनः प्रयास करें
                    </button>
                </div>
            `;
        }

        renderStartScreen();
    </script>
</body>
</html>

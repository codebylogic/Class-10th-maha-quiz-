<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - BSEB Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex flex-col items-center justify-center p-6 text-center bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-slate-950">
    <div class="max-w-md w-full bg-slate-900/40 border border-slate-800/80 rounded-3xl p-8 space-y-5 backdrop-blur-md">
        <div class="text-4xl">📶❌</div>
        <h2 class="text-xl font-extrabold text-white">आप ऑफलाइन हैं!</h2>
        <p class="text-xs text-slate-400 leading-relaxed">
            क्विज़ पोर्टल को लोड करने के लिए इंटरनेट कनेक्शन की आवश्यकता है। कृपया अपना डेटा या वाई-फाई चालू करें और दोबारा प्रयास करें।
        </p>
        <button onclick="window.location.reload()" class="w-full py-2.5 bg-indigo-600 hover:bg-indigo-500 font-bold text-xs text-white rounded-xl transition shadow-lg shadow-indigo-600/20">
            पुनः प्रयास करें (Retry)
        </button>
    </div>
</body>
</html>

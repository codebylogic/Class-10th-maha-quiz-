<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>रसायन विज्ञान क्विज़ - कार्बन एवं उसके यौगिक</title>
    <style>
        /* Base Offline Styles replacing Tailwind */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f3ff;
            color: #2d3748;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(139, 92, 246, 0.15);
            width: 100%;
            max-width: 896px;
            height: 90vh;
            min-height: 600px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 1.125rem;
            font-weight: 500;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #8b5cf6;
            background-color: #f5f3ff;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Layout Utilities */
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .justify-end { justify-content: flex-end; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        /* Header & Elements */
        .quiz-header { padding: 32px 32px 16px 32px; border-bottom: 1px solid #f1f5f9; background: rgba(255,255,255,0.5); position: relative; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 12px; overflow: hidden; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06); }
        .progress-bar-fill { background: linear-gradient(to right, #a78bfa, #8b5cf6); height: 12px; border-radius: 9999px; transition: all 0.5s ease-out; }
        .profile-icon { position: absolute; top: 24px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-start { padding: 16px 40px; background: linear-gradient(to right, #8b5cf6, #6d28d9); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.3); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 32px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; margin-left: 8px; font-size: 1rem; }
        .btn-next { background-color: #111827; color: white; }
        .btn-skip { background-color: #e2e8f0; color: #4a5568; }
        
        /* Overview Panel */
        .overview-panel { position: absolute; inset: 0; background: white; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(45px, 1fr)); gap: 12px; padding: 16px 0; flex-1; overflow-y: auto; }
        .q-circle { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.9rem; }
        
        /* Circle States */
        .state-default { background: linear-gradient(135deg, #a78bfa, #8b5cf6); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
        
        /* Circular Progress Chart */
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #eee; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-gray-800">

    <div id="app" class="glass-panel">
        <!-- Screens will be injected here by JS -->
    </div>

    <script>
        const questions = [
            { q: "कार्बन की परमाणु संख्या (Atomic Number) कितनी होती है?", o: ["4", "6", "8", "12"], a: 1 },
            { q: "कार्बन के बाहरी कोश (Valence Shell) में कुल कितने इलेक्ट्रॉन होते हैं?", o: ["2", "4", "6", "8"], a: 1 },
            { q: "कार्बन अन्य परमाणुओं के साथ किस प्रकार का रासायनिक बंध बनाता है?", o: ["आयनिक बंध", "सहसंयोजक बंध (Covalent Bond)", "उप-सहसंयोजक बंध", "धात्विक बंध"], a: 1 },
            { q: "कार्बन की संयोजकता (Valency) कितनी होती है, जिसके कारण इसे 'चतुःसंयोजक' कहा जाता है?", o: ["2", "3", "4", "5"], a: 2 },
            { q: "कार्बन परमाणुओं के बीच आपस में जुड़कर लंबी श्रृंखला बनाने के अनूठे गुण को क्या कहते हैं?", o: ["समावयवता", "श्रृंखलन (Catenation)", "अपररूपता", "बहुलीकरण"], a: 1 },
            { q: "प्रकृति में पाया जाने वाला सबसे कठोर शुद्ध कार्बन का अपररूप (Allotrope) कौन सा है?", o: ["ग्रेफाइट", "फुलरीन", "हीरा (Diamond)", "कोयला"], a: 2 },
            { q: "कार्बन का कौन सा अपररूप विद्युत का सुचालक (Good Conductor of Electricity) होता है?", o: ["हीरा", "ग्रेफाइट (Graphite)", "कोयला", "काजल"], a: 1 },
            { q: "C₆₀ के रूप में पहचाने जाने वाले फुटबॉल के आकार के कार्बन अपररूप का नाम क्या है?", o: ["ग्रेफाइट", "बकमिंस्टर फुलरीन (Fullerene)", "हीरा", "ग्राफीन"], a: 1 },
            { q: "केवल कार्बन और हाइड्रोजन से बने यौगिकों को क्या कहा जाता है?", o: ["अल्कोहल", "हाइड्रोकार्बन (Hydrocarbons)", "एल्डिहाइड", "कीटोन"], a: 1 },
            { q: "वैसे हाइड्रोकार्बन जिनमें कार्बन परमाणुओं के बीच केवल एकल बंध (Single Bond) होता है, क्या कहलाते हैं?", o: ["संतृप्त हाइड्रोकार्बन (Saturated)", "असंतृप्त हाइड्रोकार्बन", "एल्कीन", "एल्काइन"], a: 0 },
            { q: "द्वि-बंध (Double Bond) या त्रि-बंध (Triple Bond) वाले हाइड्रोकार्बन किस श्रेणी में आते हैं?", o: ["संतृप्त हाइड्रोकार्बन", "असंतृप्त हाइड्रोकार्बन (Unsaturated)", "एल्केन", "पैराफिन"], a: 1 },
            { q: "एल्केन (Alkane) श्रेणी का सामान्य रासायनिक सूत्र निम्नलिखित में से कौन सा है?", o: ["CnH2n", "CnH2n+2", "CnH2n-2", "CnHn"], a: 1 },
            { q: "एल्कीन (Alkene) श्रेणी के यौगिकों का सामान्य रासायनिक सूत्र क्या होता है?", o: ["CnH2n+2", "CnH2n", "CnH2n-2", "CnH2n+1"], a: 1 },
            { q: "एल्काइन (Alkyne) श्रेणी के असंतृप्त हाइड्रोकार्बन का सामान्य सूत्र क्या है?", o: ["CnH2n", "CnH2n+2", "CnH2n-2", "CnH2n-1"], a: 2 },
            { q: "सबसे सरलतम हाइड्रोकार्बन और एल्केन श्रेणी का प्रथम सदस्य कौन सा है?", o: ["एथेन", "मीथेन (CH₄)", "प्रोपेन", "ब्यूटेन"], a: 1 },
            { q: "एल्कीन श्रेणी का प्रथम सदस्य कौन सा हाइड्रोकार्बन है?", o: ["मीथीन", "एथीन (C₂H₄)", "प्रोपीन", "ब्यूटीन"], a: 1 },
            { q: "एल्काइन श्रेणी का सबसे सरलतम और पहला सदस्य कौन सा है जिसे एथाइन भी कहते हैं?", o: ["एसीटिलीन (C₂H₂)", "मीथाइन", "प्रोपाइन", "ब्यूटाइन"], a: 0 },
            { q: "घरेलू गैस सिलेंडरों (LPG) का मुख्य घटक कौन सा हाइड्रोकार्बन होता है?", o: ["मीथेन", "एथेन", "ब्यूटेन (Butane)", "हेक्सेन"], a: 2 },
            { q: "बायोगैस (Biogas) और सीएनजी (CNG) का मुख्य रूप से प्रमुख घटक कौन सा है?", o: ["मीथेन (Methane)", "ब्यूटेन", "प्रोपेन", "एथीन"], a: 0 },
            { q: "समान आणविक सूत्र लेकिन भिन्न संरचनात्मक सूत्रों वाले यौगिकों को क्या कहा जाता है?", o: ["समस्थानिक", "समावयवी (Isomers)", "अपररूप", "समजात"], a: 1 },
            { q: "ब्यूटेन (C₄H₁₀) के कुल कितने संरचनात्मक समावयवी (Structural Isomers) संभव हैं?", o: ["2 (n-ब्यूटेन और आइसो-ब्यूटेन)", "3", "4", "5"], a: 0 },
            { q: "पेन्टेन (C₅H₁₂) के कुल कितने संरचनात्मक समावयवी पाए जाते हैं?", o: ["2", "3 (Normal, Iso, Neo)", "4", "5"], a: 1 },
            { q: "बेंजीन (Benzene) का सही आणविक सूत्र और उसकी संरचनात्मक प्रकृति कैसी होती है?", o: ["C₆H₁₂, रेखीय", "C₆H₆, वलयाकार (Aromatic Ring)", "C₆H₁₀, शाखित", "C₅H₅, वलय"], a: 1 },
            { q: "बेंजीन की वलयाकार संरचना में कितने एकल बंध और कितने द्वि-बंध एकांतर क्रम में होते हैं?", o: ["6 एकल और 6 द्वि-बंध", "9 एकल और 3 द्वि-बंध", "3 एकल और 3 द्वि-बंध", "12 एकल और 2 द्वि-बंध"], a: 1 },
            { q: "यौगिकों की ऐसी श्रृंखला जिसमें समान प्रकार्यात्मक समूह होता है और दो निकटवर्ती सदस्यों में -CH₂- का अंतर होता है?", o: ["समस्थानिक श्रेणी", "समजात श्रेणी (Homologous Series)", "समावयवी श्रेणी", "अपररूप श्रेणी"], a: 1 },
            { q: "समजात श्रेणी के दो क्रमागत सदस्यों के आणविक द्रव्यमान में कितने इकाई (u) का अंतर होता है?", o: ["12 u", "14 u", "16 u", "2 u"], a: 1 },
            { q: "हाइड्रोकार्बन श्रृंखला में हाइड्रोजन को प्रतिस्थापित करने वाले तत्वों (जैसे Cl, Br, O, N) को क्या कहते हैं?", o: ["समजात तत्व", "विषम परमाणु (Heteroatoms)", "समावयवी", "उत्प्रेरक"], a: 1 },
            { o: ["एल्डिहाइड", "अल्कोहल (-OH)", "कीटोन", "कार्बोक्सिलिक अम्ल"], q: "अल्कोहल प्रकार्यात्मक समूह का सही संकेत/संरचना क्या है?", a: 1 },
            { q: "एल्डिहाइड प्रकार्यात्मक समूह का सही रासायनिक निरूपण कौन सा है?", o: ["-OH", "-CHO", "-CO-", "-COOH"], a: 1 },
            { q: "कीटोन (Ketone) प्रकार्यात्मक समूह की सही पहचान क्या है?", o: ["-CHO", "-COOH", "-CO- (या >C=O)", "-OH"], a: 2 },
            { q: "कार्बोक्सिलिक अम्ल प्रकार्यात्मक समूह का सही रासायनिक सूत्र क्या है?", o: ["-CHO", "-COOH", "-OH", "-O-"], a: 1 },
            { q: "प्रोपेनोन (Propanone) का प्रकार्यात्मक समूह कौन सा है और यह किस श्रेणी का है?", o: ["अल्कोहल", "एल्डिहाइड", "कीटोन", "एस्टर"], a: 2 },
            { q: "एथेनॉइक अम्ल (Ethanoic Acid) का सामान्य या वाणिज्यिक नाम क्या है?", o: ["फॉर्मिक अम्ल", "एसिटिक अम्ल (Acetic Acid)", "साइट्रिक अम्ल", "लैक्टिक अम्ल"], a: 1 },
            { q: "3-4% एसिटिक अम्ल के जलीय विलयन को आमतौर पर किस नाम से जाना जाता है?", o: ["परिशुद्ध अल्कोहल", "सिरका (Vinegar)", "एस्टर", "टार्च"], a: 1 },
            { q: "शुद्ध एथेनॉइक अम्ल का गलनांक 290 K होता है, ठंड में जम जाने के कारण इसे क्या कहा जाता है?", o: ["बर्फ़ीला अम्ल", "ग्लेशियर एसिटिक अम्ल (Glacial Acetic Acid)", "ठोस सिरका", "सिट्रिक रस"], a: 1 },
            { q: "एथेनॉल (C₂H₅OH) का सामान्य प्रचलित नाम क्या है जिसका उपयोग पेय पदार्थों में होता है?", o: ["मेथिल अल्कोहल", "एथिल अल्कोहल (Ethyl Alcohol)", "एसिटिक लिक्विड", "फॉर्मेलिन"], a: 1 },
            { q: "100% शुद्ध एथेनॉल को तकनीकी रूप से क्या कहा जाता है?", o: ["परिशुद्ध अल्कोहल (Absolute Alcohol)", "विकृत अल्कोहल", "रेक्टिफाइड स्पिरिट", "पावर अल्कोहल"], a: 0 },
            { q: "औद्योगिक उपयोग के एथेनॉल का दुरुपयोग रोकने के लिए उसमें मेथेनॉल या रंग मिला देने पर उसे क्या कहते हैं?", o: ["शुद्ध अल्कोहल", "विकृत अल्कोहल (Denatured Alcohol)", "सॉफ्ट ड्रिंक", "टिंचर आयोडीन"], a: 1 },
            { q: "अम्ल और अल्कोहल की आपसी क्रिया से मीठी गंध वाले यौगिक बनने की प्रक्रिया को क्या कहते हैं?", o: ["साबुनीकरण", "एस्टरीकरण (Esterification)", "बहुलीकरण", "हाइड्रोजनीकरण"], a: 1 },
            { q: "एस्टर की क्रिया सोडियम हाइड्रॉक्साइड (NaOH) से कराने पर पुनः अल्कोहल और कार्बोक्सिलिक अम्ल का लवण बनना क्या कहलाता है?", o: ["एस्टरीकरण", "साबुनीकरण (Saponification)", "तनुकरण", "उदासीनीकरण"], a: 1 },
            { q: "साबुन (Soap) रासायनिक रूप से क्या होते हैं?", o: ["उच्च वसा अम्लों के सोडियम या पोटेशियम लवण", "सल्फोनिक अम्लों के लवण", "अल्कोहल के मिश्रण", "ग्लिसरॉल के एस्टर"], a: 0 },
            { q: "अपमार्जक (Detergents) आमतौर पर रासायनिक रूप से क्या होते हैं?", o: ["वसा अम्लों के सोडियम लवण", "लम्बी श्रृंखला वाले कार्बोक्सिलिक अम्लों के अमोनियम या सल्फोनिट लवण", "एस्टर के मिश्रण", "हाइड्रोकार्बन"], a: 1 },
            { q: "साबुन कठोर जल (Hard Water) में झाग क्यों नहीं देता है?", o: ["कठोर जल में साबुन घुलता नहीं है", "यह कठोर जल के कैल्शियम और मैग्नीशियम आयनों के साथ अघुलनशील अवक्षेप (Scum) बनाता है", "कठोर जल अम्लीय होता है", "साबुन निष्क्रिय हो जाता है"], a: 1 },

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in h-full">
                    <div style="width: 96px; height: 96px; background: #ede9fe; color: #7c3aed; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </div>
                    <h1 style="font-size: 2.25rem; font-weight: 800; margin-bottom: 16px;">कार्बन एवं उसके यौगिक (Carbon & its Compounds)</h1>
                    <p style="color: #4a5568; margin-bottom: 8px; font-size: 1.25rem; font-weight: bold;">कक्षा 10वीं + प्रतियोगी परीक्षा स्तर (अध्याय 4)</p>
                    <p style="color: #6b7280; margin-bottom: 32px; max-width: 512px; font-size: 1.1rem;">पूरे 100 चुनिंदा वैचारिक प्रश्नों का महा-संग्रह। आधुनिक ग्लासमोर्फिज्म इंटरफ़ेस, लाइव प्रोग्रेस बार और नेविगेशन ग्रिड के साथ परीक्षा की तैयारी पूरी करें।</p>
                    <button onclick="startQuiz()" class="btn-start">क्विज़ शुरू करें</button>
                </div>
            `;
        }

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            questionStates.fill('default');
            renderQuestion();
        }

        function renderQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            let optionsHtml = '';
            q.o.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index}, this)" class="option-btn">
                        <span>${opt}</span>
                        <span class="icon-container hidden"></span>
                    </button>
                `;
            });

            appDiv.innerHTML = `
                <!-- Header -->
                <div class="quiz-header">
                    <div class="flex justify-between items-center" style="margin-bottom: 12px; padding-right: 50px;">
                        <span style="font-size: 0.875rem; font-weight: bold; color: #8b5cf6; text-transform: uppercase;">प्रश्न ${currentQuestion + 1} / ${questions.length}</span>
                        <span style="font-size: 0.875rem; font-weight: bold; color: #4a5568; background: #e2e8f0; padding: 4px 12px; border-radius: 9999px;">स्कोर: ${score}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                    <!-- Right Profile Icon for Navigation -->
                    <div class="profile-icon" onclick="openOverview()" title="प्रश्नावली ओवरव्यू">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                    </div>
                </div>

                <!-- Question Area -->
                <div class="flex-1 overflow-y-auto p-8 fade-in flex flex-col" style="padding: 32px;">
                    <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 32px; line-height: 1.4; color: #1a202c;">${q.q}</h2>
                    <div id="options-container" class="flex-1 flex flex-col justify-center">
                        ${optionsHtml}
                    </div>
                </div>

                <!-- Footer / Actions -->
                <div class="flex justify-between items-center" style="padding: 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; min-height: 90px;">
                    <div>
                        <button id="skip-btn" onclick="skipQuestion()" class="btn-action btn-skip">स्किप करें</button>
                    </div>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden btn-action btn-next">
                        ${currentQuestion === questions.length - 1 ? 'परिणाम देखें' : 'अगला प्रश्न'}
                    </button>
                </div>
            `;
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

            allBtns.forEach((btn, index) => {
                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');
                iconContainer.classList.remove('hidden');

                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #16a34a; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }
                
                if (index === selectedIndex && selectedIndex !== q.a) {
                    btn.classList.add('wrong');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #dc2626; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                }
            });

            if (selectedIndex === q.a) {
                score++;
                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function skipQuestion() {
            questionStates[currentQuestion] = 'skipped';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                renderResultScreen();
            }
        }

        function openOverview() {
            let gridHtml = '';
            for(let i = 0; i < questions.length; i++) {
                let stateClass = 'state-default';
                if(questionStates[i] === 'correct') stateClass = 'state-correct';
                if(questionStates[i] === 'wrong') stateClass = 'state-wrong';
                if(questionStates[i] === 'skipped') stateClass = 'state-skipped';
                
                gridHtml += `<button onclick="jumpToQuestion(${i})" class="q-circle ${stateClass}">${i + 1}</button>`;
            }

            const overviewDiv = document.createElement('div');
            overviewDiv.id = 'overview-overlay';
            overviewDiv.className = 'overview-panel fade-in';
            overviewDiv.innerHTML = `
                <h3 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 16px; text-align: center; color: #2d3748;">प्रश्नावली ओवरव्यू</h3>
                <div style="display: flex; justify-content: center; gap: 16px; margin-bottom: 12px; font-size: 0.85rem; font-weight: bold;">
                    <span style="color: #a78bfa;">■ बिना प्रयास</span>
                    <span style="color: #22c55e;">■ सही</span>
                    <span style="color: #ef4444;">■ गलत</span>
                    <span style="color: #eab308;">■ स्किप किया</span>
                </div>
                <div class="grid-container">
                    ${gridHtml}
                </div>
                <div class="flex justify-center" style="padding-top: 16px; border-top: 1px solid #e2e8f0; background: #fff;">
                    <button onclick="closeOverview()" class="btn-action btn-skip" style="margin: 0 8px;">ओवरव्यू बंद करें</button>
                    <button onclick="submitQuizFromOverview()" class="btn-action btn-next" style="margin: 0 8px; background-color: #8b5cf6;">क्विज़ सबमिट करें</button>
                </div>
            `;
            appDiv.appendChild(overviewDiv);
        }

        function closeOverview() {
            const overlay = document.getElementById('overview-overlay');
            if(overlay) overlay.remove();
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            closeOverview();
            renderQuestion();
        }

        function submitQuizFromOverview() {
            closeOverview();
            renderResultScreen();
        }

        function renderResultScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let emoji = "";
            
            if (percentage === 100) { message = "उत्कृष्ट! आपने कार्बनिक रसायन में 100% अंक अर्जित किए हैं।"; emoji = "🏆"; }
            else if (percentage >= 80) { message = "अद्भुत प्रदर्शन! कार्बन एवं उसके यौगिकों पर आपकी गहरी पकड़ है।"; emoji = "🌟"; }
            else if (percentage >= 50) { message = "अच्छा प्रयास! वैचारिक समझ को बेहतर करने के लिए फिर से प्रयास करें।"; emoji = "👍"; }
            else { message = "कोई बात नहीं! एक बार अध्याय को दोहराएं और पुनः प्रयास करें।"; emoji = "📚"; }

            const strokeDasharray = `${percentage}, 100`;
            const colorClass = percentage >= 80 ? '#10b981' : percentage >= 50 ? '#f59e0b' : '#ef4444';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in overflow-y-auto" style="padding: 32px;">
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 32px;">क्विज़ परिणाम ${emoji}</h2>
                    
                    <div style="position: relative; width: 192px; height: 192px; margin-bottom: 32px; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="width: 100%; height: 100%;">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="circle" stroke="${colorClass}" stroke-dasharray="${strokeDasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 2.25rem; font-weight: 900;">${score}</span>
                            <span style="font-size: 0.875rem; font-weight: bold; color: #9ca3af;">/ 100</span>
                        </div>
                    </div>

                    <p style="font-size: 1.5rem; font-weight: bold; margin-bottom: 8px;">${percentage}% अंक</p>
                    <p style="font-size: 1.125rem; color: #6b7280; margin-bottom: 40px; max-width: 448px;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action" style="background: white; border: 2px solid #e2e8f0; color: #4a5568; padding: 16px 32px; border-radius: 12px; font-size: 1.125rem;">
                        पुनः प्रयास करें
                    </button>
                </div>
            `;
        }

        // Initialize App
        renderStartScreen();
    </script>
</body>
</html>

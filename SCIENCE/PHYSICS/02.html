<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भारती भवन भौतिकी - अध्याय 2: प्रकाश का अपवर्तन क्विज़</title>
    <style>
        /* Base Offline Styles replacing Tailwind */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdfa;
            color: #2d3748;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 896px;
            height: 90vh;
            min-height: 600px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 1.05rem;
            font-weight: 500;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #a855f7;
            background-color: #faf5ff;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Layout Utilities */
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .justify-end { justify-content: flex-end; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        /* Header & Elements */
        .quiz-header { padding: 32px 32px 16px 32px; border-bottom: 1px solid #f1f5f9; background: rgba(255,255,255,0.5); position: relative; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 12px; overflow: hidden; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06); }
        .progress-bar-fill { background: linear-gradient(to right, #a855f7, #ec4899); height: 12px; border-radius: 9999px; transition: all 0.5s ease-out; }
        .profile-icon { position: absolute; top: 24px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-start { padding: 16px 40px; background: linear-gradient(to right, #a855f7, #ec4899); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 32px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; margin-left: 8px; font-size: 1rem; }
        .btn-next { background-color: #111827; color: white; }
        .btn-skip { background-color: #e2e8f0; color: #4a5568; }
        
        /* Overview Panel */
        .overview-panel { position: absolute; inset: 0; background: white; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; padding: 16px 0; flex: 1; overflow-y: auto; }
        .q-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.8rem; }
        
        /* Circle States */
        .state-default { background: linear-gradient(135deg, #cbd5e1, #94a3b8); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
        
        /* Circular Progress Chart */
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #eee; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; }
    </style>
</head>
<body>

    <div id="app" class="glass-panel">
        </div>

    <script>
        const questions = [
            { q: "प्रकाश की किरण जब एक पारदर्शी माध्यम से दूसरे पारदर्शी माध्यम में जाती है, तो अपने पथ से विचलित हो जाती है। इस परिघटना को क्या कहते हैं?", o: ["प्रकाश का परावर्तन", "प्रकाश का अपवर्तन", "प्रकाश का प्रकीर्णन", "प्रकाश का वर्ण विक्षेपण"], a: 1 },
            { q: "प्रकाश के अपवर्तन का मुख्य कारण क्या है?", o: ["विभिन्न माध्यमों में प्रकाश की चाल का भिन्न-भिन्न होना", "दर्पण की उपस्थिति", "माध्यम का ठोस होना", "प्रकाश की सरल रेखीय प्रकृति"], a: 0 },
            { q: "प्रकाश की चाल सबसे अधिक किसमें होती है?", o: ["कांच में", "पानी में", "निर्वात (Vacuum) या शून्य में", "हवा में"], a: 2 },
            { q: "पानी में प्रकाश की चाल लगभग कितनी होती है?", o: ["3 × 10⁸ m/s", "2.25 × 10⁸ m/s", "2 × 10⁸ m/s", "1.5 × 10⁸ m/s"], a: 1 },
            { q: "कांच (सामान्य) में प्रकाश की चाल कितनी होती है?", o: ["2.5 × 10⁸ m/s", "3 × 10⁸ m/s", "2 × 10⁸ m/s", "2.25 × 10⁸ m/s"], a: 2 },
            { q: "जिस माध्यम में प्रकाश की चाल अधिक होती है, उसे कैसा माध्यम कहा जाता है?", o: ["प्रकाशतः सघन माध्यम", "प्रकाशतः विरल माध्यम (Rare medium)", "उदासीन माध्यम", "अपारदर्शी माध्यम"], a: 1 },
            { q: "जिस माध्यम में प्रकाश की चाल कम होती है, उसे कैसा माध्यम कहते हैं?", o: ["प्रकाशतः सघन माध्यम (Denser medium)", "प्रकाशतः विरल माध्यम", "पारभासी माध्यम", "शून्य माध्यम"], a: 0 },
            { q: "हवा की तुलना में पानी कैसा माध्यम है?", o: ["विरल", "सघन", "दोनों सही है", "इनमें से कोई नहीं"], a: 1 },
            { q: "कांच की तुलना में पानी कैसा माध्यम है?", o: ["सघन", "विरल", "कठोर", "समान"], a: 1 },
            { q: "जब प्रकाश की किरण विरल माध्यम (जैसे हवा) से सघन माध्यम (जैसे कांच) में प्रवेश करती है, तो वह:", o: ["अभिलंब से दूर हट जाती हैprimary", "अभिलंब की ओर झुक जाती है", "सीधी निकल जाती है", "वापस लौट जाती है"], a: 1 },
            { q: "जब प्रकाश की किरण सघन माध्यम से विरल माध्यम में प्रवेश करती है, तो वह:", o: ["अभिलंब की ओर झुक जाती है", "अभिलंब से दूर हट जाती है", "तिरछी हो जाती है", "अपरिवर्तित रहती है"], a: 1 },
            { q: "यदि प्रकाश की किरण दो माध्यमों को अलग करने वाली सतह पर लंबवत (90°) आपतित हो, तो वह:", o: ["अभिलंब की ओर झुकती है", "अभिलंब से दूर हटती है", "बिना मुड़े (बिना विचलन के) सीधी निकल जाती है", "45° पर मुड़ती है"], a: 2 },
            { q: "प्रकाश के अपवर्तन के कितने नियम हैं?", o: ["एक", "दो", "तीन", "चार"], a: 1 },
            { q: "अपवर्तन के दूसरे नियम को किस वैज्ञानिक के नाम पर जाना जाता है?", o: ["न्यूटन का नियम", "स्नेल का नियम (Snell's Law)", "फैराडे का नियम", "मैक्सवेल का नियम"], a: 1 },
            { q: "स्नेल के नियम के अनुसार, किन्हीं दो माध्यमों और प्रकाश के किसी विशेष वर्ण के लिए आपतन कोण की ज्या ($sin\ i$) और अपवर्तन कोण की ज्या ($sin\ r$) का अनुपात क्या होता है?", o: ["एक नियतांक ($\mu$ या $n$)", "हमेशा बदलते रहता है", "शून्य", "अनंत"], a: 0 },
            { q: "स्नेल के नियम का सही गणितीय रूप कौन सा है?", o: ["$sin\ i \times sin\ r = Constant$", "$sin\ i / sin\ r = Constant$", "$sin\ r / sin\ i = Constant$", "$sin\ i + sin\ r = Constant$"], a: 1 },
            { q: "किसी माध्यम का निरपेक्ष अपवर्तनांक ($n$) क्या होता है?", o: ["शून्य में प्रकाश की चाल ($c$) / उस माध्यम में प्रकाश की चाल ($v$)", "माध्यम में प्रकाश की चाल / शून्य में प्रकाश की चाल", "आपतन कोण / परावर्तन कोण", "वस्तु की दूरी / प्रतिबिंब की दूरी"], a: 0 },
            { q: "अपवर्तनांक ($n$) का मात्रक क्या होता है?", o: ["मीटर/सेकंडPrimary", "मीटर", "यह एक शुद्ध संख्या है, अतः मात्रकविहीन (Unitless) है", "डायोप्टर"], a: 2 },
            { q: "पानी का अपवर्तनांक कितना होता है?", o: ["1.33", "1.50", "2.42", "1.00"], a: 0 },
            { q: "कांच का अपवर्तनांक (क्राउन कांच का सामान्यतः) कितना होता है?", o: ["1.33", "1.50", "2.42", "1.44"], a: 1 },
            { q: "हीरे का अपवर्तनांक कितना होता है, जो सबसे अधिक माना जाता है?", o: ["1.33", "1.52", "2.42", "1.80"], a: 2 },
            { q: "किसी माध्यम का अपवर्तनांक जितना अधिक होगा, उसमें प्रकाश की चाल उतनी ही:", o: ["अधिक होगी", "कम होगी", "अपरिवर्तित रहेगी", "दुगुनी होगी"], a: 1 },
            { q: "पानी में डूबी हुई छड़ी या पेंसिल बाहर से देखने पर मुड़ी हुई क्यों प्रतीत होती है?", o: ["प्रकाश के परावर्तन के कारण", "प्रकाश के अपवर्तन के कारण", "प्रकाश के वर्ण विक्षेपण के कारण", "छड़ी के भारी होने के कारण"], a: 1 },
            { q: "पानी से भरे बर्तन के पेंदे में रखा सिक्का अपनी वास्तविक गहराई से थोड़ा ऊपर उठा हुआ क्यों दिखाई देता है?", o: ["परावर्तन के कारण", "अपवर्तन के कारण", "विवर्तन के कारण", "भ्रम के कारण"], a: 1 },
            { q: "तारों का टिमटिमाना (Twinkling of stars) वायुमंडल में प्रकाश की किस घटना के कारण होता है?", o: ["पूर्ण आंतरिक परावर्तन", "क्रमिक वायुमंडलीय अपवर्तन (Atmospheric refraction)", "वर्ण विक्षेपण", "प्रकीर्णन"], a: 1 },
            { q: "जब प्रकाश की किरण सघन माध्यम से विरल माध्यम में जाती है और आपतन कोण का मान एक निश्चित कोण से अधिक हो जाता है, जिससे किरण उसी माध्यम में वापस लौट आती है, तो इसे क्या कहते हैं?", o: ["नियमित अपवर्तन", "पूर्ण आंतरिक परावर्तन (Total Internal Reflection)", "विचलन", "अवशोषण"], a: 1 },
            { q: "वह आपतन कोण जिसके लिए अपवर्तन कोण का मान 90° हो जाता है, क्या कहलाता है?", o: ["शून्य कोण", "क्रांतिक कोण (Critical Angle)", "ध्रुवण कोण", "समान कोण"], a: 1 },
            { q: "पूर्ण आंतरिक परावर्तन के लिए आवश्यक शर्त क्या है?", o: ["प्रकाश विरल से सघन माध्यम में जाना चाहिए", "प्रकाश सघन से विरल माध्यम में जाना चाहिए और आपतन कोण > क्रांतिक कोण होना चाहिए", "सतह समतल दर्पण होनी चाहिए", "माध्यम उदासीन होना चाहिए"], a: 1 },
            { q: "मरीचिका (Mirage) का निर्माण मरुस्थल में किस कारण होता है?", o: ["केवल परावर्तन", "प्रकाश के अपवर्तन और पूर्ण आंतरिक परावर्तन के संयुक्त प्रभाव से", "धूल कणों के कारण", "पेड़ों की छाया से"], a: 1 },
            { q: "ऑप्टिकल फाइबर (प्रकाश तंतु) किस सिद्धांत पर कार्य करता है?", o: ["प्रकाश के अपवर्तन पर", "पूर्ण आंतरिक परावर्तन (TIR) पर", "प्रकाश के प्रकीर्णन पर", "विद्युत प्रभाव पर"], a: 1 },
            { q: "दो निश्चित ज्यामितीय सतहों (प्रायः गोलीय) से घिरे पारदर्शी माध्यम को क्या कहते हैं?", o: ["दर्पण", "लेंस (Lens)", "प्रिज्म", "कांच का गुटका"], a: 1 },
            { q: "लेंस मुख्यतः कितने प्रकार के होते हैं?", o: ["दो प्रकार के", "तीन प्रकार के", "चार प्रकार के", "पाँच प्रकार के"], a: 0 },
            { q: "वह लेंस जो बीच में मोटा और किनारों पर पतला होता है, क्या कहलाता है?", o: ["अवतल लेंस", "उत्तल लेंस (Convex Lens)", "समतल लेंस", "बेलनाकार लेंस"], a: 1 },
            { q: "वह लेंस जो बीच में पतला और किनारों पर मोटा होता है, क्या कहलाता है?", o: ["उत्तल लेंस", "अवतल लेंस (Concave Lens)", "उभयोत्तल लेंस", "द्वि-उत्तल लेंस"], a: 1 },
            { q: "उत्तल लेंस को और किस नाम से जाना जाता है क्योंकि यह किरणों को एक बिंदु पर एकत्रित करता है?", o: ["अपसारी लेंस", "अभिसारी लेंस (Converging Lens)", "उदासीन लेंस", "क्रांतिक लेंस"], a: 1 },
            { q: "अवतल लेंस को और किस नाम से जाना जाता है क्योंकि यह समांतर किरणों को फैला देता है?", o: ["अभिसारी लेंस", "अपसारी लेंस (Diverging Lens)", "समतल लेंस", "बेलनाकार लेंस"], a: 1 },
            { q: "लेंस की गोलीय सतहों के केंद्रों को क्या कहा जाता है?", o: ["प्रकाशीय केंद्र", "वक्रता केंद्र (Center of Curvature)", "मुख्य फोकस", "ध्रुव"], a: 1 },
            { q: "लेंस में कितने वक्रता केंद्र होते हैं?", o: ["एक", "दो ($C_1$ और $C_2$)", "तीन", "अनंत"], a: 1 },
            { q: "लेंस के दोनों वक्रता केंद्रों को मिलाने वाली काल्पनिक सीधी रेखा को क्या कहते हैं?", o: ["मुख्य अक्ष या प्रधान अक्ष (Principal Axis)", "फोकस दूरी", "द्वारक", "प्रकाशीय अक्ष"], a: 0 },
            { q: "लेंस का केंद्रीय बिंदु जहाँ से गुजरने वाली प्रकाश की किरण बिना किसी विचलन के सीधे निकल जाती है, क्या कहलाता है?", o: ["वक्रता केंद्र", "फोकस", "प्रकाशीय केंद्र (Optical Center - $O$)", "दर्पण बिंदु"], a: 2 },

                    <h1 style="font-size: 2.25rem; font-weight: 800; margin-bottom: 16px;">भारती भवन (भौतिकी) कक्षा 10</h1>
                    <h2 style="font-size: 1.5rem; color: #a855f7; font-weight: 700; margin-bottom: 16px;">अध्याय 2: प्रकाश का अपवर्तन</h2>
                    <p style="color: #4a5568; margin-bottom: 32px; max-width: 650px; font-size: 1.15rem;">अपवर्तनांक, स्नेल के नियम, लेंस के सिद्धांतों, लेंस सूत्र, क्षमता और आंकिक प्रश्नों पर आधारित <b>पूर्ण 150 वस्तुनिष्ठ प्रश्न</b>।</p>
                    <button onclick="startQuiz()" class="btn-start">महा-क्विज़ शुरू करें</button>
                </div>
            `;
        }

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            questionStates.fill('default');
            renderQuestion();
        }

        function renderQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            let optionsHtml = '';
            q.o.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index}, this)" class="option-btn">
                        <span>${opt}</span>
                        <span class="icon-container hidden"></span>
                    </button>
                `;
            });

            appDiv.innerHTML = `
                <div class="quiz-header">
                    <div class="flex justify-between items-center" style="margin-bottom: 12px; padding-right: 50px;">
                        <span style="font-size: 0.875rem; font-weight: bold; color: #a855f7; text-transform: uppercase;">प्रश्न ${currentQuestion + 1} / ${questions.length}</span>
                        <span style="font-size: 0.875rem; font-weight: bold; color: #4a5568; background: #e2e8f0; padding: 4px 12px; border-radius: 9999px;">स्कोर: ${score}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                    <div class="profile-icon" onclick="openOverview()" title="प्रश्नावली ओवरव्यू">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-8 fade-in flex flex-col" style="padding: 24px 32px;">
                    <h2 style="font-size: 1.35rem; font-weight: bold; margin-bottom: 24px; line-height: 1.4;">${q.q}</h2>
                    <div id="options-container" class="flex-1 flex flex-col justify-center">
                        ${optionsHtml}
                    </div>
                </div>

                <div class="flex justify-between items-center" style="padding: 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; min-height: 90px;">
                    <div>
                        <button id="skip-btn" onclick="skipQuestion()" class="btn-action btn-skip">स्किप करें</button>
                    </div>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden btn-action btn-next">
                        ${currentQuestion === questions.length - 1 ? 'परिणाम देखें' : 'अगला प्रश्न'}
                    </button>
                </div>
            `;
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

            allBtns.forEach((btn, index) => {
                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');
                iconContainer.classList.remove('hidden');

                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #16a34a; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }
                
                if (index === selectedIndex && selectedIndex !== q.a) {
                    btn.classList.add('wrong');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #dc2626; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                }
            });

            if (selectedIndex === q.a) {
                score++;
                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function skipQuestion() {
            questionStates[currentQuestion] = 'skipped';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                renderResultScreen();
            }
        }

        function openOverview() {
            let gridHtml = '';
            for(let i = 0; i < questions.length; i++) {
                let stateClass = 'state-default';
                if(questionStates[i] === 'correct') stateClass = 'state-correct';
                if(questionStates[i] === 'wrong') stateClass = 'state-wrong';
                if(questionStates[i] === 'skipped') stateClass = 'state-skipped';
                
                gridHtml += `<button onclick="jumpToQuestion(${i})" class="q-circle ${stateClass}">${i + 1}</button>`;
            }

            const overviewDiv = document.createElement('div');
            overviewDiv.id = 'overview-overlay';
            overviewDiv.className = 'overview-panel fade-in';
            overviewDiv.innerHTML = `
                <h3 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 16px; text-align: center;">प्रश्नावली ओवरव्यू (कुल 150 प्रश्न)</h3>
                <div class="grid-container">
                    ${gridHtml}
                </div>
                <div class="flex justify-center" style="padding-top: 16px; border-top: 1px solid #e2e8f0; background: white;">
                    <button onclick="closeOverview()" class="btn-action btn-skip" style="margin: 0 8px;">ओवरव्यू बंद करें</button>
                    <button onclick="submitQuizFromOverview()" class="btn-action btn-next" style="margin: 0 8px; background-color: #a855f7;">क्विज़ सबमिट करें</button>
                </div>
            `;
            appDiv.appendChild(overviewDiv);
        }

        function closeOverview() {
            const overlay = document.getElementById('overview-overlay');
            if(overlay) overlay.remove();
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            closeOverview();
            renderQuestion();
        }

        function submitQuizFromOverview() {
            closeOverview();
            renderResultScreen();
        }

        function renderResultScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let emoji = "";
            
            if (percentage === 100) { message = "अतुलनीय! आपने प्रकाश के अपवर्तन अध्याय पर पूर्ण विजय प्राप्त कर ली है!"; emoji = "🏆"; }
            else if (percentage >= 80) { message = "उत्कृष्ट स्कोर! लेंस और अपवर्तन के सिद्धांतों पर आपकी पकड़ बहुत मजबूत है।"; emoji = "🌟"; }
            else if (percentage >= 50) { message = "सराहनीय प्रयास! स्नेल के नियमों और क्षमता के सूत्रों का एक बार फिर अभ्यास करें।"; emoji = "👍"; }
            else { message = "निराश न हों! भारती भवन की पुस्तक का पुनः अध्ययन करें और फिर से प्रयास करें।"; emoji = "📚"; }

            const strokeDasharray = `${percentage}, 100`;
            const colorClass = percentage >= 80 ? '#22c55e' : percentage >= 50 ? '#eab308' : '#ef4444';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in overflow-y-auto" style="padding: 32px;">
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 32px;">क्विज़ परिणाम ${emoji}</h2>
                    
                    <div style="position: relative; width: 192px; height: 192px; margin-bottom: 32px; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="width: 100%; height: 100%;">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="circle" stroke="${colorClass}" stroke-dasharray="${strokeDasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 2.25rem; font-weight: 900;">${score}</span>
                            <span style="font-size: 0.875rem; font-weight: bold; color: #9ca3af;">/ 150</span>
                        </div>
                    </div>

                    <p style="font-size: 1.5rem; font-weight: bold; margin-bottom: 8px;">${percentage}% अंक</p>
                    <p style="font-size: 1.125rem; color: #6b7280; margin-bottom: 40px; max-width: 448px;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action" style="background: white; border: 2px solid #e2e8f0; color: #4a5568; padding: 16px 32px; border-radius: 12px; font-size: 1.125rem;">
                        फिर से खेलें
                    </button>
                </div>
            `;
        }

        renderStartScreen();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भारती भवन भौतिकी - अध्याय 3: मानव नेत्र और रंगबिरंगा संसार क्विज़</title>
    <style>
        /* Base Offline Styles replacing Tailwind */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdfa;
            color: #2d3748;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 896px;
            height: 90vh;
            min-height: 600px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 1.05rem;
            font-weight: 500;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #f59e0b;
            background-color: #fffbeb;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Layout Utilities */
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .justify-end { justify-content: flex-end; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        /* Header & Elements */
        .quiz-header { padding: 32px 32px 16px 32px; border-bottom: 1px solid #f1f5f9; background: rgba(255,255,255,0.5); position: relative; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 12px; overflow: hidden; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06); }
        .progress-bar-fill { background: linear-gradient(to right, #f59e0b, #ef4444); height: 12px; border-radius: 9999px; transition: all 0.5s ease-out; }
        .profile-icon { position: absolute; top: 24px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-start { padding: 16px 40px; background: linear-gradient(to right, #f59e0b, #ef4444); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 32px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; margin-left: 8px; font-size: 1rem; }
        .btn-next { background-color: #111827; color: white; }
        .btn-skip { background-color: #e2e8f0; color: #4a5568; }
        
        /* Overview Panel */
        .overview-panel { position: absolute; inset: 0; background: white; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; padding: 16px 0; flex: 1; overflow-y: auto; }
        .q-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.8rem; }
        
        /* Circle States */
        .state-default { background: linear-gradient(135deg, #cbd5e1, #94a3b8); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
        
        /* Circular Progress Chart */
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #eee; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; }
    </style>
</head>
<body>

    <div id="app" class="glass-panel">
        <!-- Screens will be injected here by JS -->
    </div>

    <script>
        const questions = [
            { q: "मानव नेत्र अभिनेत्र लेंस की फोकस दूरी को समायोजित करके विभिन्न दूरियों पर रखी वस्तुओं को फोकसित कर सकता है। ऐसा हो पाने का क्या कारण है?", o: ["जरा-दूरदर्शिता", "समंजन क्षमता (Accommodation)", "निकट-दृष्टि", "दीर्घ-दृष्टि"], a: 1 },
            { q: "मानव नेत्र जिस भाग पर किसी वस्तु का प्रतिबिंब बनाते हैं, वह क्या कहलाता है?", o: ["कॉर्निया", "परितारिका", "पुतली", "दृष्टिपटल या रेटिना (Retina)"], a: 3 },
            { q: "सामान्य दृष्टि के वयस्क के लिए सुस्पष्ट दर्शन की अल्पतम (न्यूनतम) दूरी लगभग कितनी होती है?", o: ["25 m", "2.5 cm", "25 cm", "2.5 m"], a: 2 },
            { q: "सामान्य मानव नेत्र के लिए सुस्पष्ट दर्शन की अधिकतम दूरी (दूर बिंदु) कितनी होती है?", o: ["25 cm", "1 m", "100 cm", "अनंत (Infinity)"], a: 3 },
            { q: "अभिनेत्र लेंस (Eye lens) किस प्रकार के पदार्थ का बना होता है?", o: ["कांच का", "पारदर्शी रेशेदार जेलीवत पदार्थ का", "प्लास्टिक का", "तरल जल का"], a: 1 },
            { q: "नेत्र के उस भाग का नाम बताइए जो इसमें प्रवेश करने वाले प्रकाश की मात्रा को नियंत्रित करता है?", o: ["कॉर्निया", "पुतली (Pupil)", "सिलियरी पेशियाँ", "क्रिस्टलीय लेंस"], a: 1 },
            { q: "परितारिका (Iris) का मुख्य कार्य क्या है?", o: ["प्रतिबिंब बनाना", "पुतली के आकार को नियंत्रित करना", "नेत्र को गोल रखना", "आँसू निकालना"], a: 1 },
            { q: "नेत्रदान में दाता की आँख के किस भाग का उपयोग (प्रत्यारोपण) किया जाता है?", o: ["लेंस का", "कॉर्निया (Cornea) का", "रेटिना का", "पूरी आँख का"], a: 1 },
            { q: "जब सिलियरी (पक्ष्माभी) पेशियाँ शिथिल (Relaxed) होती हैं, तो अभिनेत्र लेंस कैसा हो जाता है?", o: ["मोटा हो जाता है", "पतला हो जाता है (फोकस दूरी बढ़ जाती है)", "गोलाकार हो जाता है", "अपरिवर्तित रहता है"], a: 1 },
            { q: "जब सिलियरी पेशियाँ सिकुड़ती हैं, तो अभिनेत्र लेंस कैसा हो जाता है?", o: ["मोटा हो जाता है (फोकस दूरी घट जाती है)", "पतला हो जाता है", "लंबा हो जाता है", "कांच जैसा कठोर"], a: 0 },
            { q: "आँख के रेटिना पर बनने वाला प्रतिबिंब हमेशा कैसा होता है?", o: ["काल्पनिक और सीधा", "वास्तविक और उल्टा", "वास्तविक और सीधा", "काल्पनिक और उल्टा"], a: 1 },
            { q: "रेटिना पर बने उल्टे प्रतिबिंब को सीधा करके देखने की संवेदना हमारे मस्तिष्क को किसके माध्यम से मिलती है?", o: ["सिलियरी पेशियों द्वारा", "द्रिक तंत्रिका (Optic Nerve) द्वारा", "कॉर्निया द्वारा", "काचाभ द्रव द्वारा"], a: 1 },
            { q: "उम्र बढ़ने के कारण अभिनेत्र लेंस का धुंधला या दूधिया हो जाना क्या कहलाता है?", o: ["निकट-दृष्टि दोष", "मोतियाबिंद (Cataract)", "जरा-दूरदर्शिता", "अबिन्दुकता"], a: 1 },
            { q: "मोतियाबिंद का उपचार कैसे किया जाता है?", o: ["अवतल लेंस द्वारा", "शल्य चिकित्सा (सर्जरी) द्वारा कृत्रिम इंट्राऑकुलर लेंस लगाकर", "उत्तल लेंस द्वारा", "दवाइयों द्वारा"], a: 1 },
            { q: "मुख्य रूप से दृष्टि के कितने सामान्य अपवर्तक दोष होते हैं?", o: ["दो", "तीन", "चार", "पांच"], a: 1 },
            { q: "उस दृष्टि दोष को क्या कहते हैं जिसमें कोई व्यक्ति निकट रखी वस्तुओं को स्पष्ट देख सकता है परंतु दूर की वस्तुओं को स्पष्ट नहीं देख पाता?", o: ["दीर्घ-दृष्टि दोष", "निकट-दृष्टि दोष (Myopia)", "जरा-दूरदर्शिता", "अबिन्दुकता"], a: 1 },
            { q: "निकट-दृष्टि दोष (Myopia) से पीड़ित व्यक्ति का दूर बिंदु अनंत से खिसक कर कहाँ आ जाता है?", o: ["नेत्र के पास आ जाता है", "और दूर चला जाता है", "शून्य पर आ जाता है", "रेटिना के पीछे चला जाता है"], a: 0 },
            { q: "निकट-दृष्टि दोष होने का मुख्य कारण क्या है?", o: ["अभिनेत्र लेंस की वक्रता का अत्यधिक होना या नेत्र गोलक का लंबा हो जाना", "अभिनेत्र लेंस का बहुत पतला होना", "नेत्र गोलक का छोटा हो जाना", "सिलियरी पेशियों का काम न करना"], a: 0 },
            { q: "निकट-दृष्टि दोष में किसी दूर रखी वस्तु का प्रतिबिंब रेटिना पर न बनकर कहाँ बनता है?", o: ["रेटिना के पीछे", "रेटिना के सामने (आगे)", "ब्लाइंड स्पॉट पर", "कॉर्निया पर"], a: 1 },
            { q: "निकट-दृष्टि दोष (Myopia) को दूर करने के लिए किस लेंस के चश्मे का उपयोग किया जाता है?", o: ["उत्तल लेंस (Convex Lens)", "अवतल लेंस (Concave Lens)", "बेलनाकार लेंस", "द्विफोकसी लेंस"], a: 1 },
            { q: "उस दृष्टि दोष को क्या कहते हैं जिसमें व्यक्ति दूर की वस्तुओं को स्पष्ट देख सकता है परंतु निकट की वस्तुओं को स्पष्ट नहीं देख पाता?", o: ["निकट-दृष्टि दोष", "दीर्घ-दृष्टि दोष या हाइपरमेट्रोपिया (Hypermetropia)", "जरा-दूरदर्शिता", "मोतियाबिंद"], a: 1 },
            { q: "दीर्घ-दृष्टि दोष (Hypermetropia) से पीड़ित आँख का निकट बिंदु 25 cm से हटकर कहाँ चला जाता है?", o: ["नेत्र के अत्यंत पास आ जाता है", "25 cm से दूर चला जाता है", "अनंत पर चला जाता है", "शून्य हो जाता है"], a: 1 },
            { q: "दीर्घ-दृष्टि दोष उत्पन्न होने का मुख्य कारण क्या है?", o: ["अभिनेत्र लेंस की फोकस दूरी का अत्यधिक हो जाना या नेत्र गोलक का छोटा हो जाना", "नेत्र गोलक का लंबा हो जाना", "लेंस की वक्रता का बढ़ना", "उम्र घटना"], a: 0 },
            { q: "दीर्घ-दृष्टि दोष में पास रखी वस्तु का प्रतिबिंब रेटिना के कहाँ बनता है?", o: ["रेटिना के आगे", "रेटिना के पीछे (Behind the retina)", "प्रकाशीय केंद्र पर", "कॉर्निया पर"], a: 1 },
            { q: "दीर्घ-दृष्टि दोष (Hypermetropia) के निवारण के लिए किस लेंस का उपयोग किया जाता है?", o: ["अवतल लेंस", "उत्तल लेंस (Convex lens)", "बेलनाकार लेंस", "समतल लेंस"], a: 1 },
            { q: "वृद्धावस्था में नेत्र की समंजन क्षमता घटने के कारण उत्पन्न होने वाले दोष को क्या कहते हैं?", o: ["निकट-दृष्टि दोष", "दीर्घ-दृष्टि दोष", "जरा-दूरदर्शिता (Presbyopia)", "अबिन्दुकता"], a: 2 },
            { q: "जरा-दूरदर्शिता दोष से पीड़ित व्यक्ति को किस प्रकार के लेंस वाले चश्मे की आवश्यकता होती है?", o: ["केवल अवतल लेंस", "केवल उत्तल लेंस", "द्विफोकसी लेंस (Bifocal Lens)", "बेलनाकार लेंस"], a: 2     },
            { q: "द्विफोकसी (Bifocal) लेंस में ऊपरी भाग में कौन सा लेंस और निचले भाग में कौन सा लेंस होता है?", o: ["ऊपरी भाग में उत्तल, निचले में अवतल", "ऊपरी भाग में अवतल (दूर की वस्तुओं के लिए) और निचले में उत्तल (पास पढ़ने के लिए)", "दोनों भाग अवतल", "दोनों भाग उत्तल"], a: 1 },
            { q: "वह दृष्टि दोष जिसमें कॉर्निया की वक्रता क्षैतिज और ऊर्ध्वाधर तलों में असमान हो जाती है, जिससे वस्तु धुंधली दिखती है, क्या कहलाता है?", o: ["जरा-दूरदर्शिता", "अबिन्दुकता (Astigmatism)", "निकट-दृष्टि", "मोतियाबिंद"], a: 1 },
            { q: "अबिन्दुकता (Astigmatism) दोष को दूर करने के लिए किस लेंस का प्रयोग किया जाता है?", o: ["अवतल लेंस", "उत्तल लेंस", "बेलनाकार लेंस (Cylindrical Lens)", "द्विफोकसी लेंस"], a: 2 },
            { q: "श्वेत प्रकाश का इसके अवयवी रंगों (7 रंगों) में विभाजित होने की प्रक्रिया को क्या कहते हैं?", o: ["प्रकाश का परावर्तन", "प्रकाश का अपवर्तन", "प्रकाश का वर्ण-विक्षेपण (Dispersion of light)", "प्रकाश का प्रकीर्णन"], a: 2 },
            { q: "श्वेत प्रकाश के वर्ण-विक्षेपण से प्राप्त रंगीन पट्टी को क्या कहा जाता है?", o: ["लेंस आरेख", "स्पेक्ट्रम या वर्णपट (Spectrum)", "प्रकीर्णित क्षेत्र", "छाया"], a: 1 },
            { q: "श्वेत प्रकाश को सात रंगों में विक्षेपित करने के लिए किस उपकरण का उपयोग किया जाता है?", o: ["समतल दर्पण", "कांच का प्रिज्म (Prism)", "अवतल लेंस", "कांच का आयताकार गुटका"], a: 1 },
            { q: "प्रिज्म से गुजरने पर श्वेत प्रकाश के किस रंग का झुकाव (विचलन) सबसे अधिक होता है?", o: ["लाल", "पीला", "हरा", "बैंगनी (Violet)"], a: 3 },
            { q: "प्रिज्म से गुजरने पर श्वेत प्रकाश के किस रंग का झुकाव (विचलन) सबसे कम होता है?", o: ["बैंगनी", "नीला", "लाल (Red)", "नारंगी"], a: 2 },

            { q: "द्विफोकसी लेंस का आविष्कार किस महान वैज्ञानिक/व्यक्तित्व ने किया था (ऐतिहासिक तथ्य)?", o: ["थॉमस एडिसन", "बेंजामिन फ्रैंकलिन (Benjamin Franklin)", "न्यूटन", "आइंस्टीन"], a: 1 },
            { q: "यदि किसी व्यक्ति के दोनों आँखों में अलग-अलग दृष्टि दोष हो, तो चश्मे का निर्माण कैसे होता है?", o: ["दोनों में एक ही लेंस लगता है", "प्रत्येक आँख के दोष के अनुसार अलग-अलग सटीक क्षमता का लेंस लगाया जाता है", "चश्मा काम नहीं करता", "लेंस नहीं लगाया जाता"], a: 1 },
            { q: "प्रिज्म के आधार के समानांतर आने वाली किरण परावर्तन/अपवर्तन के बाद आधार की ओर झुकती है, यह प्रिज्म के किस आकार के कारण है?", o: ["त्रिभुजाकार अनुप्रस्थ काट (Triangular cross-section) के कारण", "वर्गाकार आकार के कारण", "गोलाकार होने के कारण", "पतला होने के कारण"], a: 0 },
            { q: "सूर्योदय के समय सूर्य लाल दिखता है, इस लाल रंग के प्रकाश का तरंगदैर्ध्य कैसा होता है?", o: ["सबसे कम", "सबसे अधिक (Longest wavelength)", "माध्यम के बराबर", "शून्य"], a: 1 },
            { q: "वायुमंडल की ऊपरी परतों में धूल कणों और गैस अणुओं की कमी के कारण वहाँ प्रकाश का क्या नहीं हो पाता?", o: ["अपवर्तन", "प्रकीर्णन (No scattering)", "परावर्तन", "विचलन"], a: 1 },
            { q: "कोलाइडी विलयन के कणों का आकार कैसा होता है?", o: ["साधारण अणुओं से थोड़ा बड़ा लेकिन नग्न आँखों से न दिखने वाला (1 nm से 1000 nm)", "बहुत बड़ा", "शून्य", "मीटर में"], a: 0 },
            { q: "भारती भवन भौतिकी का अंतिम प्रश्न: मानव नेत्र, वायुमंडलीय अपवर्तन और वर्ण-विक्षेपण का अध्ययन हमें क्या सिखाता है?", o: ["नेत्रों की सुरक्षा और चश्मों के वैज्ञानिक सिद्धांतों को समझना", "रंगबिरंगे संसार की प्राकृतिक घटनाओं (जैसे इंद्रधनुष, तारों का टिमटिमाना) के कारणों को जानना", "प्रकाश की तरंग और कण प्रकृति के व्यावहारिक रूपों को समझना", "उपर्युक्त सभी"], a: 3 }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        
        let questionStates = new Array(questions.length).fill('default');

        const appDiv = document.getElementById('app');

        function renderStartScreen() {
            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in h-full">
                    <div style="width: 96px; height: 96px; background: #fef3c7; color: #d97706; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </div>
                    <h1 style="font-size: 2.25rem; font-weight: 800; margin-bottom: 16px;">भारती भवन (भौतिकी) कक्षा 10</h1>
                    <h2 style="font-size: 1.5rem; color: #d97706; font-weight: 700; margin-bottom: 16px;">अध्याय 3: मानव नेत्र, वायुमंडलीय अपवर्तन और वर्ण-विक्षेपण</h2>
                    <p style="color: #4a5568; margin-bottom: 32px; max-width: 650px; font-size: 1.15rem;">नेत्र की समंजन क्षमता, दृष्टि दोषों व उपचार, प्रिज्म स्पेक्ट्रम, इंद्रधनुष, तारों के टिमटिमाते प्रभाव और प्रकीर्णन पर आधारित <b>पूर्ण 150 वस्तुनिष्ठ प्रश्न</b>।</p>
                    <button onclick="startQuiz()" class="btn-start">महा-क्विज़ शुरू करें</button>
                </div>
            `;
        }

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            questionStates.fill('default');
            renderQuestion();
        }

        function renderQuestion() {
            answered = false;
            const q = questions[currentQuestion];
            const progress = ((currentQuestion) / questions.length) * 100;

            let optionsHtml = '';
            q.o.forEach((opt, index) => {
                optionsHtml += `
                    <button onclick="checkAnswer(${index}, this)" class="option-btn">
                        <span>${opt}</span>
                        <span class="icon-container hidden"></span>
                    </button>
                `;
            });

            appDiv.innerHTML = `
                <!-- Header -->
                <div class="quiz-header">
                    <div class="flex justify-between items-center" style="margin-bottom: 12px; padding-right: 50px;">
                        <span style="font-size: 0.875rem; font-weight: bold; color: #d97706; text-transform: uppercase;">प्रश्न ${currentQuestion + 1} / ${questions.length}</span>
                        <span style="font-size: 0.875rem; font-weight: bold; color: #4a5568; background: #e2e8f0; padding: 4px 12px; border-radius: 9999px;">स्कोर: ${score}</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${progress}%"></div>
                    </div>
                    <!-- Right Profile Icon for Navigation -->
                    <div class="profile-icon" onclick="openOverview()" title="प्रश्नावली ओवरव्यू">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4a5568" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    </div>
                </div>

                <!-- Question Area -->
                <div class="flex-1 overflow-y-auto p-8 fade-in flex flex-col" style="padding: 24px 32px;">
                    <h2 style="font-size: 1.35rem; font-weight: bold; margin-bottom: 24px; line-height: 1.4;">${q.q}</h2>
                    <div id="options-container" class="flex-1 flex flex-col justify-center">
                        ${optionsHtml}
                    </div>
                </div>

                <!-- Footer / Actions -->
                <div class="flex justify-between items-center" style="padding: 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; min-height: 90px;">
                    <div>
                        <button id="skip-btn" onclick="skipQuestion()" class="btn-action btn-skip">स्किप करें</button>
                    </div>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden btn-action btn-next">
                        ${currentQuestion === questions.length - 1 ? 'परिणाम देखें' : 'अगला प्रश्न'}
                    </button>
                </div>
            `;
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

            allBtns.forEach((btn, index) => {
                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');
                iconContainer.classList.remove('hidden');

                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #16a34a; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }
                
                if (index === selectedIndex && selectedIndex !== q.a) {
                    btn.classList.add('wrong');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #dc2626; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                }
            });

            if (selectedIndex === q.a) {
                score++;
                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function skipQuestion() {
            questionStates[currentQuestion] = 'skipped';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                renderResultScreen();
            }
        }

        function openOverview() {
            let gridHtml = '';
            for(let i = 0; i < questions.length; i++) {
                let stateClass = 'state-default';
                if(questionStates[i] === 'correct') stateClass = 'state-correct';
                if(questionStates[i] === 'wrong') stateClass = 'state-wrong';
                if(questionStates[i] === 'skipped') stateClass = 'state-skipped';
                
                gridHtml += `<button onclick="jumpToQuestion(${i})" class="q-circle ${stateClass}">${i + 1}</button>`;
            }

            const overviewDiv = document.createElement('div');
            overviewDiv.id = 'overview-overlay';
            overviewDiv.className = 'overview-panel fade-in';
            overviewDiv.innerHTML = `
                <h3 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 16px; text-align: center;">प्रश्नावली ओवरव्यू (कुल 150 प्रश्न)</h3>
                <div class="grid-container">
                    ${gridHtml}
                </div>
                <div class="flex justify-center" style="padding-top: 16px; border-top: 1px solid #e2e8f0; background: white;">
                    <button onclick="closeOverview()" class="btn-action btn-skip" style="margin: 0 8px;">ओवरव्यू बंद करें</button>
                    <button onclick="submitQuizFromOverview()" class="btn-action btn-next" style="margin: 0 8px; background-color: #d97706;">क्विज़ सबमिट करें</button>
                </div>
            `;
            appDiv.appendChild(overviewDiv);
        }

        function closeOverview() {
            const overlay = document.getElementById('overview-overlay');
            if(overlay) overlay.remove();
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            closeOverview();
            renderQuestion();
        }

        function submitQuizFromOverview() {
            closeOverview();
            renderResultScreen();
        }

        function renderResultScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let emoji = "";
            
            if (percentage === 100) { message = "अतुलनीय! आपने इस रंगबिरंगे संसार और मानव नेत्र के अध्याय पर पूर्ण विजय प्राप्त कर ली है!"; emoji = "🏆"; }
            else if (percentage >= 80) { message = "उत्कृष्ट स्कोर! भौतिकी के व्यावहारिक सिद्धांतों पर आपकी पकड़ बहुत मजबूत है।"; emoji = "🌟"; }
            else if (percentage >= 50) { message = "सराहनीय प्रयास! दृष्टि दोषों और प्रकीर्णन के नियमों का एक बार फिर अभ्यास करें।"; emoji = "👍"; }
            else { message = "निराश न हों! भारती भवन की पुस्तक का पुनः अध्ययन करें और फिर से प्रयास करें।"; emoji = "📚"; }

            const strokeDasharray = `${percentage}, 100`;
            const colorClass = percentage >= 80 ? '#22c55e' : percentage >= 50 ? '#eab308' : '#ef4444';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in overflow-y-auto" style="padding: 32px;">
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 32px;">क्विज़ परिणाम ${emoji}</h2>
                    
                    <div style="position: relative; width: 192px; height: 192px; margin-bottom: 32px; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="width: 100%; height: 100%;">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="circle" stroke="${colorClass}" stroke-dasharray="${strokeDasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 2.25rem; font-weight: 900;">${score}</span>
                            <span style="font-size: 0.875rem; font-weight: bold; color: #9ca3af;">/ 150</span>
                        </div>
                    </div>

                    <p style="font-size: 1.5rem; font-weight: bold; margin-bottom: 8px;">${percentage}% अंक</p>
                    <p style="font-size: 1.125rem; color: #6b7280; margin-bottom: 40px; max-width: 448px;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action" style="background: white; border: 2px solid #e2e8f0; color: #4a5568; padding: 16px 32px; border-radius: 12px; font-size: 1.125rem;">
                        फिर से खेलें
                    </button>
                </div>
            `;
        }

        renderStartScreen();
    </script>
</body>
</html>

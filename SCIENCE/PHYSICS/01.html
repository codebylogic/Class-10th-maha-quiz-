<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>भारती भवन भौतिकी - अध्याय 1: प्रकाश का परावर्तन क्विज़</title>
    <style>
        /* Base Offline Styles replacing Tailwind */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdfa;
            color: #2d3748;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 896px;
            height: 90vh;
            min-height: 600px;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 16px 20px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            background-color: #ffffff;
            font-size: 1.05rem;
            font-weight: 500;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
            background-color: #f0f9ff;
        }
        .correct {
            background-color: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534 !important;
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
        }
        .disabled-option { opacity: 0.6; cursor: not-allowed; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Layout Utilities */
        .flex-1 { flex: 1 1 0%; }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-center { justify-content: center; }
        .justify-between { justify-content: space-between; }
        .justify-end { justify-content: flex-end; }
        .text-center { text-align: center; }
        .hidden { display: none !important; }
        .overflow-y-auto { overflow-y: auto; }
        
        /* Header & Elements */
        .quiz-header { padding: 32px 32px 16px 32px; border-bottom: 1px solid #f1f5f9; background: rgba(255,255,255,0.5); position: relative; }
        .progress-bar-bg { width: 100%; background-color: #e2e8f0; border-radius: 9999px; height: 12px; overflow: hidden; box-shadow: inset 0 2px 4px 0 rgba(0,0,0,0.06); }
        .progress-bar-fill { background: linear-gradient(to right, #3b82f6, #8b5cf6); height: 12px; border-radius: 9999px; transition: all 0.5s ease-out; }
        .profile-icon { position: absolute; top: 24px; right: 32px; cursor: pointer; width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        /* Buttons */
        .btn-start { padding: 16px 40px; background: linear-gradient(to right, #3b82f6, #8b5cf6); color: white; font-weight: bold; font-size: 1.25rem; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .btn-start:hover { transform: scale(1.05); }
        .btn-action { padding: 12px 32px; font-weight: bold; border-radius: 12px; cursor: pointer; border: none; margin-left: 8px; font-size: 1rem; }
        .btn-next { background-color: #111827; color: white; }
        .btn-skip { background-color: #e2e8f0; color: #4a5568; }
        
        /* Overview Panel */
        .overview-panel { position: absolute; inset: 0; background: white; z-index: 50; display: flex; flex-direction: column; padding: 24px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 8px; padding: 16px 0; flex: 1; overflow-y: auto; }
        .q-circle { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; border: none; font-size: 0.8rem; }
        
        /* Circle States */
        .state-default { background: linear-gradient(135deg, #cbd5e1, #94a3b8); }
        .state-correct { background: #22c55e !important; }
        .state-wrong { background: #ef4444 !important; }
        .state-skipped { background: #eab308 !important; color: #000 !important; }
        
        /* Circular Progress Chart */
        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: #eee; stroke-width: 3.8; }
        .circle { fill: none; stroke-width: 2.8; stroke-linecap: round; }
    </style>
</head>
<body>

    <div id="app" class="glass-panel">
        </div>

    <script>
        const questions = [
            { q: "प्रकाश क्या है?", o: ["एक प्रकार की गैस", "एक प्रकार की ऊर्जा जिसकी सहायता से हम वस्तुओं को देखते हैं", "एक ठोस पदार्थ", "एक रासायनिक विलायक"], a: 1 },
            { q: "प्रकाश किस रेखा में गमन करता है?", o: ["वक्र रेखा में", "टेढ़ी-मेढ़ी रेखा में", "सरल (सीधी) रेखा में", "वृत्ताकार पथ पर"], a: 2 },
            { q: "निर्वात में प्रकाश की चाल कितनी होती है?", o: ["3 × 10⁸ m/s", "3 × 10⁵ m/s", "2.25 × 10⁸ m/s", "3 × 10¹⁰ m/s"], a: 0 },
            { q: "किरणों के समूह को क्या कहा जाता है?", o: ["प्रकाश स्रोत", "किरणपुंज (बीम)", "प्रदीप्त वस्तु", "प्रकीर्णन"], a: 1 },
            { q: "किरणपुंज मुख्यतः कितने प्रकार के होते हैं?", o: ["दो प्रकार के", "तीन प्रकार के", "चार प्रकार के", "पाँच प्रकार के"], a: 1 },
            { q: "जिस किरणपुंज की सभी किरणें एक बिंदु पर मिलती हैं, उसे क्या कहते हैं?", o: ["अपसारी किरणपुंज", "समानांतर किरणपुंज", "अभिसारी किरणपुंज", "इनमें से कोई नहीं"], a: 2 },
            { q: "जिस किरणपुंज की किरणें एक बिंदु से निकलकर फैलती हैं, उसे क्या कहते हैं?", o: ["अभिसारी", "अपसारी किरणपुंज", "समानांतर", "सीधी"], a: 1 },
            { q: "वे वस्तुएं जो स्वयं प्रकाश उत्सर्जित करती हैं, क्या कहलाती हैं?", o: ["अप्रदीप्त वस्तुएं", "प्रदीप्त (दीप्तिमान) वस्तुएं", "पारदर्शी वस्तुएं", "अपारदर्शी वस्तुएं"], a: 1 },
            { q: "चंद्रमा किस प्रकार की वस्तु का उदाहरण है?", o: ["प्रदीप्त", "अप्रदीप्त", "पारभासी", "गैसीय"], a: 1 },
            { q: "प्रकाश की किरण जब किसी माध्यम से टकराकर वापस उसी माध्यम में लौटती है, तो इसे क्या कहते हैं?", o: ["प्रकाश का अपवर्तन", "प्रकाश का परावर्तन", "प्रकाश का वर्ण विक्षेपण", "प्रकाश का प्रकीर्णन"], a: 1 },
            { q: "प्रकाश के परावर्तन के कितने नियम हैं?", o: ["एक", "दो", "तीन", "चार"], a: 1 },
            { q: "परावर्तन के नियम के अनुसार, आपतन कोण ($i$) हमेशा किसके बराबर होता है?", o: ["परावर्तन कोण ($r$) के", "क्रान्तिक कोण के", "90 डिग्री के", "शून्य के"], a: 0 },
            { q: "दर्पण की सतह पर लंबवत पड़ने वाली प्रकाश की किरण परावर्तन के बाद किस पथ से लौटती है?", o: ["उसी पथ पर वापस लौट जाती है", "45° के कोण पर मुड़ जाती है", "समानांतर हो जाती है", "लौटती ही नहीं"], a: 0 },
            { q: "यदि आपतन कोण 60° हो, तो परावर्तन कोण का मान कितना होगा?", o: ["30°", "60°", "90°", "120°"], a: 1 },
            { q: "यदि कोई किरण दर्पण की सतह से 30° का कोण बनाती हुई आपतित हो, तो आपतन कोण कितना होगा?", o: ["30°", "60°", "90°", "0°"], a: 1 },
            { q: "कांच की पट्टी के एक भाग पर किसकी पतली परत चढ़ाकर दर्पण बनाया जाता है?", o: ["लोहे की", "चाँदी (सिल्वर) की", "ताँबे की", "प्लास्टिक की"], a: 1 },
            { q: "गोलीय दर्पण मुख्यतः कितने प्रकार के होते हैं?", o: ["दो", "तीन", "चार", "एक"], a: 0 },
            { q: "वह गोलीय दर्पण जिसका परावर्तक सतह धँसा होता है, क्या कहलाता है?", o: ["उत्तल दर्पण", "अवतल दर्पण", "समतल दर्पण", "परवलयिक दर्पण"], a: 1 },
            { q: "वह गोलीय दर्पण जिसका परावर्तक सतह उभरा (बाहर की ओर उठा) होता है, क्या कहलाता है?", o: ["अवतल दर्पण", "उत्तल दर्पण", "समतल दर्पण", "बेलनाकार दर्पण"], a: 1 },
            { q: "गोलीय दर्पण के मध्य बिंदु को क्या कहा जाता है?", o: ["वक्रता केंद्र", "ध्रुव (Pole)", "मुख्य फोकस", "प्रधान अक्ष"], a: 1 },
            { q: "गोलीय दर्पण जिस खोखले गोले का भाग होता है, उसके केंद्र को क्या कहते हैं?", o: ["ध्रुव", "वक्रता केंद्र (Center of Curvature)", "फोकस दूरी", "द्वारक"], a: 1 },
            { q: "ध्रुव और वक्रता केंद्र को मिलाने वाली सीधी रेखा को क्या कहते हैं?", o: ["मुख्य अक्ष या प्रधान अक्ष (Principal Axis)", "फोकस दूरी", "दर्पण का द्वारक", "समानांतर अक्ष"], a: 0 },
            { q: "गोलीय दर्पण की फोकस दूरी ($f$) उसकी वक्रता त्रिज्या ($R$) की क्या होती है?", o: ["दुगुनी", "आधी ($f = R/2$)", "तिगुनी", "बराबर"], a: 1 },
            { q: "यदि किसी गोलीय दर्पण की वक्रता त्रिज्या 32 cm है, तो उसकी फोकस दूरी कितनी होगी?", o: ["32 cm", "64 cm", "16 cm", "8 cm"], a: 2 },
            { q: "यदि किसी गोलीय दर्पण की फोकस दूरी 20 cm है, तो उसकी वक्रता त्रिज्या कितनी होगी?", o: ["10 cm", "20 cm", "40 cm", "80 cm"], a: 2 },
            { q: "अवतल दर्पण की फोकस दूरी चिन्ह परिपाटी के अनुसार कैसी होती है?", o: ["धनात्मक (+)", "ऋणात्मक (-)", "शून्य", "कभी धनात्मक कभी ऋणात्मक"], a: 1 },
            { q: "उत्तल दर्पण की फोकस दूरी कैसी होती है?", o: ["ऋणात्मक", "धनात्मक (+)", "उदासीन", "अनंत"], a: 1 },
            { q: "वास्तविक प्रतिबिंब हमेशा कैसा होता है?", o: ["सीधा", "उल्टा", "तिरछा", "काल्पनिक"], a: 1 },
            { q: "आभासी (काल्पनिक) प्रतिबिंब हमेशा कैसा होता है?", o: ["उल्टा", "सीधा", "छोटा", "पर्दे पर प्राप्त होने वाला"], a: 1 },
            { q: "किस प्रतिबिंब को पर्दे पर उतारा जा सकता है?", o: ["वास्तविक प्रतिबिंब को", "आभासी प्रतिबिंब को", "दोनों को", "किसी को नहीं"], a: 0 },
            { q: "समतल दर्पण द्वारा बना प्रतिबिंब कैसा होता है?", o: ["वास्तविक और उल्टा", "काल्पनिक और सीधा", "वास्तविक और सीधा", "उल्टा और छोटा"], a: 1 },
            { q: "समतल दर्पण में वस्तु दूरी ($u$) और प्रतिबिंब दूरी ($v$) में क्या संबंध होता है?", o: ["$u > v$", "$u < v$", "$u = v$ (दोनों बराबर होते हैं)", "कोई संबंध नहीं होता"], a: 2 },
            { q: "वह कौन सा दर्पण है जो किसी वस्तु का हमेशा काल्पनिक, सीधा और छोटा प्रतिबिंब बनाता है?", o: ["अवतल दर्पण", "उत्तल दर्पण", "समतल दर्पण", "परवलयिक दर्पण"], a: 1 },
            { q: "हजामत (दाढ़ी) बनाने के लिए किस दर्पण का उपयोग किया जाता है?", o: ["उत्तल दर्पण", "अवतल दर्पण", "समतल दर्पण", "बेलनाकार दर्पण"], a: 1 },
            { q: "गाड़ियों के साइड मिरर (अग्रदीप/पीछे देखने के आईने) के रूप में किस दर्पण का उपयोग होता है?", o: ["अवतल दर्पण", "उत्तल दर्पण", "समतल दर्पण", "उत्तलोत्तल दर्पण"], a: 1 },
            { q: "उत्तल दर्पण का उपयोग साइड मिरर के रूप में क्यों किया जाता है?", o: ["क्योंकि इसका दृष्टि क्षेत्र बहुत बड़ा होता है और यह सीधा व छोटा प्रतिबिंब बनाता है", "क्योंकि यह रंगीन दिखाता है", "क्योंकि यह सस्ता होता है", "क्योंकि यह बड़ा प्रतिबिंब बनाता है"], a: 0 },
            { q: "सर्चलाइट, टॉर्च और वाहनों के हेडलाइट्स में किस दर्पण का उपयोग होता है?", o: ["उत्तल दर्पण", "अवतल दर्पण", "समतल दर्पण", "बेलनाकार दर्पण"], a: 1 },
            { q: "सौर भट्ठियों (Solar Cooker) में सूर्य के प्रकाश को केंद्रित करने के लिए किसका उपयोग होता है?", o: ["उत्तल दर्पण", "समतल दर्पण", "बड़ा अवतल दर्पण", "लेंस"], a: 2 },
            { q: "डॉक्टरों द्वारा कान, नाक, गले और दाँतों की जाँच के लिए किस दर्पण का प्रयोग किया जाता है?", o: ["उत्तल दर्पण", "अवतल दर्पण", "समतल दर्पण", "द्विफोकसी दर्पण"], a: 1 },
            { q: "दर्पण सूत्र (Mirror Formula) निम्नलिखित में से कौन सा है?", o: ["$1/v - 1/u = 1/f$", "$1/v + 1/u = 1/f$", "$v + u = f$", "$1/u - 1/v = 1/f$"], a: 1 },
            { q: "आवर्धन ($m$) का सूत्र क्या है?", o: ["$m = -v/u$", "$m = v/u$", "$m = u/v$", "$m = -u/v$"], a: 0 },
            { q: "आवर्धन ($m$) का ऋणात्मक मान क्या दर्शाता है?", o: ["प्रतिबिंब सीधा है", "प्रतिबिंब वास्तविक और उल्टा है", "प्रतिबिंब काल्पनिक है", "वस्तु बहुत बड़ी है"], a: 1 },
            { q: "आवर्धन ($m$) का धनात्मक मान क्या दर्शाता है?", o: ["प्रतिबिंब उल्टा है", "प्रतिबिंब आभासी (काल्पनिक) और सीधा है", "प्रतिबिंब छोटा है", "वास्तविक प्रतिबिंब है"], a: 1 },
            { q: "यदि आवर्धन $m = +1$ हो, तो यह किस दर्पण को दर्शाता है?", o: ["अवतल दर्पण को", "उत्तल दर्पण को", "समतल दर्पण को", "इनमें से कोई नहीं"], a: 2 },
            { q: "गोलीय दर्पण के द्वारक (Apérture) से क्या तात्पर्य है?", o: ["दर्पण की चौड़ाई या परावर्तक सतह का व्यास", "ध्रुव की दूरी", "वक्रता त्रिज्या", "मुख्य अक्ष"], a: 0 },
            { q: "चिह्न परिपाटी के अनुसार, आपतित प्रकाश की दिशा में मापी गई सभी दूरियाँ कैसी होती हैं?", o: ["ऋणात्मक", "धनात्मक (+)", "शून्य", "अनंत"], a: 1 },

                    </div>
                </div>

                <div class="flex justify-between items-center" style="padding: 24px; background: #f8fafc; border-top: 1px solid #e2e8f0; min-height: 90px;">
                    <div>
                        <button id="skip-btn" onclick="skipQuestion()" class="btn-action btn-skip">स्किप करें</button>
                    </div>
                    <button id="next-btn" onclick="nextQuestion()" class="hidden btn-action btn-next">
                        ${currentQuestion === questions.length - 1 ? 'परिणाम देखें' : 'अगला प्रश्न'}
                    </button>
                </div>
            `;
        }

        function checkAnswer(selectedIndex, btnElement) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const allBtns = document.querySelectorAll('.option-btn');
            const nextBtn = document.getElementById('next-btn');
            const skipBtn = document.getElementById('skip-btn');

            if(skipBtn) skipBtn.classList.add('hidden');

            allBtns.forEach((btn, index) => {
                btn.classList.add('disabled-option');
                btn.disabled = true;
                const iconContainer = btn.querySelector('.icon-container');
                iconContainer.classList.remove('hidden');

                if (index === q.a) {
                    btn.classList.add('correct');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #16a34a; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
                }
                
                if (index === selectedIndex && selectedIndex !== q.a) {
                    btn.classList.add('wrong');
                    btn.classList.remove('disabled-option');
                    iconContainer.innerHTML = `<svg style="color: #dc2626; width: 24px; height: 24px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`;
                }
            });

            if (selectedIndex === q.a) {
                score++;
                questionStates[currentQuestion] = 'correct';
            } else {
                questionStates[currentQuestion] = 'wrong';
            }

            nextBtn.classList.remove('hidden');
            nextBtn.classList.add('fade-in');
        }

        function skipQuestion() {
            questionStates[currentQuestion] = 'skipped';
            nextQuestion();
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                renderResultScreen();
            }
        }

        function openOverview() {
            let gridHtml = '';
            for(let i = 0; i < questions.length; i++) {
                let stateClass = 'state-default';
                if(questionStates[i] === 'correct') stateClass = 'state-correct';
                if(questionStates[i] === 'wrong') stateClass = 'state-wrong';
                if(questionStates[i] === 'skipped') stateClass = 'state-skipped';
                
                gridHtml += `<button onclick="jumpToQuestion(${i})" class="q-circle ${stateClass}">${i + 1}</button>`;
            }

            const overviewDiv = document.createElement('div');
            overviewDiv.id = 'overview-overlay';
            overviewDiv.className = 'overview-panel fade-in';
            overviewDiv.innerHTML = `
                <h3 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 16px; text-align: center;">प्रश्नावली ओवरव्यू (कुल 150 प्रश्न)</h3>
                <div class="grid-container">
                    ${gridHtml}
                </div>
                <div class="flex justify-center" style="padding-top: 16px; border-top: 1px solid #e2e8f0; background: white;">
                    <button onclick="closeOverview()" class="btn-action btn-skip" style="margin: 0 8px;">ओवरव्यू बंद करें</button>
                    <button onclick="submitQuizFromOverview()" class="btn-action btn-next" style="margin: 0 8px; background-color: #2563eb;">क्विज़ सबमिट करें</button>
                </div>
            `;
            appDiv.appendChild(overviewDiv);
        }

        function closeOverview() {
            const overlay = document.getElementById('overview-overlay');
            if(overlay) overlay.remove();
        }

        function jumpToQuestion(index) {
            currentQuestion = index;
            closeOverview();
            renderQuestion();
        }

        function submitQuizFromOverview() {
            closeOverview();
            renderResultScreen();
        }

        function renderResultScreen() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = "";
            let emoji = "";
            
            if (percentage === 100) { message = "उत्कृष्ट! आपने भौतिकी के पहले अध्याय में 100% अंक प्राप्त किए!"; emoji = "🏆"; }
            else if (percentage >= 80) { message = "बहुत शानदार! बोर्ड परीक्षा के लिए आपकी तैयारी लाजवाब है।"; emoji = "🌟"; }
            else if (percentage >= 50) { message = "अच्छा प्रयास! कुछ कठिन प्रश्नों पर पुनः ध्यान दें।"; emoji = "👍"; }
            else { message = "निराश न हों! भारती भवन पुस्तक को फिर से पढ़ें और बेहतर स्कोर लाएँ।"; emoji = "📚"; }

            const strokeDasharray = `${percentage}, 100`;
            const colorClass = percentage >= 80 ? '#22c55e' : percentage >= 50 ? '#eab308' : '#ef4444';

            appDiv.innerHTML = `
                <div class="flex-1 flex flex-col items-center justify-center p-8 text-center fade-in overflow-y-auto" style="padding: 32px;">
                    <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 32px;">क्विज़ परिणाम ${emoji}</h2>
                    
                    <div style="position: relative; width: 192px; height: 192px; margin-bottom: 32px; display: flex; align-items: center; justify-content: center;">
                        <svg viewBox="0 0 36 36" class="circular-chart" style="width: 100%; height: 100%;">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                            <path class="circle" stroke="${colorClass}" stroke-dasharray="${strokeDasharray}" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"/>
                        </svg>
                        <div style="position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <span style="font-size: 2.25rem; font-weight: 900;">${score}</span>
                            <span style="font-size: 0.875rem; font-weight: bold; color: #9ca3af;">/ 150</span>
                        </div>
                    </div>

                    <p style="font-size: 1.5rem; font-weight: bold; margin-bottom: 8px;">${percentage}% अंक</p>
                    <p style="font-size: 1.125rem; color: #6b7280; margin-bottom: 40px; max-width: 448px;">${message}</p>
                    
                    <button onclick="startQuiz()" class="btn-action" style="background: white; border: 2px solid #e2e8f0; color: #4a5568; padding: 16px 32px; border-radius: 12px; font-size: 1.125rem;">
                        फिर से खेलें
                    </button>
                </div>
            `;
        }

        renderStartScreen();
    </script>
</body>
</html>
